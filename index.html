<html lang="pt" style="background:#839982">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">

<meta name="twitter:title" content="CASA · Finanças">
<meta name="twitter:description" content="Gestão financeira pessoal.">
<meta name="twitter:image" content="https://casa.cr0x.org/icon-512.png">
<style>
:root{
  /* Paleta "Sálvia" — baseada no ícone (escandinavo, calmo) */
  --bg:#121613; --bg2:#181d19; --card:#1e241f; --card2:#27302a; --line:#333d36; --line2:#43504a;
  --txt:#ecefe8; --mut:#9aa79e; --acc:#7aa183; --accd:#5f7a6b;
  --in:#8cba98; --out:#df8c7d; --warn:#d9a85c; --info:#87a9c0;
  --nb:#1bb6a6; --cflex:#fb8168; /* verde novobanco · coral Coverflex (marcas) */
  --acc-10:rgba(122,161,131,.10); --acc-12:rgba(122,161,131,.12); --acc-15:rgba(122,161,131,.15); --acc-16:rgba(122,161,131,.16);
  --r:20px; --r-sm:13px; --r-lg:26px;
  --maxw:1320px;
  --sh-sm:0 1px 2px rgba(0,0,0,.22);
  --sh:0 1px 2px rgba(0,0,0,.18),0 14px 34px -16px rgba(0,0,0,.55);
  --sh-lg:0 24px 60px -16px rgba(0,0,0,.6);
  --hair:rgba(255,255,255,.05);
}
[data-theme="light"]{
  --bg:#f3f1ea; --bg2:#ece8df; --card:#fbf9f4; --card2:#f1ede4; --line:#ddd7c9; --line2:#cabfac;
  --txt:#26302a; --mut:#6d7a70; --acc:#5f7a6b; --accd:#4d6657;
  --in:#5f8a6c; --out:#c06f5e; --warn:#b3893f; --info:#5e84a0;
  --nb:#0a8d80; --cflex:#d9624a; /* verde novobanco · coral Coverflex (marcas) */
  --acc-10:rgba(95,122,107,.10); --acc-12:rgba(95,122,107,.13); --acc-15:rgba(95,122,107,.16); --acc-16:rgba(95,122,107,.17);
  --sh-sm:0 1px 2px rgba(60,70,50,.06);
  --sh:0 1px 2px rgba(60,70,50,.05),0 14px 30px -16px rgba(60,70,50,.14);
  --sh-lg:0 24px 56px -16px rgba(60,70,50,.18);
  --hair:rgba(255,255,255,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.011em}
.v,.kbox .v,table.grid,.num{font-variant-numeric:tabular-nums}
html{scroll-behavior:smooth}
body{background:
  radial-gradient(1100px 620px at 100% -8%,color-mix(in srgb,var(--acc) 8%,transparent),transparent 58%),
  radial-gradient(900px 680px at -10% 112%,color-mix(in srgb,var(--acc) 5%,transparent),transparent 55%),
  var(--bg);background-attachment:fixed}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Topbar */
.topbar{background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.topbar-inner{display:flex;align-items:center;gap:10px;padding:11px 18px;flex-wrap:wrap;max-width:var(--maxw);margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#a7b89a,#5f7a6b);display:grid;place-items:center;color:#f5efe6}
.brand .logo svg{width:19px;height:19px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px}
.tabs button{background:none;border:0;color:var(--mut);padding:7px 13px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:background .16s,color .16s,box-shadow .16s}
.tabs button:hover:not(.on){color:var(--txt);background:var(--card2)}
.tabs button svg{width:17px;height:17px;flex:none}
.tabs button.on{background:linear-gradient(135deg,var(--acc),var(--accd));color:#fff;box-shadow:0 1px 0 rgba(255,255,255,.12) inset,0 6px 14px -8px var(--acc)}
.spacer{flex:1}
.yearnav{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
.yearnav button{background:none;border:0;color:var(--mut);cursor:pointer;width:30px;height:28px;border-radius:6px;font-size:16px}
.yearnav button:hover{background:var(--card2);color:var(--txt)}
.yearnav .y{font-weight:800;font-size:15px;min-width:54px;text-align:center}
.topbar .tabs .yearnav{background:none;border:0;padding:0;height:auto} /* ano dentro da barra dos menus: sem caixa própria */
.tabsep{width:1px;align-self:stretch;background:var(--line);margin:0 3px;flex:none}
.btn{background:var(--card2);color:var(--txt);border:1px solid transparent;padding:9px 15px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:background .16s,color .16s,transform .1s,box-shadow .16s;box-shadow:var(--sh-sm)}
.btn:hover{background:color-mix(in srgb,var(--card2) 82%,var(--acc));transform:translateY(-1px);box-shadow:var(--sh)}
.btn:active{transform:translateY(0);box-shadow:var(--sh-sm)}
.btn svg{width:15px;height:15px;color:var(--acc);transition:color .16s}
.btn.primary{background:linear-gradient(135deg,var(--acc),var(--accd));border:0;color:#fff;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 8px 18px -10px var(--acc)}
.btn.primary:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,.16) inset,0 12px 22px -10px var(--acc)}
.btn.primary svg{color:#fff}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn.icon-only{padding:7px 10px}.btn.icon-only svg{margin:0}
.btn.danger{color:var(--out)} .btn.danger svg{color:var(--out)}
.btn.danger:hover{background:color-mix(in srgb,var(--card2) 82%,var(--out));color:var(--out)}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px;gap:3px;box-shadow:var(--sh-sm)}
.seg button{background:none;border:0;color:var(--mut);padding:7px 18px;cursor:pointer;font-size:13px;font-weight:700;border-radius:999px;transition:background .16s,color .16s,box-shadow .16s}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--card);color:var(--acc);box-shadow:var(--sh-sm)}
.seg button.on-out{background:var(--card);color:var(--out);box-shadow:var(--sh-sm)}
.seg button.on-in{background:var(--card);color:var(--in);box-shadow:var(--sh-sm)}
.segtipo{border-radius:10px;padding:3px;gap:3px}
.segtipo button{border-radius:7px;padding:5px 13px;display:inline-flex;align-items:center;justify-content:center}
.segtipo button svg{width:16px;height:16px;display:block}
button{font-family:inherit;letter-spacing:inherit}
button:focus-visible,a:focus-visible,[role=button]:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
button:disabled,button[disabled]{opacity:.5;cursor:not-allowed;pointer-events:none}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--bg2);color:var(--txt);border:1px solid transparent;border-radius:11px;padding:10px 12px;outline:none;box-shadow:inset 0 0 0 1px var(--line);transition:box-shadow .16s}
input:focus,select:focus,textarea:focus{box-shadow:inset 0 0 0 1px var(--acc),0 0 0 3px var(--acc-12)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
@media(max-width:720px){.tabs .tablabel{display:none}.tabs button{padding:9px 12px}}
#bell,#inboxTop{background:none;border:0;color:var(--mut);cursor:pointer;position:relative;padding:6px;border-radius:9px;display:inline-flex}
#bell:hover,#inboxTop:hover{color:var(--txt);background:var(--card)}
#bell svg,#inboxTop svg{width:19px;height:19px;display:block}
.hlp{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--card2);color:var(--mut);font-size:11px;font-weight:800;cursor:help;border:1px solid var(--line);vertical-align:middle;margin-left:6px;user-select:none}
.hlp:hover{color:var(--acc);border-color:var(--acc)}
#hlptip{position:fixed;z-index:200;background:var(--card);border:1px solid var(--line2);border-radius:12px;box-shadow:var(--sh-lg);padding:10px 13px;font-size:12.5px;color:var(--txt);line-height:1.45;display:none;pointer-events:none}
#hlptip.on{display:block;animation:pp .12s}
.acmrow{cursor:pointer}
.acmrow:hover td{background:var(--acc-12)}
#refreshBtn,#searchBtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:6px;border-radius:9px;display:inline-flex}
#refreshBtn:hover,#searchBtn:hover{color:var(--txt);background:var(--card)}
#refreshBtn svg,#searchBtn svg{width:18px;height:18px;display:block}
#refreshBtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bell-badge{position:absolute;top:-1px;right:-1px;background:var(--out);color:#fff;font-size:10px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
.main{padding:16px 20px 80px;flex:1;width:100%;max-width:var(--maxw);margin:0 auto}
#main.view-in{animation:viewIn .26s cubic-bezier(.2,.7,.2,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){#main.view-in{animation:none}}
/* KPI strip */
.kstrip{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.kbox{position:relative;overflow:hidden;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);padding:18px 22px;flex:1;min-width:182px;box-shadow:var(--sh)}
.kbox::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.kbox.k-accent{padding-left:20px}
.kbox.k-accent::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--acc)}
.kbox.k-in::before{background:var(--in)} .kbox.k-out::before{background:var(--out)} .kbox.k-info::before{background:var(--info)} .kbox.k-warn::before{background:var(--warn)}
.kbox .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kbox .v{font-size:29px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
.pos{color:var(--in)} .neg{color:var(--out)}
/* Dívida — hero com avatares */
.acerto-flow{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:nowrap}
.acerto-av{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:20px;background:var(--card2);color:var(--mut);box-shadow:inset 0 0 0 1px var(--line);flex:none}
.acerto-av.acc{background:linear-gradient(135deg,var(--acc),var(--accd));color:#fff;box-shadow:0 6px 16px -8px var(--acc)}
.acerto-mid{display:flex;flex-direction:column;align-items:center;min-width:0}
.acerto-cap{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;text-align:center}
.acerto-amt{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1}
.acerto-flow .ar{color:var(--mut);flex:none;opacity:.6;font-size:22px;line-height:1}
.acerto-note{text-align:center;font-size:13px;color:var(--mut);margin-top:14px;line-height:1.4}
/* Poupanças — barra de progresso total */
.savetot .savetop{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.savetot .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.savetot .savebig{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:3px}
.savetot .savebig small{font-size:14px;font-weight:600;color:var(--mut);letter-spacing:0}
.savetot .savepct{font-size:22px;font-weight:800;color:var(--acc)}
.savebar{height:11px;border-radius:999px;background:var(--card2);box-shadow:inset 0 0 0 1px var(--line);overflow:hidden}
.savebar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc),var(--accd));transition:width .4s}
/* Quick add */
/* Desktop: grelha fixa — Valor · Sai de · Categoria · Mês · Adicionar | Nota em baixo */
.qadd{display:grid;grid-template-columns:auto auto minmax(0,2fr) minmax(0,1fr) auto;gap:11px;align-items:end;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 90%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:16px;box-shadow:var(--sh)}
.qadd .fld{display:flex;flex-direction:column;min-width:0}
.qadd .fld-val{grid-column:1;grid-row:1}
.qadd .fld-tipo{grid-column:2;grid-row:1}
.qadd .fld-cat{grid-column:3;grid-row:1} .qadd .fld-mes{grid-column:4;grid-row:1}
.qadd #qAdd{grid-column:5;grid-row:1;height:42px;align-self:end}
.qadd .fld-nota{grid-column:1/-1;grid-row:2}
.qadd .qconta{display:flex;width:100%;height:42px;border-radius:11px;padding:4px;gap:4px}
.qadd .qconta button{flex:1;border-radius:8px;padding:0;display:inline-flex;align-items:center;justify-content:center}
.qadd .qconta button svg{width:18px;height:18px;color:currentColor}
.qadd input,.qadd select{padding:10px 12px}
.qadd .v{width:120px;height:42px;font-weight:800;font-size:17px}
#qAddCash.on{background:var(--acc-15);box-shadow:inset 0 0 0 1.5px var(--acc)}#qAddCash.on svg{color:var(--acc)}
/* Grid */
.gridwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:auto;box-shadow:var(--sh)}
table.grid{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.grid th,table.grid td{border-bottom:1px solid color-mix(in srgb,var(--line) 60%,transparent);padding:0;text-align:right;white-space:nowrap}
table.grid thead th{position:sticky;top:0;background:linear-gradient(180deg,var(--card2),color-mix(in srgb,var(--card2) 70%,var(--bg)));z-index:2;font-size:11.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:12px 14px;cursor:default}
table.grid thead th .delcol{opacity:0;color:var(--mut);cursor:pointer;margin-left:6px;font-weight:400}
table.grid thead th:hover .delcol{opacity:.6}
table.grid thead th .delcol:hover{opacity:1;color:var(--out)}
table.grid tbody th,table.grid tfoot th{position:sticky;left:0;background:var(--card);z-index:1;text-align:left;font-weight:700;padding:11px 14px;font-size:13px;color:var(--txt);box-shadow:7px 0 9px -8px rgba(0,0,0,.10)}
table.grid td.cell{padding:11px 14px;cursor:pointer;font-size:13.5px;min-width:92px;transition:background .1s}
table.grid td.cell:hover{background:var(--acc-12);box-shadow:inset 0 0 0 1.5px var(--acc);border-radius:9px}
table.grid td.cell.z{color:var(--mut);font-weight:400;opacity:.4}
table.grid td.tot,table.grid th.tot{background:var(--card2);font-weight:800;position:sticky;right:0;box-shadow:-8px 0 10px -8px rgba(0,0,0,.14)}
table.grid tfoot th,table.grid tfoot td{position:sticky;bottom:0;background:var(--card2);font-weight:800;border-top:1.5px solid var(--line2);z-index:1;padding:11px 13px}
table.grid tr.now td.cell{background:var(--acc-12)}
table.grid tr.now th{color:var(--acc);background:var(--card)}
table.grid tr.now th::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
.addcol-th{cursor:pointer;color:var(--acc)!important}
table.grid th.subcol,table.grid td.subcol{background:var(--bg2)}
table.grid td.subcell{background:var(--bg2);font-size:12.5px;color:var(--mut)}
table.grid td.subcell:hover{background:var(--acc-12);color:var(--txt)}
table.grid td.cell.over{color:var(--out)!important;font-weight:800;background:color-mix(in srgb,var(--out) 14%,transparent)}
table.grid td.cell.warn{color:var(--warn)!important;font-weight:700}
table.grid td.cell.pend{opacity:.5;font-style:italic}
table.grid thead th.subcol{font-weight:600;font-size:10.5px}
.exptog{color:var(--mut);font-size:13px;width:15px;display:inline-grid;place-items:center;border-radius:4px;font-weight:700}
table.grid th.thtog{cursor:pointer;user-select:none}
table.grid th.thtog:hover{background:var(--acc-12)}
table.grid th.thtog:hover .exptog{color:var(--acc)}
table.grid thead th[data-cat]{cursor:grab}
table.grid thead th.th-drop{outline:2px dashed var(--acc);outline-offset:-2px;background:var(--acc-16)!important}
table.grid thead th.th-before{box-shadow:inset 4px 0 0 var(--acc)}
.thedit{background:none;border:0;color:var(--mut);cursor:pointer;padding:1px;border-radius:4px;opacity:.35;display:inline-flex;margin-left:2px}
.thedit svg{width:13px;height:13px}
table.grid thead th:hover .thedit{opacity:.7}
.thedit:hover{opacity:1!important;color:var(--acc)}
.pinp{background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;width:100%;font-size:13.5px}
.pinp:hover{border-color:var(--line)}
.pinp:focus{border-color:var(--acc);background:var(--card2)}
.pinp.pnum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;max-width:160px}
.poupval{cursor:pointer;font-weight:700;font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line);padding-bottom:1px}
.poupval:hover{border-color:var(--acc);color:var(--acc)}
/* vista Lista da Grelha (um cartão por mês, colapsável) */
.gm{display:flex;flex-direction:column;gap:10px}
.gm-month{background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;position:relative;transition:box-shadow .18s,border-color .18s}
.gm-month::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.gm-month:hover{box-shadow:var(--sh);border-color:var(--line2)}
.gm-month.now{box-shadow:inset 3px 0 0 var(--acc),var(--sh)}
.gm-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:16px 18px;cursor:pointer;font-size:15px;color:var(--txt)}
.gm-nm{font-weight:800;min-width:92px;text-align:left;flex:none}
.gm-month.now .gm-nm{color:var(--acc)}
.gm-lock{font-size:11px;opacity:.7;width:16px;flex:none;text-align:left}
.sumtable td.barscell{width:160px;padding:8px 16px 8px 10px;vertical-align:middle}
.mbars{display:flex;flex-direction:column;gap:5px;min-width:80px}
.mbars .mbar{height:7px;border-radius:4px;background:var(--card2);overflow:hidden;box-shadow:inset 0 0 0 1px var(--hair)}
.mbars .mbar i{display:block;height:100%;border-radius:4px;min-width:2px}
.mbars .mbar i.in{background:var(--in)}
.mbars .mbar i.out{background:var(--out)}
.gm-tot{margin-left:auto;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;min-width:108px;text-align:right}
.gm-tot.neg{color:var(--out)} .gm-tot.pos{color:var(--in)}
.gm-tot.mut{color:var(--mut);opacity:.45;font-weight:500}
.gm-chev{color:var(--mut);font-size:11px;width:12px;flex:none}
.gm-body{border-top:1px solid var(--line);padding:5px 9px 8px}
.gm-cat{display:flex;align-items:center;gap:9px;padding:9px;border-radius:10px;cursor:pointer;transition:background .12s}
.gm-cat:hover{background:var(--acc-12)}
.gm-cat .cicon{flex:none}
.gm-cnm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}

/* ----- Splash de arranque: a casa emerge do fundo sálvia (igual ao ícone) ----- */
#splash{position:fixed;inset:0;z-index:10000;display:grid;place-items:center;
  background:#839982;
  transition:opacity .6s ease,transform .6s ease}
#splash.done{opacity:0;transform:scale(1.04);pointer-events:none}
#splash .splash-mark{position:relative;width:152px;height:152px;display:grid;place-items:center;animation:splashPop 1.5s cubic-bezier(.2,.7,.2,1) both}
#splash .splash-mark::before{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 47%,rgba(245,239,230,.18),rgba(245,239,230,0) 64%);animation:haloIn 1.2s ease .1s both}
#splash svg{position:relative;width:108px;height:108px;filter:drop-shadow(0 1px 0 rgba(255,255,255,.30)) drop-shadow(0 7px 16px rgba(54,70,54,.28))}
#splash .house{fill:none;stroke:#f5efe6;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1;animation:houseDraw 1.1s ease .2s forwards}
@keyframes houseDraw{to{stroke-dashoffset:0}}
@keyframes haloIn{from{opacity:0;transform:scale(.62)}to{opacity:1;transform:scale(1)}}
@keyframes splashPop{0%{transform:scale(.9);opacity:0}42%{opacity:1}100%{transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#splash .house{animation:none;stroke-dashoffset:0}#splash .splash-mark,#splash .splash-mark::before{animation:none}}
/* ----- Teclado de PIN do bloqueio ----- */
/* enquanto o overlay de bloqueio (ou splash) está presente, trava o scroll do documento por trás */
html:has(#lock),html:has(#splash){overflow:hidden}
#lock .dots{display:flex;gap:13px;justify-content:center;height:14px;margin:2px 0}
#lock .dots span{width:12px;height:12px;border-radius:50%;border:2px solid var(--line2);transition:background .1s,border-color .1s}
#lock .dots span.on{background:var(--acc);border-color:var(--acc)}

/* média ponderada (recente pesa mais) de uma série cronológica, removendo o outlier alto e baixo */
function _estPond(arr){
  arr=(arr||[]).filter(t=>t>0); if(!arr.length)return 0;
  let a=arr.slice();
  if(a.length>=5){ const s=a.slice().sort((x,y)=>x-y); const lo=s[0],hi=s[s.length-1]; let rl=false,rh=false; a=a.filter(v=>{if(!rl&&v===lo){rl=true;return false;}if(!rh&&v===hi){rh=true;return false;}return true;}); }
  let w=0,vs=0; a.forEach((v,i)=>{w+=i+1;vs+=v*(i+1);}); return round2(vs/w);
}
function mesesTipo(tipo){return [...new Set(state.movimentos.filter(m=>m.tipo===tipo).map(m=>m.data.slice(0,7)))].sort();}
/* estimativa do total de despesa do mês */
function estimativaMensal(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('despesa').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* estimativa da receita LÍQUIDA do mês (já com descontos SS/IRS, que são negativos) */
function estimativaReceitaLiq(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('receita').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* valor típico de uma fixa = mediana do que essa categoria gastou nos últimos meses (cai bem quando o valor varia) */
function medValorFixa(r){
  const hist=mesesDespesa().slice(-12).map(m=>catMesTotal(r.categoriaId,m)).filter(v=>v>0);
  return hist.length>=2?round2(mediana(hist)):round2(+r.valor||0);
}
/* Previsão de tesouraria do Valete (mês corrente): combina fixas com dia (âncoras) + gasto variável espalhado.
   Tudo estimado pelo histórico (mediana), porque dias e valores variam. */
function valeteForecast(){
  const v=valeteAtual();
  const d=new Date(); const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0'); const dim=new Date(Y,M+1,0).getDate();
  const estMensal=estimativaMensal(ymCur);
  // já SAIU = despesas deste mês que NÃO são pendentes (os agendados ainda não abateram)
  const gastoMes=round2(state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===ymCur&&!x.pendente).reduce((a,x)=>a+x.valor,0));
  // fixas ainda não pagas este mês e com dia >= hoje (âncoras futuras), valor estimado pelo histórico
  const launched=new Set(state.movimentos.filter(m=>m.recId&&m.data.slice(0,7)===ymCur).map(m=>m.recId));
  const fixas=state.recorrencias.filter(r=>r.ativo!==false&&!launched.has(r.id))
    .map(r=>({nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),valor:medValorFixa(r),dia:Math.min(dim,Math.max(1,+r.dia||8))}))
    .filter(f=>f.valor>0 && f.dia>=today);
  // débitos AGENDADOS (faturas com débito futuro): saída futura no dia certo, com VALOR EXATO
  const pendFut=state.movimentos.filter(m=>m.tipo==='despesa'&&m.pendente&&m.data.slice(0,7)===ymCur)
    .map(m=>({nome:catName(m.categoriaId),valor:Math.abs(m.valor),dia:Math.min(dim,Math.max(1,+m.data.slice(8,10))),exato:true}))
    .filter(f=>f.dia>=today);
  fixas.push(...pendFut); fixas.sort((a,b)=>a.dia-b.dia);
  const fixoFut=round2(fixas.reduce((a,f)=>a+f.valor,0));
  const varRest=Math.max(0,round2(estMensal-gastoMes-fixoFut));
  const diasRest=Math.max(1,dim-today+1); const varDia=varRest/diasRest;
  const need=round2(fixoFut+varRest); // total que ainda falta sair
  // RECEITA que ainda vai entrar este mês (líquida) e o dia em que entra
  const estReceita=estimativaReceitaLiq(ymCur);
  const recebidoMes=round2(state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===ymCur).reduce((a,x)=>a+x.valor,0));
  const restReceita=Math.max(0,round2(estReceita-recebidoMes));
  const diaSal=Math.min(28,Math.max(1,+state.settings.diaSalario||23));
  const diaChegada=restReceita>0?Math.max(today,diaSal):null; // se já passou, assume que entra hoje
  // curva de SALDO PROJETADO: Valete − despesas que saem + receita que entra, dia a dia
  const margem=Math.max(0,+state.settings.valeteMargem||0);
  const curva=[]; let accFix=0;
  for(let day=today;day<=dim;day++){
    accFix=round2(accFix+fixas.filter(f=>f.dia===day).reduce((a,f)=>a+f.valor,0));
    const out=round2(accFix+varDia*(day-today+1));
    const inflow=(diaChegada!=null&&day>=diaChegada)?restReceita:0;
    curva.push({day,saldo:(v==null?null:round2(v-out+inflow)),out,inflow});
  }
  let minSaldo=null,minDia=null,faltaDia=null,faltaValor=0;
  if(v!=null){ curva.forEach(c=>{ if(minSaldo==null||c.saldo<minSaldo){minSaldo=c.saldo;minDia=c.day;} if(faltaDia==null&&c.saldo<margem-0.001){faltaDia=c.day;faltaValor=round2(margem-c.saldo);} }); }
  return {v,margem,estMensal,gastoMes,fixas,fixoFut,varRest,need,estReceita,recebidoMes,restReceita,diaChegada,curva,minSaldo,minDia,faltaDia,faltaValor,today,dim,ok:(v==null?null:minSaldo>=margem-0.001)};
}
/* sparkline do saldo projetado do Valete ao longo do mês (com linhas da margem e do zero) */
function valeteSpark(F){
  if(!F.curva.length||F.v==null)return '';
  const w=300,h=64,pad=5;
  const vals=F.curva.map(c=>c.saldo).concat([F.v,F.margem,0]);
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const X=i=>pad+(F.curva.length<2?0:i/(F.curva.length-1))*(w-2*pad);
  const Yv=val=>h-pad-((val-min)/rng)*(h-2*pad);
  const pts=F.curva.map((c,i)=>`${X(i).toFixed(1)},${Yv(c.saldo).toFixed(1)}`).join(' ');
  const my=Yv(F.margem).toFixed(1);
  const fy=F.faltaDia!=null?X(F.curva.findIndex(c=>c.day===F.faltaDia)):null;
  const minIdx=F.curva.findIndex(c=>c.day===F.minDia);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;margin-top:6px">
    <line x1="${pad}" y1="${my}" x2="${w-pad}" y2="${my}" stroke="${F.margem>0?'var(--out)':'var(--mut)'}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="${pad}" y="${(+my-3)}" font-size="9" fill="${F.margem>0?'var(--out)':'var(--mut)'}">${F.margem>0?'margem':'0'}</text>
    <polyline points="${pts}" fill="none" stroke="${F.faltaDia!=null?'var(--out)':'var(--acc)'}" stroke-width="2"/>
    ${minIdx>=0?`<circle cx="${X(minIdx).toFixed(1)}" cy="${Yv(F.minSaldo).toFixed(1)}" r="3" fill="${F.faltaDia!=null?'var(--out)':'var(--acc)'}"/>`:''}
  </svg>`;
}

/* ================= ACERTO / DÍVIDA ================= */
let acAnosOpen=null; // Set de anos expandidos (null => default: último ano aberto)
function acertoCatIds(){
  const ids=new Set();
  state.categorias.filter(c=>c.acerto).forEach(c=>{ids.add(c.id);childrenOf(c.id).forEach(k=>ids.add(k.id));});

/* a partir deste mês (inclusive) a dívida vem da GRELHA (input manual); antes, do histórico do Excel.
   Data FIXA (não "mês atual") para os meses já lançados não voltarem ao Excel quando o mês roda. */
const ACERTO_GRID_FROM='2026-06';
const ACERTO_DIVIDA_FROM='2022-10'; /* a dívida só acumula a partir de out/2022 — antes disso estava saldada */
/* acertos pontuais (fora do registo mensal): valores one-off em que ela deve 50%.
   2016 — impostos da compra da casa: preto = pago por ti; vermelho/negativo = devolvido no ajuste dos impostos. */
const ACERTO_EXTRAS=[{
  id:'casa2016', ano:2016, data:'2016-01-05', titulo:'Impostos da compra da casa',
  itens:[
    {nm:'Avaliação r/c',v:239.20},{nm:'Avaliação Casa',v:239.20},{nm:'Comissão Processo',v:290.00},
    {nm:'Imposto Processo',v:11.60},{nm:'Despesas Cheque',v:11.75},{nm:'Imposto Despesas C.',v:0.47},
    {nm:'Imposto Processo',v:1083.00},{nm:'Pag Estado',v:2948.63},{nm:'Pag Estado',v:856.25},
    {nm:'Pag Estado',v:2948.63},{nm:'Pag Estado',v:856.25},{nm:'Notário',v:450.00},
    {nm:'Notário',v:569.50},{nm:'Comissão Processo',v:120.00},{nm:'Imposto Processo',v:4.80},
    {nm:'Devolvido DA',v:-100.00},{nm:'Devolvido DA2',v:-1174.74},{nm:'Devolvido DV',v:-134.25},{nm:'Devolvido DV2',v:-1174.74}
  ]
}];
function acertoExtras(){return ACERTO_EXTRAS.map(e=>{const total=round2(e.itens.reduce((s,i)=>s+i.v,0));return Object.assign({},e,{total,metade:round2(total/2)});});}
function acertoExtrasTotal(){return round2(acertoExtras().reduce((s,e)=>s+e.metade,0));}
/* Constrói o livro de dívida: histórico do Excel (até ACERTO_GRID_FROM) + meses da grelha (a partir daí). */
function acertoLedger(){
  const src=(state.acerto&&state.acerto.length?state.acerto:EMBED_ACERTO);
  const base=src.filter(r=>r.ym<ACERTO_GRID_FROM).map(r=>({ym:r.ym,deve:+r.deve||0,pago:+r.pago||0,fwd:false}));
  // pagamentos dela registados no Excel para meses já geridos pela grelha (preserva, se existirem)
  const pagosFwd={}; src.filter(r=>r.ym>=ACERTO_GRID_FROM&&(+r.pago||0)>0).forEach(r=>{pagosFwd[r.ym]=+r.pago||0;});
  // quota dela = metade das despesas das contas partilhadas lançadas na grelha, do mês de corte em diante
  const acIds=acertoCatIds(); const fwd={};
  state.movimentos.filter(x=>x.tipo==='despesa'&&acIds.has(x.categoriaId)&&x.data.slice(0,7)>=ACERTO_GRID_FROM)
    .forEach(x=>{const ym=x.data.slice(0,7);fwd[ym]=(fwd[ym]||0)+x.valor/2;});
  [...new Set([...Object.keys(fwd),...Object.keys(pagosFwd)])].sort().forEach(ym=>base.push({ym,deve:round2(fwd[ym]||0),pago:round2(pagosFwd[ym]||0),fwd:true}));
  /* a dívida só conta a partir de outubro de 2022 — tudo o que é anterior é ignorado */
  const rows=base.filter(r=>r.ym>=ACERTO_DIVIDA_FROM);
  let run=0; rows.forEach(r=>{r.saldo=round2(r.deve-r.pago);run=round2(run+r.saldo);r.acc=run;});
  return rows;
}
/* ----- Juros de mora (estimativa) — sempre juros legais civis (4%/ano, entre particulares) ----- */
function jurosTaxa(){return 4;}
function fmtPct(t){return (Math.round(t*1000)/1000).toLocaleString('pt-PT',{maximumFractionDigits:3})+'%';}
function _hojeMeiaNoite(){const d=new Date();d.setHours(0,0,0,0);return d;}
function _diasAte(dt,today){return Math.max(0,Math.floor((today-dt)/86400000));}
/* juros simples sobre cada valor em dívida, desde a data a que respeita até hoje */
function computeJuros(){
  const taxa=jurosTaxa(), today=_hojeMeiaNoite();
  let jMensal=0, capMensal=0;
  acertoLedger().forEach(r=>{ if(!r.saldo)return; const mo=+r.ym.slice(5,7), y=+r.ym.slice(0,4); const dt=new Date(y,mo,0); /* último dia do mês */ jMensal+=r.saldo*(taxa/100)*(_diasAte(dt,today)/365); capMensal+=r.saldo; });
  let jExtra=0, capExtra=0;
  acertoExtras().forEach(e=>{ const dt=e.data?new Date(e.data+'T00:00:00'):new Date(e.ano,0,1); jExtra+=e.metade*(taxa/100)*(_diasAte(dt,today)/365); capExtra+=e.metade; });
  return {taxa, jMensal:round2(jMensal), jExtra:round2(jExtra), juros:round2(jMensal+jExtra), capMensal:round2(capMensal), capExtra:round2(capExtra)};
}
function vAcerto(m){

  const dividaMensal=led.length?led[led.length-1].acc:0;
  const extras=acertoExtras(); const extrasTotal=acertoExtrasTotal();
  const divida=round2(dividaMensal+extrasTotal); // total = registo mensal + acertos pontuais
  const jr=computeJuros(); const totalComJuros=round2(divida+jr.juros);
  const ultimoPago=[...led].reverse().find(r=>r.pago>0);
  const nowYm=(function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  // agrupar por ano
  const anos=[...new Set(led.map(r=>+r.ym.slice(0,4)))].sort((x,y)=>y-x); // desc (mais recente primeiro)
  const open=acAnosOpen||new Set([anos[0]]);
  const yearBlock=y=>{
    const rs=led.filter(r=>+r.ym.slice(0,4)===y);
    const d=round2(rs.reduce((s,r)=>s+r.deve,0)), p=round2(rs.reduce((s,r)=>s+r.pago,0));
    const accFim=rs[rs.length-1].acc;

function openAcertoDetail(ym){
  const led=acertoLedger(); const row=led.find(r=>r.ym===ym); if(!row)return;
  const mesNome=MESES[+ym.slice(5,7)-1]+' '+ym.slice(0,4);
  const acIds=acertoCatIds();
  const flagged=state.categorias.filter(c=>c.acerto).map(c=>catName(c.id));
  const movs=state.movimentos.filter(x=>x.tipo==='despesa'&&acIds.has(x.categoriaId)&&x.data.slice(0,7)===ym).sort((a,b)=>a.data.localeCompare(b.data));
  const tot=round2(movs.reduce((s,x)=>s+x.valor,0)); const meio=round2(tot/2);
  let body = row.fwd
    ? `<div class="hint" style="border-left:3px solid var(--acc)">A quota dela é <b>metade (50%)</b> das despesas das contas partilhadas lançadas neste mês.</div>`
    : `<div class="hint" style="border-left:3px solid var(--info)">Valor do <b>histórico</b>: quota dela registada na folha de acerto do Excel (= 50% das despesas partilhadas que o Excel tinha nesse mês − transferências).</div>`;
  if(movs.length){
    body+=`<p class="dsub" style="margin-top:10px">Movimentos das contas partilhadas neste mês (½ de cada):</p>
    <div class="plist" style="max-height:40vh">${movs.map(x=>`<div class="pe"><span style="font-weight:700">${fmt(Math.abs(x.valor))}</span><span style="color:var(--mut)">${esc(catName(x.categoriaId))} · ${x.data.slice(8,10)}/${x.data.slice(5,7)}${x.nota?' · '+esc(x.nota):''}</span><span style="margin-left:auto;color:var(--acc)">½ ${fmt(x.valor/2)}</span></div>`).join('')}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px"><span>Total destes movimentos</span><span>${fmt(tot)} → ½ <b>${fmt(meio)}</b></span></div>`;
  } else if(!row.fwd){
    body+=`<p class="dsub" style="margin-top:10px">Não há movimentos destas categorias lançados na grelha deste mês — o valor vem só da folha de acerto do Excel.</p>`;
  }
  body+=`<div style="display:flex;justify-content:space-between;margin-top:12px;border-top:1px solid var(--line);padding-top:10px"><span>Quota dela${row.fwd?' (½ dos movimentos)':' (valor do Excel)'}</span><b>${fmt(row.deve)}</b></div>
  <div style="display:flex;justify-content:space-between;margin-top:4px"><span>Pago por ela</span><span>${fmt(row.pago)}</span></div>
  <div style="display:flex;justify-content:space-between;margin-top:4px"><span>Saldo do mês</span><b class="${row.saldo>0?'neg':(row.saldo<0?'pos':'')}">${fmt(row.saldo)}</b></div>`;
  if(!row.fwd && movs.length && Math.abs(meio-row.deve)>=5){
    body+=`<div class="hint" style="border-left:3px solid var(--warn);margin-top:10px">⚠️ Diferença relevante: a ½ dos movimentos na grelha (<b>${fmt(meio)}</b>) é menor que o valor do Excel (<b>${fmt(row.deve)}</b>). A folha de acerto incluía mais despesas partilhadas neste mês (ex.: condomínio/seguros) que não estão lançadas na grelha. O histórico usa o valor do Excel.</div>`;
  } else if(!row.fwd && movs.length && Math.abs(meio-row.deve)>=0.5){
    body+=`<p class="dsub" style="margin-top:8px">Pequena diferença (${fmt(meio)} vs Excel ${fmt(row.deve)}): a folha de acerto do Excel incluía um item menor a mais (ex.: NB) que não está nas 4 categorias partilhadas. O histórico usa o valor do Excel.</p>`;
  }
  document.getElementById('back').innerHTML=`<div class="modal"><h2>${svg(I.scale)} ${mesNome} · origem do valor <button class="close" data-close="1">&times;</button></h2>
  <div class="body">${body}<p class="dsub" style="margin-top:12px">Contas partilhadas (50/50): ${flagged.map(esc).join(', ')||'(nenhuma definida — vê em Definições)'}.</p></div>
  <div class="foot"><div class="spacer"></div><button class="btn" data-close="1">Fechar</button></div></div>`;
  openBack();
}

const round2=n=>Math.round((+n||0)*100)/100;
/* aplica um movimento à conta i e espelha no Valete (conta real) como transferência */
function poupApplyMov(y,i,delta,data,nota){
  const yp=state.poupancas[y]; const c=yp.contas[i];
  c.mov=c.mov||[]; c.mov.push({data,valor:delta,nota}); c.valor=round2((+c.valor||0)+delta);
  if(!c.real){
    const ri=yp.contas.findIndex(x=>x.real);
    if(ri>=0 && ri!==i){ const rc=yp.contas[ri]; rc.mov=rc.mov||[]; rc.mov.push({data,valor:-delta,nota:(delta>=0?'→ '+c.nome:'← '+c.nome)}); rc.valor=round2((+rc.valor||0)-delta); }
  }
}
function poupMovAdd(sign){
  const y=val('lgY'),i=+val('lgI');

  poupApplyMov(y,i,sign*Math.abs(v),val('lgData')||isoToday(),val('lgNota'));

function poupSetSaldo(){
  const y=val('lgY'),i=+val('lgI'); const c=state.poupancas[y].contas[i];

}

const CENARIOS={pessimista:{nome:'Pessimista',gRec:0,gDesp:4,juro:0},realista:{nome:'Realista',gRec:2,gDesp:2,juro:1},otimista:{nome:'Otimista',gRec:4,gDesp:1,juro:3}};
function projetar(baseRec,baseDesp,patr0,o){
  const proj=[]; let patr=patr0; const rAnual=(o.reforco||0)*12;
  for(let k=1;k<=o.horizonte;k++){
    const rec=baseRec*Math.pow(1+o.gRec/100,k), desp=baseDesp*Math.pow(1+o.gDesp/100,k);
    let poup=rec-desp; if(rAnual>0) poup=Math.max(poup,rAnual);
    patr=patr*(1+o.juro/100)+poup; proj.push({ano:+o.baseAno+k,rec,desp,poup,patr});
  }
  return proj;
}

function fmtK(n){n=n||0;const a=Math.abs(n);if(a>=1000)return (Math.sign(n)*Math.round(a/100)/10).toLocaleString('pt-PT',{maximumFractionDigits:1})+'k';return Math.round(n).toString();}

          <polyline points="${lineR}" fill="none" stroke="var(--in)" stroke-width="2"/>

          ${sD.map((v,i)=>v>0?`<circle cx="${xB(i).toFixed(1)}" cy="${yB(v).toFixed(1)}" r="2" fill="var(--out)"/>`:'').join('')}
          ${axB}

function inflacaoHistorica(){const cy=new Date().getFullYear();const anos=[...new Set(state.movimentos.filter(m=>m.tipo==='despesa').map(m=>+m.data.slice(0,4)))].sort().filter(y=>y!==cy);const yo=[];for(let i=1;i<anos.length;i++){const a=sumYearOf('despesa',anos[i-1]),b=sumYearOf('despesa',anos[i]);if(a>0&&b>0)yo.push((b-a)/a*100);}return yo.length?round2(mediana(yo)):null;}

/* ================= ANALYTICS ================= */
function anaCatIds(catId){return new Set([catId].concat(childrenOf(catId).map(c=>c.id)));}
function anaSum(catId,year,mi){const ids=anaCatIds(catId);return state.movimentos.filter(m=>m.tipo==='despesa'&&ids.has(m.categoriaId)&&+m.data.slice(0,4)===year&&+m.data.slice(5,7)-1===mi).reduce((a,m)=>a+m.valor,0);}
function anaMonthly(catId,year){const a=[];for(let mi=0;mi<12;mi++)a.push(round2(anaSum(catId,year,mi)));return a;}
function anaYears(catId){const ids=anaCatIds(catId);return [...new Set(state.movimentos.filter(m=>m.tipo==='despesa'&&ids.has(m.categoriaId)&&m.valor>0).map(m=>+m.data.slice(0,4)))].sort();}
function anaCatsList(){const out=[];topCats('despesa').forEach(c=>{out.push(c);childrenOf(c.id).forEach(k=>out.push(k));});return out.filter(c=>state.movimentos.some(m=>m.tipo==='despesa'&&anaCatIds(c.id).has(m.categoriaId)&&m.valor>0));}
function anaCfg(){return Object.assign({spike:30, max:6, min:50, parents:false}, (state.settings&&state.settings.ana)||{});}
function anaAlerts(catId){
  const years=anaYears(catId); if(years.length<2)return [];
  const cur=years[years.length-1], prev=years[years.length-2];
  const curM=anaMonthly(catId,cur), prevM=anaMonthly(catId,prev);
  let lastMi=-1; for(let i=0;i<12;i++)if(curM[i]>0)lastMi=i; if(lastMi<0)return [];
  const curYTD=round2(curM.reduce((a,v)=>a+v,0)), prevTotal=round2(prevM.reduce((a,v)=>a+v,0)), prevYTD=round2(prevM.slice(0,lastMi+1).reduce((a,v)=>a+v,0));
  const al=[];
  if(prevTotal>0 && curYTD>=prevTotal) al.push({lvl:'high',txt:`Já gastaste <b>${fmt(curYTD)}</b> em ${cur} — tanto ou mais do que em <b>todo o ${prev}</b> (${fmt(prevTotal)}).`});
  else if(prevYTD>0 && curYTD>prevYTD*1.15) al.push({lvl:'mid',txt:`Este ano estás <b>${Math.round((curYTD/prevYTD-1)*100)}% acima</b> do mesmo período de ${prev} (${fmt(curYTD)} vs ${fmt(prevYTD)}).`});
  const _spk=1+anaCfg().spike/100;
  for(let i=0;i<=lastMi;i++){ if(prevM[i]>5 && curM[i]>prevM[i]*_spk && curM[i]-prevM[i]>15) al.push({lvl:'mid',txt:`<b>${MESES[i]}</b>: ${fmt(curM[i])} vs ${fmt(prevM[i])} em ${prev} (<b>+${Math.round((curM[i]/prevM[i]-1)*100)}%</b>).`}); }
  return al;
}
/* alertas gerais: varre as categorias-folha (Luz, Gás, …) com gasto relevante e devolve os mais importantes */
function anaGlobalAlerts(){
  const cfg=anaCfg();
  const leaves=[]; topCats('despesa').forEach(c=>{const ch=childrenOf(c.id); if(ch.length){if(cfg.parents)leaves.push(c);ch.forEach(k=>leaves.push(k));} else leaves.push(c);});
  const out=[];
  leaves.forEach(c=>{
    const years=anaYears(c.id); if(years.length<2)return;
    const prevTotal=round2(anaMonthly(c.id,years[years.length-2]).reduce((a,v)=>a+v,0));
    if(prevTotal<cfg.min)return; // ignora categorias pequenas (ruído)
    anaAlerts(c.id).forEach(a=>out.push(Object.assign({cat:catName(c.id),catId:c.id,mag:(a.lvl==='high'?1e9:0)+prevTotal},a)));
  });
  const ref=mesesDespesa().slice(-1)[0]||nowYm();
  out.forEach((it,i)=>{it._key='ana:'+it.catId+':'+it.lvl+':'+i+':'+ref;it._v=0;it._txt=it.cat+' · '+String(it.txt).replace(/<[^>]+>/g,'');});
  const outU=out.filter(it=>!alertRead(it._key,it._v));
  outU.sort((a,b)=>b.mag-a.mag);
  return outU.slice(0,cfg.max);
}

/* ----- Utilities · vigilância (Luz/Água/Gás/Telecom) ----- */
function utilitiesCats(){
  const _n=s=>(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();
  const par=topCats('despesa').find(c=>/utilit/.test(_n(c.nome)));
  let leaves=[];
  if(par){ const ch=childrenOf(par.id); leaves=ch.length?ch.slice():[par]; }
  if(!leaves.length){ // fallback: apanha por nome
    const all=[]; topCats('despesa').forEach(c=>{const ch=childrenOf(c.id); if(ch.length)ch.forEach(k=>all.push(k)); else all.push(c);});
    leaves=[/luz|eletric|edp|endesa/, /\bagua\b/, /\bgas\b|gascan/, /telecom|\bnos\b|\btv\b|internet/].map(p=>all.find(c=>p.test(_n(c.nome)))).filter(Boolean);
  }
  const seen=new Set(); return leaves.filter(c=>c&&!seen.has(c.id)&&seen.add(c.id));
}
/* N valores mensais terminando em (year,mi), cronológico */
function anaTrailing(catId,year,mi,n){const out=[];for(let k=n-1;k>=0;k--){let y=year,m=mi-k;while(m<0){m+=12;y--;}out.push(round2(anaSum(catId,y,m)));}return out;}
function _spark(vals,w,h){
  const max=Math.max(1,...vals), n=vals.length;
  const xx=i=>n>1?(i/(n-1))*(w-4)+2:w/2, yy=v=>h-2-(v/max)*(h-4);
  const pts=vals.map((v,i)=>`${xx(i).toFixed(1)},${yy(v).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:block;margin-left:auto"><polyline points="${pts}" fill="none" stroke="var(--mut)" stroke-width="1.4" opacity=".85"/><circle cx="${xx(n-1).toFixed(1)}" cy="${yy(vals[n-1]).toFixed(1)}" r="2.1" fill="var(--acc)"/></svg>`;
}
/* normal sazonal de uma rubrica para um mês-do-ano = mediana desse mês nos OUTROS anos (fallback: mediana geral) */
function anaSeasonalBaseline(catId,mi,exclY){
  const vals=anaYears(catId).filter(y=>y!==exclY).map(y=>round2(anaSum(catId,y,mi))).filter(v=>v>0);
  if(vals.length)return round2(mediana(vals));
  const all=[]; anaYears(catId).forEach(y=>{for(let i=0;i<12;i++){const v=round2(anaSum(catId,y,i));if(v>0)all.push(v);}});
  return all.length?round2(mediana(all)):0;
}
/* avisos sazonais/históricos: gás alto no verão, telecom (mensalidade fixa) que mudou, mês acima do normal para a época */
function anaSeasonalAlerts(refY,refMi){
  const cats=utilitiesCats(); const out=[]; const thr=1+anaCfg().spike/100;
  const _n=s=>(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
  const ym=refY+'-'+String(refMi+1).padStart(2,'0');
  const season=(refMi>=5&&refMi<=8)?'verao':((refMi===11||refMi<=1)?'inverno':'meia');
  cats.forEach(c=>{
    const val=round2(anaSum(c.id,refY,refMi)); if(val<=0)return;
    const nm=_n(c.nome), isGas=/gas/.test(nm), isTel=/telecom|\bnos\b|\btv\b|internet/.test(nm), isLuz=/luz|eletric/.test(nm);
    if(isTel){ // mensalidade fixa: qualquer desvio relevante face ao habitual conta
      const allv=[]; anaYears(c.id).forEach(y=>{for(let i=0;i<12;i++){const v=round2(anaSum(c.id,y,i));if(v>0)allv.push(v);}});
      const med=allv.length?round2(mediana(allv)):0;
      if(med>0&&Math.abs(val-med)>=Math.max(3,med*0.08)) out.push({catId:c.id,nome:c.nome,lvl:val>med?'mid':'low',key:'util:'+c.id+':seas:'+ym,v:val,txt:`<b>${esc(c.nome)}</b>: ${fmt(val)} em ${MESES[refMi]} — a mensalidade costuma ser <b>${fmt(med)}</b> (${val>med?'+':''}${Math.round((val/med-1)*100)}%). ${val>med?'Confere alteração de tarifário ou um extra.':'Desconto ou menos consumo este mês.'}`});
      return;
    }
    const base=anaSeasonalBaseline(c.id,refMi,refY);
    if(base>0 && val>=base*thr && (val-base)>5){
      let extra='';
      if(isGas&&season==='verao') extra=' No verão o gás costuma ser baixo (menos aquecimento/água quente) — vale a pena verificar.';
      else if(isLuz&&season==='verao') extra=' No verão pode ser ar condicionado/ventoinhas.';
      else if(season==='verao') extra=' Acima do habitual para o verão.';
      out.push({catId:c.id,nome:c.nome,lvl:'mid',key:'util:'+c.id+':seas:'+ym,v:val,txt:`<b>${esc(c.nome)}</b> ${fmt(val)} em ${MESES[refMi]} — o normal para ${MESES[refMi]} ronda <b>${fmt(base)}</b> (<b>+${Math.round((val/base-1)*100)}%</b>).${extra}`});
    }
  });
  return out;
}
/* heatmap do ano: rubrica × 12 meses, cor = desvio face ao normal sazonal do mês */
function anaUtilHeatmap(refY,refMi,cats){
  const heatCol=r=>{ if(r==null)return 'transparent'; if(r>=1.5)return 'rgba(223,140,125,.50)'; if(r>=1.2)return 'rgba(223,140,125,.28)'; if(r>=1.08)return 'rgba(217,168,92,.26)'; if(r<=0.8)return 'rgba(140,186,152,.26)'; return 'var(--card2)'; };

      const v=round2(anaSum(c.id,refY,i)), base=anaSeasonalBaseline(c.id,i,refY), r=(v>0&&base>0)?v/base:null;
      const t=v>0?`${c.nome} ${MESES[i]} ${refY}: ${fmt(v)}${base>0?` · normal ~${fmt(base)} (${r>=1?'+':''}${Math.round((r-1)*100)}%)`:''}`:`${c.nome} ${MESES[i]}: sem dados`;

  return `<div style="margin-top:14px"><div class="dsub" style="margin-bottom:6px">Mapa do ano <b>${refY}</b> — cor = desvio face ao normal do mês (verde abaixo · âmbar/vermelho acima). Toca numa célula para o detalhe.</div>
    <div class="gridwrap"><table class="utilheat"><thead>${head}</thead><tbody>${rows}</tbody></table></div></div>`;
}
/* painel de vigilância das Utilities: navegável por mês (default = mês atual); valor, Δ vs mês anterior, valor+Δ homólogo, sparkline 12m + avisos sazonais + heatmap */
function anaUtilitiesPanel(){
  const cats=utilitiesCats(); if(!cats.length)return '';
  // meses com gasto nas utilities (para navegar)
  const yms=[...new Set(state.movimentos.filter(m=>m.tipo==='despesa'&&cats.some(c=>anaCatIds(c.id).has(m.categoriaId))&&m.valor>0).map(m=>m.data.slice(0,7)))].sort();
  if(!yms.length)return '';
  const now=new Date(), nowYm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const def=[...yms].reverse().find(ym=>ym<=nowYm)||yms[yms.length-1]; // mês atual (ou o último real ≤ hoje)
  const refYm=(utilNavYm&&yms.includes(utilNavYm))?utilNavYm:def;

  const prevOf=(c)=>refMi>0?round2(anaSum(c.id,cur,refMi-1)):round2(anaSum(c.id,cur-1,11));
  const isDispro=(val,yoy,med)=>val>0 && (yoy>0?val>=yoy*thr:(med>0&&val>=med*thr)) && (med>0?val>med:true);
  const dchip=(val,base)=>{ if(!(base>0))return '<span style="color:var(--mut)">·</span>'; const d=Math.round((val/base-1)*100); const col=d>0?'var(--out)':(d<0?'var(--in)':'var(--mut)'); const ar=d>0?'▲':(d<0?'▼':'='); return `<span style="color:${col};font-variant-numeric:tabular-nums" title="${fmt(val)} vs ${fmt(base)}">${ar} ${d>0?'+':''}${d}%</span>`; };
  const seasonal=anaSeasonalAlerts(cur,refMi); const seasonalSet=new Set(seasonal.map(a=>a.catId));

  const disproExtra=dispro.filter(d=>!seasonalSet.has(d.catId)).map(d=>({catId:d.catId,lvl:'mid',key:'util:'+d.catId+':disp:'+refYm,v:d.val,txt:`<b>${esc(d.nome)}</b> ${fmt(d.val)} em ${MESES[refMi]} — +${Math.round((d.val/d.base-1)*100)}% vs ${d.baseLbl}.`}));
  const insights=seasonal.concat(disproExtra).filter(a=>!alertRead(a.key,a.v||0));
  const hotSet=new Set(insights.map(a=>a.catId));
  const row=c=>{
    const val=round2(anaSum(c.id,cur,refMi)), prevM=prevOf(c), yoy=round2(anaSum(c.id,cur-1,refMi)), tr=anaTrailing(c.id,cur,refMi,12);
    const hot=hotSet.has(c.id);
    return `<tr${hot?' style="background:rgba(223,140,125,.10)"':''}>
      <td style="white-space:nowrap">${catIconHtml(c,20)} <span style="vertical-align:middle">${esc(c.nome)}</span>${hot?' <span title="Fora do padrão — vê os avisos acima" style="color:var(--out)">⚠</span>':''}</td>
      <td class="num">${val>0?fmtn(val):'·'}</td><td class="num">${dchip(val,prevM)}</td>
      <td class="num utilhide">${yoy>0?fmtn(yoy):'·'}</td><td class="num">${dchip(val,yoy)}</td>
      <td class="utilhide" style="text-align:right">${_spark(tr,92,26)}</td></tr>`;
  };
  const body=cats.map(row).join('');
  const totAt=(y,mi)=>round2(cats.reduce((s,c)=>s+anaSum(c.id,y,mi),0));
  const totVal=totAt(cur,refMi), totPrev=refMi>0?totAt(cur,refMi-1):totAt(cur-1,11), totYoy=totAt(cur-1,refMi);
  const totTr=[]; for(let k=11;k>=0;k--){let y=cur,m=refMi-k;while(m<0){m+=12;y--;}totTr.push(totAt(y,m));}
  const nav=`<span class="utilnav"><button data-utilnav="${idx>0?yms[idx-1]:''}"${idx<=0?' disabled':''} aria-label="Mês anterior">‹</button><b>${MESES[refMi]} ${cur}</b><button data-utilnav="${idx<yms.length-1?yms[idx+1]:''}"${idx>=yms.length-1?' disabled':''} aria-label="Mês seguinte">›</button></span>`;
  return `<div class="card ana-util" style="margin-bottom:14px">

function vAnalytics(m){
  const cats=anaCatsList();
  if(!cats.length){ m.innerHTML=`<div class="card" style="text-align:center;color:var(--mut);padding:30px">Sem despesas suficientes para analisar. Lança movimentos na Grelha.</div>`; return; }
  if(!anaCat || !cats.some(c=>c.id===anaCat)){ anaCat=cats.map(c=>({id:c.id,n:anaYears(c.id).length})).sort((a,b)=>b.n-a.n)[0].id; }
  const years=anaYears(anaCat).slice(-4);
  const glob=anaGlobalAlerts();
  const monthlyByYear={}; years.forEach(y=>monthlyByYear[y]=anaMonthly(anaCat,y));
  const cur=years[years.length-1], prev=years.length>1?years[years.length-2]:null;
  const curM=monthlyByYear[cur]||[], prevM=prev?monthlyByYear[prev]:[];
  let lastMi=-1; for(let i=0;i<12;i++)if(curM[i]>0)lastMi=i;
  const curYTD=round2(curM.reduce((a,v)=>a+v,0)), prevTotal=prev?round2(prevM.reduce((a,v)=>a+v,0)):0, prevYTD=prev?round2(prevM.slice(0,lastMi+1).reduce((a,v)=>a+v,0)):0;
  const al=anaAlerts(anaCat);
  const ycol=y=>(['var(--acc)','var(--info)','var(--warn)','#9aa79e','#a78bfa'][years.length-1-years.indexOf(y)]||'var(--mut)');
  const useCum=anaCum;
  const series={}; years.forEach(y=>{let run=0;series[y]=monthlyByYear[y].map(v=>{run=round2(run+v);return useCum?run:v;});});
  const maxV=Math.max(1,...[].concat.apply([],years.map(y=>series[y])));
  const W=700,H=230,padL=8,padR=8,padT=12,padB=22, xx=i=>padL+(W-padL-padR)*(i/11), yy=v=>padT+(H-padT-padB)*(1-v/maxV);
  const grid=[0,.25,.5,.75,1].map(f=>`<line x1="${padL}" y1="${(padT+(H-padT-padB)*(1-f)).toFixed(0)}" x2="${W-padR}" y2="${(padT+(H-padT-padB)*(1-f)).toFixed(0)}" stroke="var(--line)" stroke-width="1" opacity=".5"/>`).join('');
  const linesSvg=years.map(y=>{const pts=series[y].map((v,i)=>`${xx(i).toFixed(1)},${yy(v).toFixed(1)}`).join(' ');const dots=series[y].map((v,i)=>(monthlyByYear[y][i]>0||useCum)?`<circle cx="${xx(i).toFixed(1)}" cy="${yy(v).toFixed(1)}" r="2.4" fill="${ycol(y)}"/>`:'').join('');return `<polyline points="${pts}" fill="none" stroke="${ycol(y)}" stroke-width="${y===cur?2.4:1.6}" opacity="${y===cur?1:.8}"/>${dots}`;}).join('');
  const xlabels=MC.map((mc,i)=>`<text x="${xx(i).toFixed(0)}" y="${H-6}" text-anchor="middle" font-size="9" fill="var(--mut)">${mc}</text>`).join('');
  const legend=years.map(y=>`<span style="display:inline-flex;align-items:center;gap:5px;margin-right:12px"><span style="width:12px;height:3px;background:${ycol(y)};border-radius:2px;display:inline-block"></span>${y}</span>`).join('');
  m.innerHTML=`
  ${anaUtilitiesPanel()}
  ${glob.length?`<div class="card" style="margin-bottom:14px"><h3 class="dh">${svg(I.bell)} Alertas — todas as categorias</h3><p class="dsub" style="margin-top:-6px">Despesas que dispararam face a anos anteriores. Toca para analisar.</p>${glob.map(a=>`<div class="hint" data-anasel="${a.catId}" style="border-left:3px solid ${a.lvl==='high'?'var(--out)':'var(--warn)'};margin-bottom:8px;cursor:pointer"><b>${esc(a.cat)}</b> · ${a.txt}</div>`).join('')}</div>`:`<div class="hint" style="margin-bottom:14px;border-left:3px solid var(--in)">Sem alertas gerais — os consumos estão dentro do padrão dos anos anteriores ✓</div>`}
  <div class="card" style="margin-bottom:14px"><label>Analisar categoria em detalhe</label>
    <select id="anaCatSel" style="width:100%">${cats.map(c=>`<option value="${c.id}" ${c.id===anaCat?'selected':''}>${esc(catName(c.id))}</option>`).join('')}</select>
  </div>
  ${years.length<2?`<div class="hint" style="margin-bottom:14px">Só há dados de <b>${years[0]||'—'}</b> nesta categoria. A comparação ano-a-ano aparece com pelo menos dois anos.</div>`:''}
  <div class="kstrip">
    <div class="kbox k-accent"><div class="l">${cur} · até ${lastMi>=0?MC[lastMi]:'—'}</div><div class="v">${fmt0(curYTD)}</div></div>
    ${prev?`<div class="kbox k-accent k-info"><div class="l">${prev} · mesmo período</div><div class="v">${fmt0(prevYTD)}</div>${prevYTD>0?`<div style="font-size:12px;color:${curYTD>prevYTD?'var(--out)':'var(--in)'}">${curYTD>=prevYTD?'+':''}${Math.round((curYTD/prevYTD-1)*100)}%</div>`:''}</div>`:''}
    ${prev?`<div class="kbox k-accent k-warn"><div class="l">${prev} · ano inteiro</div><div class="v">${fmt0(prevTotal)}</div></div>`:''}
  </div>
  ${al.length?`<div class="card" style="margin-bottom:14px"><h3 class="dh">${svg(I.bell)} Alertas</h3>${al.map(a=>`<div class="hint" style="border-left:3px solid ${a.lvl==='high'?'var(--out)':'var(--warn)'};margin-bottom:8px">${a.txt}</div>`).join('')}</div>`:`<div class="hint" style="margin-bottom:14px;border-left:3px solid var(--in)">Sem alertas para esta categoria — dentro do padrão dos anos anteriores ✓</div>`}
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap">
      <h3 class="dh" style="margin:0">${svg(I.trend)} ${useCum?'Acumulado por ano':'Mês a mês, ano a ano'}</h3>
      <div class="seg"><button class="${!useCum?'on':''}" data-anacum="0">Mensal</button><button class="${useCum?'on':''}" data-anacum="1">Acumulado</button></div>
    </div>
    <div style="font-size:12px;color:var(--mut);margin-bottom:6px">${legend}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:230px">${grid}${linesSvg}${xlabels}</svg>
    <div class="hint" style="margin-top:8px">${useCum?'As linhas a cruzarem-se mostram quando o ano atual atinge o total do ano anterior.':'Cada linha é um ano. Picos acima da linha do ano anterior = consumo a subir nesse mês.'}</div>
  </div>
  <div class="gridwrap"><table class="sumtable ana-table">
    <thead><tr><th>Mês</th>${years.map(y=>`<th class="num" style="color:${ycol(y)}">${y}</th>`).join('')}</tr></thead>
    <tbody>${MESES.map((nm,i)=>`<tr><td>${nm}</td>${years.map(y=>{const v=monthlyByYear[y][i];return `<td class="num">${v>0?fmtn(v):'·'}</td>`;}).join('')}</tr>`).join('')}</tbody>
    <tfoot><tr><td>Total</td>${years.map(y=>`<td class="num"><b>${fmtn(round2(monthlyByYear[y].reduce((a,v)=>a+v,0)))}</b></td>`).join('')}</tr></tfoot>
  </table></div>
  ${(state.alertLog&&state.alertLog.length)?`<div class="card" style="margin-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><h3 class="dh" style="margin:0">${svg(I.bell)} Arquivo de alertas <span style="color:var(--mut);font-weight:600;font-size:13px">· ${state.alertLog.length}</span></h3><button class="btn sm" data-alertlogclear="1">Limpar arquivo</button></div>
    <p class="dsub" style="margin-top:6px">Alertas que marcaste como lidos (sino e Utilities). Voltam a aparecer se a situação piorar significativamente.</p>
    <input id="arqFilter" placeholder="Filtrar por categoria ou texto…" style="width:100%;margin:0 0 8px">
    <div class="plist" id="arqList" style="max-height:340px">${state.alertLog.map(l=>`<div class="pe"><span style="flex:1;font-size:12.5px">${esc(l.txt)}</span><span style="color:var(--mut);font-size:11px;white-space:nowrap;margin-left:8px">${new Date(l.ts).toLocaleDateString('pt-PT')}</span></div>`).join('')}</div>
  </div>`:''}`;
}

function catTree(tipo){return topCats(tipo).map(c=>{
  const kids=childrenOf(c.id); const open=defCatOpen.has(c.id);
  const lead = kids.length? `<button class="iconbtn" data-defcatopen="${c.id}" style="padding:2px;flex:none" title="${open?'Fechar':'Abrir'} (${kids.length})">${open?'▾':'▸'}</button>` : '<span style="width:18px;display:inline-block;flex:none"></span>';
  const badge = kids.length? `<span class="catcount" data-defcatopen="${c.id}" title="${open?'Fechar':'Abrir'} sub-categorias">${kids.length}</span>` : '';
  let h=catRow(c,false,lead,badge);
  if(open) h+=kids.map(k=>catRow(k,true)).join('');
  return h;
}).join('');}

let dragCat=null;
function nestCat(fromId,toId){
  const from=cat(fromId),to=cat(toId); if(!from||!to||fromId===toId)return;
  if(from.tipo!==to.tipo){ toast('Categorias de tipos diferentes'); return; }
  if(hasKids(fromId)){ toast('Tem sub-categorias — esvazia/move-as primeiro'); return; }
  const toTop = to.parent?to.parent:to.id;
  if(toTop===fromId){ return; }
  if(from.parent===toTop){ toast('Já está nesse grupo'); return; }
  from.parent=toTop; save(); render(); toast(`"${from.nome}" → dentro de "${cat(toTop).nome}"`);
}
function unnestCat(id){ const c=cat(id); if(!c||!c.parent)return; c.parent=null; save(); render(); toast(`"${c.nome}" passou a coluna principal`); }
function renameCat(id){ const c=cat(id); if(!c)return; const nv=prompt('Novo nome da categoria:',c.nome); if(nv&&nv.trim()){ c.nome=nv.trim(); save(); render(); toast('Categoria renomeada'); } }
function reorderBefore(fromId,beforeId){
  const from=cat(fromId),before=cat(beforeId); if(!from||!before||fromId===beforeId)return;
  if(from.tipo!==before.tipo){ toast('Categorias de tipos diferentes'); return; }
  const targetParent=before.parent||null;
  if(hasKids(fromId)&&targetParent){ toast('Um grupo não pode ir para dentro de outro'); return; }
  from.parent=targetParent;
  const sibs=catsOf(from.tipo).filter(c=>(c.parent||null)===targetParent && c.id!==fromId);
  let idx=sibs.findIndex(c=>c.id===beforeId); if(idx<0)idx=sibs.length;
  sibs.splice(idx,0,from);
  sibs.forEach((c,k)=>c.ordem=k);
  save(); render(); toast('Reordenado');
}
function clearDropFx(){ document.querySelectorAll('.th-drop,.th-before').forEach(x=>x.classList.remove('th-drop','th-before')); }
function dropMode(e,th){ const r=th.getBoundingClientRect(); return (e.clientX-r.left) < r.width*0.4 ? 'before' : 'nest'; }

document.addEventListener('drop',e=>{ if(!dragCat)return; const top=e.target.closest('th[data-droptop]'); const t=e.target.closest('th[data-cat]'); e.preventDefault(); clearDropFx(); if(top){ unnestCat(dragCat); } else if(t){ if(dropMode(e,t)==='before') reorderBefore(dragCat,t.dataset.cat); else nestCat(dragCat,t.dataset.cat); } dragCat=null; });

/* ===== LEMBRETES DE DÉBITOS ===== */
/* despesas fixas (com dia aprendido das faturas) ainda não pagas este mês, a vencer nos próximos `dias` */
function proximosDebitos(dias){
  const d=new Date();const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0');const dim=new Date(Y,M+1,0).getDate();
  if(typeof dias!=='number')dias=99;
  // agendados (faturas com débito futuro) — valor EXATO, marcados como confirmados
  const pend=(state.movimentos||[]).filter(m=>m.tipo==='despesa'&&m.pendente&&m.data.slice(0,7)===ymCur)
    .map(m=>({nome:catName(m.categoriaId),catId:m.categoriaId,valor:Math.abs(m.valor),dia:Math.min(dim,Math.max(1,+m.data.slice(8,10))),agendado:true}));
  // estimativa pelas fixas, excluindo categorias que já têm movimento este mês (inclui os agendados)
  const est=(state.recorrencias||[]).filter(r=>r.ativo!==false).map(r=>({
    nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),
    catId:r.categoriaId, valor:medValorFixa(r), dia:Math.min(dim,Math.max(1,+r.dia||8)),
    pago:catMesTotal(r.categoriaId,ymCur)>0
  })).filter(x=>!x.pago && x.valor>0);
  return [...pend,...est].filter(x=>x.dia>=today && x.dia<=today+dias).sort((a,b)=>a.dia-b.dia);
}
async function notifToggle(){
  if(state.settings.notif){ state.settings.notif=false; save(); render(); toast('Notificações desligadas'); return; }
  if('Notification' in window){
    try{ const p=await Notification.requestPermission(); if(p!=='granted'){ toast('Permissão negada — verás os lembretes só dentro da app'); } }catch(e){}
  }
  state.settings.notif=true; save(); render(); toast('Lembretes ativados'); lembreteBoot(true);
}
function lembreteBoot(force){
  try{
    if(!isUnlocked())return;
    const hoje=isoToday();
    if(!force && localStorage.getItem('casa-lembrete')===hoje) return; // 1x por dia
    const due=proximosDebitos(3);
    localStorage.setItem('casa-lembrete',hoje);
    if(!due.length)return;
    const d=new Date(),today=d.getDate();
    const quando=x=>x.dia===today?'hoje':(x.dia===today+1?'amanhã':'dia '+x.dia);
    const txt=due.map(x=>`${x.nome} ~${fmt(x.valor)} (${quando(x)})`).join(' · ');
    toast('💡 Débitos a chegar: '+txt);
    if(state.settings.notif && 'Notification' in window && Notification.permission==='granted'){
      try{ new Notification('CASA · débitos a chegar',{body:due.map(x=>`${x.nome} ~${fmt(x.valor)} ${quando(x)}`).join('\n')}); }catch(e){}
    }
  }catch(e){}
}

function _norm(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function openSearch(){
  document.getElementById('back').innerHTML=`<div class="modal"><h2>${svg(I.search)} Pesquisar movimentos <button class="close" data-close="1">&times;</button></h2>
  <div class="body">
    <input id="searchq" type="text" placeholder="categoria, nota, valor, mês… (ex: luz, 42, jun 2025, receita)" autocomplete="off" style="font-size:15px">
    <div id="searchres" style="margin-top:10px;max-height:50vh;overflow:auto"></div>
  </div></div>`;
  openBack();
  const inp=document.getElementById('searchq');
  inp.addEventListener('input',searchRender);
  setTimeout(()=>inp.focus(),50);
  searchRender();
}
function searchRender(){
  const q=_norm(document.getElementById('searchq').value).trim();
  const res=document.getElementById('searchres');
  if(q.length<1){res.innerHTML=`<div class="hint">Escreve para procurar em todos os anos. Podes combinar termos (ex: <b>super junho</b>).</div>`;return;}
  const terms=q.split(/\s+/).filter(Boolean);
  const hits=state.movimentos.filter(m=>{
    const d=m.data; const mes=MESES[+d.slice(5,7)-1]||''; const ano4=d.slice(0,4);
    const hay=_norm([d,mes,ano4,m.tipo,catName(m.categoriaId),m.nota||'',Math.abs(m.valor).toFixed(2),Math.abs(m.valor).toFixed(2).replace('.',',')].join(' '));
    return terms.every(t=>hay.includes(t));
  }).sort((a,b)=>b.data.localeCompare(a.data)).slice(0,80);
  if(!hits.length){res.innerHTML=`<div class="pempty">Nada encontrado.</div>`;return;}
  const total=hits.reduce((a,m)=>a+(m.tipo==='despesa'?-Math.abs(m.valor):m.valor),0);
  res.innerHTML=`<div style="font-size:12px;color:var(--mut);margin-bottom:6px">${hits.length} resultado(s)${hits.length>=80?' (mostro os 80 mais recentes)':''} · saldo ${fmt(round2(total))}</div>`+
    hits.map(m=>{const neg=m.tipo==='despesa'||m.valor<0;return `<div class="srow" data-go="${m.id}" style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer">
      <span style="width:74px;font-size:11.5px;color:var(--mut)">${m.data.slice(8,10)}/${m.data.slice(5,7)}/${m.data.slice(0,4)}</span>
      <span style="flex:1;font-size:13px">${esc(catName(m.categoriaId))}${m.nota?` <span style="color:var(--mut);font-size:11.5px">· ${esc(m.nota)}</span>`:''}${m.cash?' 💵':''}</span>
      <span style="font-weight:700;color:${neg?'var(--out)':'var(--in)'}">${neg?'−':'+'}${fmt(Math.abs(m.valor))}</span></div>`;}).join('');
}

  const targets=topCats(c.tipo).filter(t=>t.id!==id);

      </select>

        <button class="btn sm danger" id="doMerge" style="flex:none">${svg(I.move)} Fundir</button>
      </div>
    </div>`:''}

function mergeCat(){
  const fromId=val('mvCatId'); const toId=document.getElementById('mvMerge').value;
  if(!toId){toast('Escolhe a categoria destino');return;}
  if(toId===fromId||hasKids(fromId))return;
  const from=cat(fromId), to=cat(toId);
  if(!confirm(`Fundir "${from.nome}" em "${catName(toId)}"? Os lançamentos de "${from.nome}" passam para lá e a categoria é eliminada. Afeta todos os anos.`))return;
  state.movimentos.forEach(m=>{ if(m.categoriaId===fromId) m.categoriaId=toId; });
  state.recorrencias.forEach(r=>{ if(r.categoriaId===fromId) r.categoriaId=toId; });
  state.categorias=state.categorias.filter(x=>x.id!==fromId);
  save();closeBack();render();toast('Categorias fundidas');
}
function saveMoveCat(){
  const id=val('mvCatId'); const c=cat(id); if(!c)return;
  const newParent=document.getElementById('mvParent').value||null;
  if(newParent){
    if(newParent===id){toast('Não pode ser pai de si própria');return;}
    if(hasKids(id)){toast('Tem sub-categorias — não pode ser aninhada');return;}
    const p=cat(newParent); if(p && p.parent){toast('Só se pode aninhar 1 nível');return;}
  }
  c.parent=newParent;
  save();closeBack();render();toast('Categoria movida');
}

/* ===== Sincronização com a Dropbox (OAuth PKCE, código manual — sem servidor) ===== */
const DBX_FILE='/CASA-dados.json';
let _dbxTok=null,_dbxTokExp=0,_syncTimer=null,_syncing=false,_lastSync=null,_syncErr=null;
function dbxCfg(){try{return JSON.parse(localStorage.getItem('casa-dropbox')||'null');}catch(e){return null;}}
function dbxSet(c){localStorage.setItem('casa-dropbox',JSON.stringify(c));}
function dbxOn(){const c=dbxCfg();return !!(c&&c.refresh);}
function _b64url(buf){let s=btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));return s.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return _b64url(a.buffer);}
async function _pkce(){const verifier=_rand(48);if(crypto.subtle){try{const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier));return{verifier,challenge:_b64url(d),method:'S256'};}catch(e){}}return{verifier,challenge:verifier,method:'plain'};}
async function dbxStartAuth(){
  const key=(val('dbxKey')||'').trim(); if(!key){toast('Cola a App key da Dropbox');return;}
  const p=await _pkce(); dbxSet({key,verifier:p.verifier,pending:true});
  const url='https://www.dropbox.com/oauth2/authorize?client_id='+encodeURIComponent(key)+'&response_type=code&token_access_type=offline&code_challenge='+p.challenge+'&code_challenge_method='+p.method;
  window.open(url,'_blank'); render();
}
async function dbxFinishAuth(){
  const c=dbxCfg(); const code=(val('dbxCode')||'').trim();
  if(!c||!c.verifier){toast('Recomeça a ligação');return;} if(!code){toast('Cola o código');return;}
  try{
    const body=new URLSearchParams({code,grant_type:'authorization_code',client_id:c.key,code_verifier:c.verifier});
    const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    if(!r.ok)throw new Error('token '+r.status);
    const j=await r.json(); dbxSet({key:c.key,refresh:j.refresh_token});
    _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000;
    toast('Dropbox ligada ✓'); await syncOpen(); render();
  }catch(e){toast('Falha a ligar: '+e.message); _syncErr=e.message; render();}
}
function dbxDisconnect(){ if(!confirm('Desligar a sincronização com a Dropbox? Os dados na Dropbox mantêm-se; este dispositivo deixa de sincronizar.'))return; localStorage.removeItem('casa-dropbox');_dbxTok=null;_lastSync=null;_syncErr=null;toast('Dropbox desligada');render();}
async function dbxToken(){
  const c=dbxCfg(); if(!c||!c.refresh)return null;
  if(_dbxTok&&Date.now()<_dbxTokExp)return _dbxTok;
  const body=new URLSearchParams({grant_type:'refresh_token',refresh_token:c.refresh,client_id:c.key});
  const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok)throw new Error('refresh '+r.status); const j=await r.json();
  _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000; return _dbxTok;
}
async function dbxUploadPath(path,text){
  const tok=await dbxToken(); if(!tok)throw new Error('sem ligação');
  const r=await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path,mode:'overwrite',mute:true})},body:text});
  if(!r.ok)throw new Error('upload '+r.status);
}
async function dbxUpload(text){ return dbxUploadPath(DBX_FILE,text); }
async function dbxList(folder){
  const tok=await dbxToken(); if(!tok)return [];
  const r=await fetch('https://api.dropboxapi.com/2/files/list_folder',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({path:folder})});
  if(!r.ok)return []; const j=await r.json(); return j.entries||[];
}
async function dbxDelete(path){
  const tok=await dbxToken(); if(!tok)return;
  await fetch('https://api.dropboxapi.com/2/files/delete_v2',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({path})});
}
/* cópia de segurança diária (1 por dia) em /backups; mantém só as últimas 3 */
async function dailyBackup(){
  if(!dbxOn())return;
  const today=isoToday();
  if(localStorage.getItem('casa-lastbackup')===today)return; // já feita hoje neste dispositivo
  try{
    await dbxUploadPath('/backups/CASA-'+today+'.json', JSON.stringify(state));
    localStorage.setItem('casa-lastbackup',today);
    const files=(await dbxList('/backups')).filter(e=>e['.tag']==='file'&&/^CASA-\d{4}-\d{2}-\d{2}\.json$/.test(e.name)).map(e=>e.name).sort();
    const KEEP=3;
    if(files.length>KEEP){ for(const nm of files.slice(0,files.length-KEEP)){ await dbxDelete('/backups/'+nm); } }
  }catch(e){ /* silencioso — backup é best-effort */ }
}
async function dbxDownload(){
  const tok=await dbxToken(); if(!tok)throw new Error('sem ligação');
  const r=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Dropbox-API-Arg':JSON.stringify({path:DBX_FILE})}});
  if(r.status===409)return null; if(!r.ok)throw new Error('download '+r.status); return r.text();
}
function syncSchedule(){ if(!dbxOn())return; clearTimeout(_syncTimer); _syncTimer=setTimeout(()=>syncPush(),2500); }
function _syncUI(){ if(tab==='defs')render(); }
async function syncPush(){
  if(!dbxOn()||!_dirty||_syncing)return; _syncing=true;_syncErr=null;_syncUI();
  try{ await dbxUpload(JSON.stringify(state)); _dirty=false; _lastSync=Date.now(); }
  catch(e){ _syncErr=e.message; } finally{ _syncing=false;_syncUI(); }
}
async function syncPullNow(){
  if(!dbxOn())return; _syncing=true;_syncErr=null;_syncUI();
  try{ const txt=await dbxDownload(); if(txt){ const remote=JSON.parse(txt); state=remote; persist(); load(); _lastSync=Date.now(); toast('Recebido da Dropbox'); } else { toast('Ainda não há cópia na Dropbox'); } }
  catch(e){ _syncErr=e.message; toast('Falha: '+e.message); } finally{ _syncing=false; render(); }
}
async function syncOpen(){ /* ao abrir: adota o remoto se for mais recente; senão envia o local */
  if(!dbxOn())return; _syncing=true;_syncUI();
  try{
    const txt=await dbxDownload();
    if(txt){ const remote=JSON.parse(txt);
      if((remote._updated||0)>(state._updated||0)){ state=remote; persist(); load(); _lastSync=Date.now(); _syncErr=null; _syncing=false; render(); toast('Sincronizado da Dropbox'); return; }
    }
    _dirty=true; _syncing=false; await syncPush(); // remoto inexistente/antigo → envia o local
  }catch(e){ _syncErr=e.message; } finally{ _syncing=false; _syncUI(); }
}

/* ===== Importar fatura PDF — 100% local (o PDF nunca sai do dispositivo) ===== */
let _pdfjs=null;
async function loadPdfjs(){
  if(_pdfjs)return _pdfjs;
  const m=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.min.mjs');
  try{ m.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.worker.min.mjs'; }catch(e){}
  _pdfjs=m; return m;
}
async function extractPdfText(file){
  const pdfjs=await loadPdfjs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjs.getDocument({data:new Uint8Array(buf)}).promise;
  let txt='';
  for(let i=1;i<=pdf.numPages;i++){ const pg=await pdf.getPage(i); const c=await pg.getTextContent(); txt+=c.items.map(it=>it.str).join(' ')+'\n'; }
  return txt;
}
/* fornecedor → categoria (por nome; resolve para o id da categoria da app) */
const FATURA_CATS=[
  [/combust[íi]vel|gasolina|gas[óo]leo|via\s*verde|portagem|of[íi]cina/i,'Carros'],
  [/\bEDP\b|endesa|iberdrola|goldenergy|gold\s*energy|electricidade|eletricidade|\bluz\b/i,'Luz'],
  [/gascan|g[áa]s\s*natural|galp\s*energia|botija|\bg[áa]s\b|propano|gpl/i,'Gás'],
  [/inframoura|\bEPAL\b|[áa]guas?\s*d|indaqua|saneamento|res[íi]duos\s*urbanos|\b[áa]gua\b/i,'Água'],
  [/\bNOS\b|\bMEO\b|vodafone|nowo|\bfibra\b|telecom/i,'Telecom'],
  [/\bmudum\b/i,'Seguro da casa'],
  [/\bpr[ée]voir\b/i,'Seguro de vida'],
  [/fidelidade|tranquilidade|allianz|ag[ée]as|m[ée]dis|seguro|ap[óo]lice/i,'Seguros'],
  [/continente|pingo\s*doce|auchan|\blidl\b|mercadona|minipre[çc]o|intermarch|aldi/i,'Super'],
  [/farm[áa]cia|hospital|cl[íi]nica|dentista|\bsns\b/i,'Saúde'],
  [/cr[ée]dito\s*habita|presta[çc][ãa]o|condom[íi]nio/i,'Casa']
];
function findCatByName(nome){const n=nome.trim().toLowerCase();return state.categorias.find(c=>c.tipo==='despesa'&&(c.nome||'').trim().toLowerCase()===n)||state.categorias.find(c=>c.tipo==='despesa'&&(c.nome||'').trim().toLowerCase().includes(n))||null;}
function parseValorPT(s){s=String(s).replace(/\s/g,'');if(/,\d{2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');const v=parseFloat(s);return isNaN(v)?null:v;}
/* valor junto a um rótulo (ex.: "Total a pagar"): procura DEPOIS e também ANTES do rótulo,
   porque há faturas (ex.: Endesa) que escrevem "42,52 € TOTAL A DEBITAR" e depois sub-linhas (LUZ 35,65 €).
   Escolhe o valor mais próximo do rótulo; o "antes" só conta se tiver € entre o valor e o rótulo. */
function _amountNear(text,re){
  const m=re.exec(text);if(!m)return null;
  const idx=m.index,endi=idx+m[0].length;
  const aRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g;
  const after=text.slice(endi,endi+90); aRe.lastIndex=0; const af=aRe.exec(after);
  const afterVal=af?{v:parseValorPT(af[0]),d:af.index}:null;
  const before=text.slice(Math.max(0,idx-24),idx); let bm=null,mm; const bRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g; while((mm=bRe.exec(before)))bm=mm;
  let beforeVal=null;
  if(bm){const gap=before.slice(bm.index+bm[0].length); if(gap.includes('€')||/\beur/i.test(gap)) beforeVal={v:parseValorPT(bm[0]),d:gap.length};}
  if(beforeVal && (!afterVal || beforeVal.d<afterVal.d)) return beforeVal.v;
  return afterVal?afterVal.v:null;
}
/* datas PT: aceita "13 jun 2026", "17 Junho 2026", "22 de junho de 2026" e numéricas dd-mm-aaaa / aaaa-mm-dd */
function _mesPT(tok){tok=String(tok).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');const a=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];for(let i=0;i<12;i++)if(tok.startsWith(a[i]))return i;return -1;}
function parseDataPT(str){
  if(!str)return null;
  let m=str.match(/(\d{1,2})\s*(?:de\s+)?([A-Za-zçÇÀ-ſ]{3,12})\.?\s*(?:de\s+)?(\d{4})/);
  if(m){const mi=_mesPT(m[2]),y=+m[3];if(mi>=0&&y>=2015&&y<=2035)return[mi,y,+m[1]];}
  m=str.match(/(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/);
  if(m){let mo=+m[2]-1,y=+m[3];if(y<100)y+=2000;if(mo>=0&&mo<12&&y>=2015&&y<=2035)return[mo,y,+m[1]];}
  m=str.match(/(\d{4})[\/.\-](\d{1,2})[\/.\-](\d{1,2})/);
  if(m){const y=+m[1],mo=+m[2]-1;if(mo>=0&&mo<12)return[mo,y,+m[3]];}
  return null;
}
/* data em que sai da conta (débito direto) — prioritária; cada fornecedor escreve à sua maneira */
function dataDebito(text){
  const A=[/debitad[oa][^.]{0,70}?a\s*partir\s*d[eo]\s*(?:o\s*dia)?:?\s*/i,/d[ée]bito\s*(?:directo|direto)?\s*a\s*partir\s*d[eo]\s*(?:o\s*)?(?:dia)?:?\s*/i,/cobran[çc]a\s*em:?\s*/i,/(?:deve\s*ser\s*paga|a\s*pagar)\s*at[ée]\s*/i,/data\s*limite\s*(?:de\s*)?pagamento:?\s*/i];
  for(const re of A){const m=re.exec(text);if(m){const start=m.index+m[0].length;const d=parseDataPT(text.slice(start,start+30));if(d)return d;}}
  return null;
}
/* deteta movimento já existente (mesma natureza, valor ao cêntimo e mês) — evita importar a mesma fatura/recibo 2x */
function isDupMov(tipo,catId,valor,ym){return state.movimentos.find(m=>m.tipo===tipo&&m.categoriaId===catId&&Math.abs(Math.abs(m.valor)-Math.abs(valor))<0.005&&m.data.slice(0,7)===ym)||null;}
function parseFatura(text){
  const amtRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g;
  const all=[...text.matchAll(amtRe)].map(m=>parseValorPT(m[0])).filter(v=>v!=null&&v>0);
  let total=null;
  const KW=[/total\s*a\s*debitar/i,/total\s*a\s*pagar/i,/valor\s*a\s*pagar/i,/montante\s*a\s*pagar/i,/total\s*a\s*liquidar/i,/valor\s*a\s*debitar/i,/pr[ée]mio\s*total/i,/total\s*da\s*fatura/i,/total\s*c\/?\s*iva/i,/valor\s*desta\s*fatura/i,/\btotal\b/i,/\bmontante\b/i,/\ba\s*pagar\b/i];
  for(const re of KW){const v=_amountNear(text,re);if(v!=null){total=v;break;}}
  if(total==null&&all.length)total=Math.max(...all);
  const cand=[...new Set(all)].sort((a,b)=>b-a).slice(0,8);
  // data: débito direto (quando sai da conta) primeiro; senão data de emissão/fatura
  let mi=null,year=null,dia=null;
  const deb=dataDebito(text);
  if(deb){mi=deb[0];year=deb[1];dia=deb[2];}
  if(mi==null){const idx=text.search(/data\s*(?:de|da)?\s*(?:emiss|fatura)/i);const d=idx>=0?parseDataPT(text.slice(idx,idx+45)):parseDataPT(text);if(d){mi=d[0];year=d[1];if(dia==null)dia=d[2];}}
  // categoria pelo fornecedor (regra que dispara é a "assinatura" segura: não depende do nome do cliente)
  let catId=null,forn=null;
  for(const [re,nome] of FATURA_CATS){if(re.test(text)){const c=findCatByName(nome);if(c){catId=c.id;forn=nome;break;}}}
  // categoria aprendida (override): se já corrigiste antes a categoria deste tipo de fornecedor
  const learned=forn?(state.faturaMap||{})[forn]:null;
  if(learned&&cat(learned))catId=learned;
  return {total,cand,mi,year,dia,catId,forn,sig:forn,text};
}
async function processFatura(file){
  if(!file)return; toast('A ler a fatura…');
  try{
    const text=await extractPdfText(file);
    if(!text||text.replace(/\s/g,'').length<20){ toast('PDF sem texto (parece digitalizado/imagem) — não dá para ler offline.'); return; }
    openFaturaReview(parseFatura(text));
  }catch(e){ toast('Falha a ler o PDF: '+(e.message||e.name||'erro')); }
}

function openInbox(){

  const row=(it)=>{
