<!DOCTYPE html>
<html lang="pt" style="background:#839982">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CASA · Finanças</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#121613">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CASA">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="CASA · Finanças">
<meta property="og:description" content="Gestão financeira pessoal — grelha, poupanças, previsão e controlo.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://casa.cr0x.org/">
<meta property="og:image" content="https://casa.cr0x.org/icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CASA · Finanças">
<meta name="twitter:description" content="Gestão financeira pessoal.">
<meta name="twitter:image" content="https://casa.cr0x.org/icon-512.png">
<style>
:root{
  /* Paleta "Sálvia" — baseada no ícone (escandinavo, calmo) */
  --bg:#121613; --bg2:#181d19; --card:#1e241f; --card2:#27302a; --line:#333d36; --line2:#43504a;
  --txt:#ecefe8; --mut:#9aa79e; --acc:#7aa183; --accd:#5f7a6b;
  --in:#8cba98; --out:#df8c7d; --warn:#d9a85c; --info:#87a9c0;
  --acc-10:rgba(122,161,131,.10); --acc-12:rgba(122,161,131,.12); --acc-15:rgba(122,161,131,.15); --acc-16:rgba(122,161,131,.16);
  --r:18px; --r-sm:12px; --r-lg:24px;
  --sh-sm:0 1px 2px rgba(0,0,0,.22);
  --sh:0 1px 2px rgba(0,0,0,.18),0 14px 34px -16px rgba(0,0,0,.55);
  --sh-lg:0 24px 60px -16px rgba(0,0,0,.6);
  --hair:rgba(255,255,255,.05);
}
[data-theme="light"]{
  --bg:#f3f1ea; --bg2:#ece8df; --card:#fbf9f4; --card2:#f1ede4; --line:#ddd7c9; --line2:#cabfac;
  --txt:#26302a; --mut:#6d7a70; --acc:#5f7a6b; --accd:#4d6657;
  --in:#5f8a6c; --out:#c06f5e; --warn:#b3893f; --info:#5e84a0;
  --acc-10:rgba(95,122,107,.10); --acc-12:rgba(95,122,107,.13); --acc-15:rgba(95,122,107,.16); --acc-16:rgba(95,122,107,.17);
  --sh-sm:0 1px 2px rgba(60,70,50,.06);
  --sh:0 1px 2px rgba(60,70,50,.05),0 14px 30px -16px rgba(60,70,50,.14);
  --sh-lg:0 24px 56px -16px rgba(60,70,50,.18);
  --hair:rgba(255,255,255,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.011em}
.v,.kbox .v,table.grid,.num{font-variant-numeric:tabular-nums}
html{scroll-behavior:smooth}
body{background:
  radial-gradient(1100px 620px at 100% -8%,color-mix(in srgb,var(--acc) 8%,transparent),transparent 58%),
  radial-gradient(900px 680px at -10% 112%,color-mix(in srgb,var(--acc) 5%,transparent),transparent 55%),
  var(--bg);background-attachment:fixed}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 18px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#a7b89a,#5f7a6b);display:grid;place-items:center;color:#f5efe6}
.brand .logo svg{width:19px;height:19px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px}
.tabs button{background:none;border:0;color:var(--mut);padding:7px 13px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:background .16s,color .16s,box-shadow .16s}
.tabs button:hover:not(.on){color:var(--txt);background:var(--card2)}
.tabs button svg{width:17px;height:17px;flex:none}
.tabs button.on{background:linear-gradient(135deg,var(--acc),var(--accd));color:#fff;box-shadow:0 1px 0 rgba(255,255,255,.12) inset,0 6px 14px -8px var(--acc)}
.spacer{flex:1}
.yearnav{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
.yearnav button{background:none;border:0;color:var(--mut);cursor:pointer;width:30px;height:28px;border-radius:6px;font-size:16px}
.yearnav button:hover{background:var(--card2);color:var(--txt)}
.yearnav .y{font-weight:800;font-size:15px;min-width:54px;text-align:center}
.btn{background:var(--card2);color:var(--txt);border:1px solid transparent;padding:9px 15px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:background .16s,color .16s,transform .1s,box-shadow .16s;box-shadow:var(--sh-sm)}
.btn:hover{background:color-mix(in srgb,var(--card2) 82%,var(--acc));transform:translateY(-1px);box-shadow:var(--sh)}
.btn:active{transform:translateY(0);box-shadow:var(--sh-sm)}
.btn svg{width:15px;height:15px;color:var(--acc);transition:color .16s}
.btn.primary{background:linear-gradient(135deg,var(--acc),var(--accd));border:0;color:#fff;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 8px 18px -10px var(--acc)}
.btn.primary:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,.16) inset,0 12px 22px -10px var(--acc)}
.btn.primary svg{color:#fff}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn.danger{color:var(--out)} .btn.danger svg{color:var(--out)}
.btn.danger:hover{background:color-mix(in srgb,var(--card2) 82%,var(--out));color:var(--out)}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:3px;box-shadow:var(--sh-sm)}
.seg button{background:none;border:0;color:var(--mut);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:700;border-radius:9px;transition:background .16s,color .16s,box-shadow .16s}
.seg button:hover{color:var(--txt)}
.seg button.on{background:var(--card);color:var(--acc);box-shadow:var(--sh-sm)}
.seg button.on-out{background:var(--card);color:var(--out);box-shadow:var(--sh-sm)}
.seg button.on-in{background:var(--card);color:var(--in);box-shadow:var(--sh-sm)}
button{font-family:inherit;letter-spacing:inherit}
button:focus-visible,a:focus-visible,[role=button]:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
button:disabled,button[disabled]{opacity:.5;cursor:not-allowed;pointer-events:none}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--bg2);color:var(--txt);border:1px solid transparent;border-radius:11px;padding:10px 12px;outline:none;box-shadow:inset 0 0 0 1px var(--line);transition:box-shadow .16s}
input:focus,select:focus,textarea:focus{box-shadow:inset 0 0 0 1px var(--acc),0 0 0 3px var(--acc-12)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
@media(max-width:720px){.tabs .tablabel{display:none}.tabs button{padding:9px 12px}}
#bell{background:none;border:0;color:var(--mut);cursor:pointer;position:relative;padding:6px;border-radius:9px;display:inline-flex}
#bell:hover{color:var(--txt);background:var(--card)}
#bell svg{width:19px;height:19px;display:block}
#refreshBtn,#searchBtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:6px;border-radius:9px;display:inline-flex}
#refreshBtn:hover,#searchBtn:hover{color:var(--txt);background:var(--card)}
#refreshBtn svg,#searchBtn svg{width:18px;height:18px;display:block}
#refreshBtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bell-badge{position:absolute;top:-1px;right:-1px;background:var(--out);color:#fff;font-size:10px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
.main{padding:16px 20px 80px;flex:1}
#main.view-in{animation:viewIn .26s cubic-bezier(.2,.7,.2,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){#main.view-in{animation:none}}
/* KPI strip */
.kstrip{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kbox{position:relative;overflow:hidden;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);padding:13px 17px;flex:1;min-width:158px;box-shadow:var(--sh)}
.kbox::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.kbox.k-accent{padding-left:20px}
.kbox.k-accent::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--acc)}
.kbox.k-in::before{background:var(--in)} .kbox.k-out::before{background:var(--out)} .kbox.k-info::before{background:var(--info)} .kbox.k-warn::before{background:var(--warn)}
.kbox .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kbox .v{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.pos{color:var(--in)} .neg{color:var(--out)}
/* Quick add */
.qadd{display:flex;gap:11px;align-items:flex-end;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 90%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r-lg);padding:17px 19px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--sh)}
.qadd .fld{display:flex;flex-direction:column}
.qadd input,.qadd select{padding:11px 12px}
.qadd .v{width:120px;font-weight:800;font-size:18px}
/* Grid */
.gridwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:auto;box-shadow:var(--sh)}
table.grid{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.grid th,table.grid td{border-bottom:1px solid color-mix(in srgb,var(--line) 60%,transparent);padding:0;text-align:right;white-space:nowrap}
table.grid thead th{position:sticky;top:0;background:linear-gradient(180deg,var(--card2),color-mix(in srgb,var(--card2) 70%,var(--bg)));z-index:2;font-size:11.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:12px 14px;cursor:default}
table.grid thead th .delcol{opacity:0;color:var(--mut);cursor:pointer;margin-left:6px;font-weight:400}
table.grid thead th:hover .delcol{opacity:.6}
table.grid thead th .delcol:hover{opacity:1;color:var(--out)}
table.grid tbody th,table.grid tfoot th{position:sticky;left:0;background:var(--card);z-index:1;text-align:left;font-weight:700;padding:11px 14px;font-size:13px;color:var(--txt);box-shadow:7px 0 9px -8px rgba(0,0,0,.10)}
table.grid td.cell{padding:11px 14px;cursor:pointer;font-size:13.5px;min-width:92px;transition:background .1s}
table.grid td.cell:hover{background:var(--acc-12);box-shadow:inset 0 0 0 1.5px var(--acc);border-radius:9px}
table.grid td.cell.z{color:var(--mut);font-weight:400;opacity:.4}
table.grid td.tot,table.grid th.tot{background:var(--card2);font-weight:800;position:sticky;right:0;box-shadow:-8px 0 10px -8px rgba(0,0,0,.14)}
table.grid tfoot th,table.grid tfoot td{position:sticky;bottom:0;background:var(--card2);font-weight:800;border-top:1.5px solid var(--line2);z-index:1;padding:11px 13px}
table.grid tr.now td.cell{background:var(--acc-12)}
table.grid tr.now th{color:var(--acc);background:var(--card)}
table.grid tr.now th::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
.addcol-th{cursor:pointer;color:var(--acc)!important}
table.grid th.subcol,table.grid td.subcol{background:var(--bg2)}
table.grid td.subcell{background:var(--bg2);font-size:12.5px;color:var(--mut)}
table.grid td.subcell:hover{background:var(--acc-12);color:var(--txt)}
table.grid td.cell.over{color:var(--out)!important;font-weight:800;background:color-mix(in srgb,var(--out) 14%,transparent)}
table.grid td.cell.warn{color:var(--warn)!important;font-weight:700}
table.grid td.cell.pend{opacity:.5;font-style:italic}
table.grid thead th.subcol{font-weight:600;font-size:10.5px}
.exptog{color:var(--mut);font-size:13px;width:15px;display:inline-grid;place-items:center;border-radius:4px;font-weight:700}
table.grid th.thtog{cursor:pointer;user-select:none}
table.grid th.thtog:hover{background:var(--acc-12)}
table.grid th.thtog:hover .exptog{color:var(--acc)}
table.grid thead th[data-cat]{cursor:grab}
table.grid thead th.th-drop{outline:2px dashed var(--acc);outline-offset:-2px;background:var(--acc-16)!important}
table.grid thead th.th-before{box-shadow:inset 4px 0 0 var(--acc)}
.thedit{background:none;border:0;color:var(--mut);cursor:pointer;padding:1px;border-radius:4px;opacity:.35;display:inline-flex;margin-left:2px}
.thedit svg{width:13px;height:13px}
table.grid thead th:hover .thedit{opacity:.7}
.thedit:hover{opacity:1!important;color:var(--acc)}
.pinp{background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;width:100%;font-size:13.5px}
.pinp:hover{border-color:var(--line)}
.pinp:focus{border-color:var(--acc);background:var(--card2)}
.pinp.pnum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;max-width:160px}
.poupval{cursor:pointer;font-weight:700;font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line);padding-bottom:1px}
.poupval:hover{border-color:var(--acc);color:var(--acc)}
/* vista Lista da Grelha (um cartão por mês, colapsável) */
.gm{display:flex;flex-direction:column;gap:9px}
.gm-month{background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),var(--card));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;position:relative;transition:box-shadow .18s,border-color .18s}
.gm-month::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.gm-month:hover{box-shadow:var(--sh);border-color:var(--line2)}
.gm-month.now{box-shadow:inset 3px 0 0 var(--acc),var(--sh)}
.gm-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:13px 15px;cursor:pointer;font-size:14px;color:var(--txt)}
.gm-nm{font-weight:800;min-width:92px;text-align:left;flex:none}
.gm-month.now .gm-nm{color:var(--acc)}
.gm-lock{font-size:11px;opacity:.7;width:16px;flex:none;text-align:left}
.gm-tot{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.gm-tot.neg{color:var(--out)} .gm-tot.pos{color:var(--in)}
.gm-tot.mut{color:var(--mut);opacity:.45;font-weight:500}
.gm-chev{color:var(--mut);font-size:11px;width:12px;flex:none}
.gm-body{border-top:1px solid var(--line);padding:5px 7px 8px}
.gm-cat{display:flex;align-items:center;gap:9px;padding:9px;border-radius:10px;cursor:pointer;transition:background .12s}
.gm-cat:hover{background:var(--acc-12)}
.gm-cat .cicon{flex:none}
.gm-cnm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.gm-cv{font-weight:600;font-variant-numeric:tabular-nums;font-size:13.5px}
.gm-cat.z .gm-cv,.gm-cat.z .gm-cnm{opacity:.45}
.gm-cat.warn .gm-cv{color:var(--warn)} .gm-cat.over .gm-cv{color:var(--out)}
.gm-cat.sub{padding-left:30px;background:var(--bg2);border-radius:8px;margin:1px 0}
.gm-cat.sub .gm-cnm,.gm-cat.sub .gm-cv{font-size:12.5px;color:var(--mut)}
.gm-cat.sub .cicon{opacity:.85}
.gm-tog{border:0;background:var(--card2);color:var(--mut);cursor:pointer;padding:3px 8px;border-radius:7px;font-size:11px;flex:none}
.gm-tog:hover{color:var(--acc)}
.gm-foot{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:var(--card2);border-radius:var(--r);font-size:13px}
/* metas / objetivos de poupança */
.metagrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
@media(max-width:720px){.metagrid{grid-template-columns:1fr}}
.meta-card{position:relative;display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.meta-card::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.meta-ring{flex:none}
.meta-body{min-width:0;flex:1}
.meta-nm{font-weight:700;display:flex;align-items:center;gap:7px}
.meta-amt{font-size:13px;color:var(--mut);margin-top:2px}
.meta-amt b{color:var(--txt);font-size:15px}
.meta-sub{font-size:12.5px;color:var(--mut);margin-top:1px}
.meta-actions{display:flex;align-items:center;gap:6px;margin-top:9px}
.defs-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;max-width:1120px;align-items:start}
.defs-grid .span2{grid-column:1/-1}
.defs-grid>.card{min-width:0}
.defgroup{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--bg2);overflow:hidden}
.defgroup>summary{cursor:pointer;list-style:none;padding:14px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.defgroup>summary::-webkit-details-marker{display:none}
.defgroup>summary::before{content:'▸';color:var(--mut);font-size:12px}
.defgroup[open]>summary::before{content:'▾'}
.defgroup[open]>summary{border-bottom:1px solid var(--line)}
.defgroup .defs-grid{padding:14px}
.cols-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.twocol{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px}
.cols-2>*,.twocol>*{min-width:0}
@media(max-width:720px){.cols-2,.twocol{grid-template-columns:1fr;gap:12px}}
.dh{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin:0 0 12px}
.dh svg{width:17px;height:17px;color:var(--acc);flex:none}
.dsub{color:var(--mut);font-size:12px;margin:-7px 0 12px;line-height:1.35}
.cicon{display:inline-grid;place-items:center;border-radius:8px;flex:none;cursor:pointer;transition:transform .1s}
.cicon.dotcol{border-radius:5px}
.cicon svg{width:62%;height:62%}
button.cicon:hover{transform:scale(1.08)}
.iconpick{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:560px){.iconpick{grid-template-columns:repeat(6,1fr)}}
.iconpick button{aspect-ratio:1;border:1px solid var(--line);background:var(--bg2);border-radius:11px;display:grid;place-items:center;cursor:pointer;color:var(--mut);transition:background .12s,color .12s,border-color .12s}
.iconpick button:hover{background:var(--card);color:var(--acc)}
.iconpick button.on{border-color:var(--acc);background:var(--acc-12);color:var(--acc)}
.iconpick button svg{width:20px;height:20px}
.metacols{display:flex;flex-wrap:wrap;gap:8px}
.metacol{width:28px;height:28px;border-radius:9px;border:2px solid transparent;cursor:pointer;padding:0;box-shadow:var(--sh-sm);transition:transform .1s}
.metacol:hover{transform:scale(1.08)}
.metacol.on{border-color:var(--txt);box-shadow:0 0 0 3px var(--acc-12)}
@media(max-width:780px){.defs-grid{grid-template-columns:minmax(0,1fr)}}
/* tamanho seguro p/ todos os ícones SVG (evita ícones gigantes em h2/cartões) */
svg{width:16px;height:16px;flex:none}
h2 svg{width:18px;height:18px;vertical-align:middle}
.modal h2 svg{width:19px;height:19px}
/* Resumo anual */
.sumtable{width:100%;border-collapse:collapse;margin-top:0}
.sumtable th,.sumtable td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.sumtable th:first-child,.sumtable td:first-child{text-align:left}
.sumtable thead th{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.sumtable tfoot td{font-weight:800;border-top:2px solid var(--line2)}
.sumtable tr.now td{background:rgba(56,189,248,.07)}
.section-h{font-size:13px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:18px 4px 8px}
/* Popover */
.pop{position:fixed;z-index:80;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--sh-lg);width:290px;display:none}
.pop.on{display:block;animation:pp .12s}
@keyframes pp{from{opacity:0;transform:translateY(-4px)}}
.pop .ph{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.pop .ph .dot{width:9px;height:9px;border-radius:50%}
.pop .pb{padding:12px 14px}
.pop .padd{display:flex;gap:7px;margin-bottom:10px}
.pop .padd input{width:100%;font-size:15px;font-weight:700}
.pop .padd button{flex:none;padding:8px 12px}
.plist{max-height:180px;overflow:auto;display:grid;gap:5px}
.pe{display:flex;align-items:center;gap:8px;font-size:12.5px;background:var(--card2);border-radius:7px;padding:6px 9px}
.pe .x{margin-left:auto;cursor:pointer;color:var(--mut);background:none;border:0;font-size:13px;line-height:1;padding:2px 4px;border-radius:5px}
.pe .x:hover{color:var(--out);background:var(--card)}
.pe-ed{gap:6px}
.pe-ed input{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:5px 7px;font-size:12.5px;color:var(--txt);min-width:0}
.pe-ed .pe-ed-val{width:84px;flex:none;font-variant-numeric:tabular-nums}
.pe-ed .pe-ed-nota{flex:1}
.pe-ed .x.ok{color:var(--acc)}
.pop .popt{display:flex;gap:6px;margin-bottom:9px}
.pop .popt select{flex:1;padding:6px 8px;font-size:12px}
.pempty{color:var(--mut);font-size:12px;text-align:center;padding:8px}
/* Modal */
.back{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow:auto;padding:50px 16px}
.back.on{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);width:100%;max-width:520px;box-shadow:var(--sh-lg);overflow:hidden}
.modal h2{font-size:17px;font-weight:800;letter-spacing:-.3px;padding:17px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.modal .body{padding:18px 20px;display:grid;gap:13px}
.modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.f2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}
.f2>div{min-width:0}
.close{margin-left:auto;background:none;border:0;color:var(--mut);cursor:pointer;font-size:22px}
.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.card::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 var(--hair);pointer-events:none}
.toast{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--acc);padding:12px 18px;border-radius:13px;box-shadow:var(--sh-lg);z-index:300;font-weight:600;font-size:13px;display:none}
.toast.on{display:block;animation:pp .2s}
.hint{font-size:12.5px;color:var(--mut);background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--info);border-radius:12px;padding:11px 13px;line-height:1.45}
.splitseg{display:flex;gap:6px;flex-wrap:wrap}
.splitseg button{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12px;font-weight:600;cursor:pointer}
.splitseg button.on{border-color:var(--acc);background:rgba(122,161,131,.12);color:var(--acc)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:0 12px;height:34px;font-size:12.5px;font-weight:600;box-sizing:border-box}
.chip.warn{border-color:var(--out);color:var(--out)}
.chip.warn svg{width:14px;height:14px}
#valeteHead{display:inline-flex;align-items:center;gap:6px}
.topbar #refreshBtn,.topbar #bell,.topbar #lockNow,.topbar #searchBtn{height:34px;width:34px;padding:0;align-items:center;justify-content:center}
#lockNow{background:none;border:0;color:var(--mut);cursor:pointer;border-radius:9px;display:inline-flex}
#lockNow:hover{color:var(--out);background:var(--card)}
#lockNow svg{width:18px;height:18px;display:block}
.topbar .yearnav{height:34px}
.catedit{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.catedit .dot{width:13px;height:13px;border-radius:4px;flex:none}
.catedit input{flex:1}
.catcount{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:1px 8px;font-size:11.5px;font-weight:700;cursor:pointer}
.catcount:hover{border-color:var(--acc);color:var(--acc)}
.iconbtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:5px;border-radius:6px}
.iconbtn:hover{color:var(--acc);background:var(--card2)}
.iconbtn svg{width:16px;height:16px;display:block}
.foot-credit{text-align:center;color:var(--mut);font-size:11.5px;padding:20px}
@media(max-width:720px){
  .main{padding:12px 10px 80px}
  .topbar{gap:8px;padding:10px 12px}
  .tabs{width:100%;order:3;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:0 0 auto;padding:8px 14px;font-size:13.5px;white-space:nowrap}
  .qadd{gap:6px}.qadd .v{width:90px}
  .qadd .fld{flex:1 1 calc(50% - 6px)}
  .kbox{min-width:calc(50% - 5px);padding:9px 12px}.kbox .v{font-size:18px}
  .brand small{display:none}
  .f2{grid-template-columns:1fr}
}
/* ----- Splash de arranque: a casa emerge do fundo sálvia (igual ao ícone) ----- */
#splash{position:fixed;inset:0;z-index:10000;display:grid;place-items:center;
  background:#839982;
  transition:opacity .6s ease,transform .6s ease}
#splash.done{opacity:0;transform:scale(1.04);pointer-events:none}
#splash .splash-mark{position:relative;width:152px;height:152px;display:grid;place-items:center;animation:splashPop 1.5s cubic-bezier(.2,.7,.2,1) both}
#splash .splash-mark::before{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 47%,rgba(245,239,230,.18),rgba(245,239,230,0) 64%);animation:haloIn 1.2s ease .1s both}
#splash svg{position:relative;width:108px;height:108px;filter:drop-shadow(0 1px 0 rgba(255,255,255,.30)) drop-shadow(0 7px 16px rgba(54,70,54,.28))}
#splash .house{fill:none;stroke:#f5efe6;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1;animation:houseDraw 1.1s ease .2s forwards}
@keyframes houseDraw{to{stroke-dashoffset:0}}
@keyframes haloIn{from{opacity:0;transform:scale(.62)}to{opacity:1;transform:scale(1)}}
@keyframes splashPop{0%{transform:scale(.9);opacity:0}42%{opacity:1}100%{transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#splash .house{animation:none;stroke-dashoffset:0}#splash .splash-mark,#splash .splash-mark::before{animation:none}}
/* ----- Teclado de PIN do bloqueio ----- */
#lock .dots{display:flex;gap:13px;justify-content:center;height:14px;margin:2px 0}
#lock .dots span{width:12px;height:12px;border-radius:50%;border:2px solid var(--line2);transition:background .1s,border-color .1s}
#lock .dots span.on{background:var(--acc);border-color:var(--acc)}
#lock .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
#lock .pad button{aspect-ratio:1;border:0;border-radius:14px;background:var(--card2);color:var(--txt);font-size:25px;font-weight:600;cursor:pointer;transition:background .12s,transform .07s;-webkit-tap-highlight-color:transparent;user-select:none}
#lock .pad button:hover{background:var(--line)}
#lock .pad button:active{transform:scale(.93);background:var(--acc);color:#10160f}
#lock .pad button.k-back{background:transparent;color:var(--mut);font-size:22px}
#lock .pad button.k-back:active{background:transparent;transform:scale(.9)}
#lock .pad button.k-empty{visibility:hidden;pointer-events:none}
#lockBox.shake{animation:lockShake .42s}
@keyframes lockShake{0%,100%{transform:none}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
</style>

/* rede de segurança: se algo rebentar no arranque, mostra o erro (em vez de ecrã branco) + botão p/ limpar cache */
window.addEventListener('error',function(ev){
  try{
    var m=document.getElementById('main');
    if(m && m.innerHTML.length>50) return; // app já desenhou, não mexer
    document.body.innerHTML='<div style="padding:24px;font-family:system-ui,sans-serif;color:#e8edf4;background:#121613;min-height:100vh">'
      +'<div style="font-size:34px;margin-bottom:8px">€</div>'
      +'<h3 style="margin:0 0 8px">Não consegui abrir</h3>'
      +'<p style="color:#8d9bad;margin:0 0 12px">Provavelmente ficou uma versão antiga em cache. Toca no botão:</p>'
      +'<button id="_fix" style="padding:13px 16px;background:#7aa183;border:0;color:#fff;border-radius:10px;font-weight:700;font-size:15px">Limpar cache e recarregar</button>'
      +'<pre style="white-space:pre-wrap;color:#6b7787;font-size:11px;margin-top:18px">'+((ev&&(ev.message||ev.error))||'')+'</pre></div>';
    var b=document.getElementById('_fix');
    if(b) b.onclick=async function(){ try{if(navigator.serviceWorker){var rs=await navigator.serviceWorker.getRegistrations();for(var i=0;i<rs.length;i++)await rs[i].unregister();}}catch(e){} try{if(window.caches){var ks=await caches.keys();for(var j=0;j<ks.length;j++)await caches.delete(ks[j]);}}catch(e){} location.reload(); };
  }catch(e){}
});

function mediana(arr){const s=arr.slice().sort((a,b)=>a-b);const n=s.length;return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0;}

/* média ponderada (recente pesa mais) de uma série cronológica, removendo o outlier alto e baixo */
function _estPond(arr){
  arr=(arr||[]).filter(t=>t>0); if(!arr.length)return 0;
  let a=arr.slice();
  if(a.length>=5){ const s=a.slice().sort((x,y)=>x-y); const lo=s[0],hi=s[s.length-1]; let rl=false,rh=false; a=a.filter(v=>{if(!rl&&v===lo){rl=true;return false;}if(!rh&&v===hi){rh=true;return false;}return true;}); }
  let w=0,vs=0; a.forEach((v,i)=>{w+=i+1;vs+=v*(i+1);}); return round2(vs/w);
}
function mesesTipo(tipo){return [...new Set(state.movimentos.filter(m=>m.tipo===tipo).map(m=>m.data.slice(0,7)))].sort();}
/* estimativa do total de despesa do mês */
function estimativaMensal(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('despesa').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* estimativa da receita LÍQUIDA do mês (já com descontos SS/IRS, que são negativos) */
function estimativaReceitaLiq(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('receita').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* valor típico de uma fixa = mediana do que essa categoria gastou nos últimos meses (cai bem quando o valor varia) */
function medValorFixa(r){
  const hist=mesesDespesa().slice(-12).map(m=>catMesTotal(r.categoriaId,m)).filter(v=>v>0);
  return hist.length>=2?round2(mediana(hist)):round2(+r.valor||0);
}
/* Previsão de tesouraria do Valete (mês corrente): combina fixas com dia (âncoras) + gasto variável espalhado.
   Tudo estimado pelo histórico (mediana), porque dias e valores variam. */
function valeteForecast(){
  const v=valeteAtual();
  const d=new Date(); const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0'); const dim=new Date(Y,M+1,0).getDate();
  const estMensal=estimativaMensal(ymCur);
  // já SAIU = despesas deste mês que NÃO são pendentes (os agendados ainda não abateram)
  const gastoMes=round2(state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===ymCur&&!x.pendente).reduce((a,x)=>a+x.valor,0));
  // fixas ainda não pagas este mês e com dia >= hoje (âncoras futuras), valor estimado pelo histórico
  const launched=new Set(state.movimentos.filter(m=>m.recId&&m.data.slice(0,7)===ymCur).map(m=>m.recId));
  const fixas=state.recorrencias.filter(r=>r.ativo!==false&&!launched.has(r.id))
    .map(r=>({nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),valor:medValorFixa(r),dia:Math.min(dim,Math.max(1,+r.dia||8))}))
    .filter(f=>f.valor>0 && f.dia>=today);
  // débitos AGENDADOS (faturas com débito futuro): saída futura no dia certo, com VALOR EXATO
  const pendFut=state.movimentos.filter(m=>m.tipo==='despesa'&&m.pendente&&m.data.slice(0,7)===ymCur)
    .map(m=>({nome:catName(m.categoriaId),valor:Math.abs(m.valor),dia:Math.min(dim,Math.max(1,+m.data.slice(8,10))),exato:true}))
    .filter(f=>f.dia>=today);
  fixas.push(...pendFut); fixas.sort((a,b)=>a.dia-b.dia);
  const fixoFut=round2(fixas.reduce((a,f)=>a+f.valor,0));
  const varRest=Math.max(0,round2(estMensal-gastoMes-fixoFut));
  const diasRest=Math.max(1,dim-today+1); const varDia=varRest/diasRest;
  const need=round2(fixoFut+varRest); // total que ainda falta sair
  // RECEITA que ainda vai entrar este mês (líquida) e o dia em que entra
  const estReceita=estimativaReceitaLiq(ymCur);
  const recebidoMes=round2(state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===ymCur).reduce((a,x)=>a+x.valor,0));
  const restReceita=Math.max(0,round2(estReceita-recebidoMes));
  const diaSal=Math.min(28,Math.max(1,+state.settings.diaSalario||23));
  const diaChegada=restReceita>0?Math.max(today,diaSal):null; // se já passou, assume que entra hoje
  // curva de SALDO PROJETADO: Valete − despesas que saem + receita que entra, dia a dia
  const margem=Math.max(0,+state.settings.valeteMargem||0);
  const curva=[]; let accFix=0;
  for(let day=today;day<=dim;day++){
    accFix=round2(accFix+fixas.filter(f=>f.dia===day).reduce((a,f)=>a+f.valor,0));
    const out=round2(accFix+varDia*(day-today+1));
    const inflow=(diaChegada!=null&&day>=diaChegada)?restReceita:0;
    curva.push({day,saldo:(v==null?null:round2(v-out+inflow)),out,inflow});
  }
  let minSaldo=null,minDia=null,faltaDia=null,faltaValor=0;
  if(v!=null){ curva.forEach(c=>{ if(minSaldo==null||c.saldo<minSaldo){minSaldo=c.saldo;minDia=c.day;} if(faltaDia==null&&c.saldo<margem-0.001){faltaDia=c.day;faltaValor=round2(margem-c.saldo);} }); }
  return {v,margem,estMensal,gastoMes,fixas,fixoFut,varRest,need,estReceita,recebidoMes,restReceita,diaChegada,curva,minSaldo,minDia,faltaDia,faltaValor,today,dim,ok:(v==null?null:minSaldo>=margem-0.001)};
}
/* sparkline do saldo projetado do Valete ao longo do mês (com linhas da margem e do zero) */
function valeteSpark(F){
  if(!F.curva.length||F.v==null)return '';
  const w=300,h=64,pad=5;
  const vals=F.curva.map(c=>c.saldo).concat([F.v,F.margem,0]);
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const X=i=>pad+(F.curva.length<2?0:i/(F.curva.length-1))*(w-2*pad);
  const Yv=val=>h-pad-((val-min)/rng)*(h-2*pad);
  const pts=F.curva.map((c,i)=>`${X(i).toFixed(1)},${Yv(c.saldo).toFixed(1)}`).join(' ');
  const my=Yv(F.margem).toFixed(1);
  const fy=F.faltaDia!=null?X(F.curva.findIndex(c=>c.day===F.faltaDia)):null;
  const minIdx=F.curva.findIndex(c=>c.day===F.minDia);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;margin-top:6px">
    <line x1="${pad}" y1="${my}" x2="${w-pad}" y2="${my}" stroke="${F.margem>0?'var(--out)':'var(--mut)'}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="${pad}" y="${(+my-3)}" font-size="9" fill="${F.margem>0?'var(--out)':'var(--mut)'}">${F.margem>0?'margem':'0'}</text>
    <polyline points="${pts}" fill="none" stroke="${F.faltaDia!=null?'var(--out)':'var(--acc)'}" stroke-width="2"/>
    ${minIdx>=0?`<circle cx="${X(minIdx).toFixed(1)}" cy="${Yv(F.minSaldo).toFixed(1)}" r="3" fill="${F.faltaDia!=null?'var(--out)':'var(--acc)'}"/>`:''}
  </svg>`;
}

/* Constrói o livro de dívida: histórico do Excel + meses futuros calculados a partir das contas partilhadas. */
function acertoLedger(){
  const base=(state.acerto&&state.acerto.length?state.acerto:EMBED_ACERTO).map(r=>({ym:r.ym,deve:+r.deve||0,pago:+r.pago||0,fwd:false}));
  const lastYm=base.length?base[base.length-1].ym:'0000-00';
  // meses posteriores ao histórico: quota dela = metade das despesas das contas partilhadas lançadas na app
  const acIds=acertoCatIds(); const fwd={};
  state.movimentos.filter(x=>x.tipo==='despesa'&&acIds.has(x.categoriaId)&&x.data.slice(0,7)>lastYm)
    .forEach(x=>{const ym=x.data.slice(0,7);fwd[ym]=(fwd[ym]||0)+x.valor/2;});
  Object.keys(fwd).sort().forEach(ym=>base.push({ym,deve:round2(fwd[ym]),pago:0,fwd:true}));
  let run=0; base.forEach(r=>{r.saldo=round2(r.deve-r.pago);run=round2(run+r.saldo);r.acc=run;});
  return base;
}

const round2=n=>Math.round((+n||0)*100)/100;
/* aplica um movimento à conta i e espelha no Valete (conta real) como transferência */
function poupApplyMov(y,i,delta,data,nota){
  const yp=state.poupancas[y]; const c=yp.contas[i];
  c.mov=c.mov||[]; c.mov.push({data,valor:delta,nota}); c.valor=round2((+c.valor||0)+delta);
  if(!c.real){
    const ri=yp.contas.findIndex(x=>x.real);
    if(ri>=0 && ri!==i){ const rc=yp.contas[ri]; rc.mov=rc.mov||[]; rc.mov.push({data,valor:-delta,nota:(delta>=0?'→ '+c.nome:'← '+c.nome)}); rc.valor=round2((+rc.valor||0)-delta); }
  }
}

function projetar(baseRec,baseDesp,patr0,o){
  const proj=[]; let patr=patr0; const rAnual=(o.reforco||0)*12;
  for(let k=1;k<=o.horizonte;k++){
    const rec=baseRec*Math.pow(1+o.gRec/100,k), desp=baseDesp*Math.pow(1+o.gDesp/100,k);
    let poup=rec-desp; if(rAnual>0) poup=Math.max(poup,rAnual);
    patr=patr*(1+o.juro/100)+poup; proj.push({ano:+o.baseAno+k,rec,desp,poup,patr});
  }
  return proj;
}

function catRow(c,child,lead,badge){return `<div class="catedit" style="${child?'padding-left:24px':''}">${child?'<span style="opacity:.4;margin-right:-2px">└</span>':(lead||'<span style="width:18px;display:inline-block;flex:none"></span>')}<button class="cicon ${c.icon&&CAT_ICONS[c.icon]?'':'dotcol'}" data-caticon="${c.id}" title="Escolher ícone e cor" style="width:28px;height:28px;background:${c.cor};color:#fff">${c.icon&&CAT_ICONS[c.icon]?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${CAT_ICONS[c.icon]}"/></svg>`:''}</button><input class="pinp" value="${esc(c.nome)}" data-catname="${c.id}">${badge||''}${!child?`<button class="iconbtn" data-newsub="${c.id}" title="Adicionar sub-categoria">${svg(I.plus)}</button>`:''}<button class="iconbtn" data-movecat="${c.id}" title="Mover / re-aninhar">${svg(I.move)}</button><button class="iconbtn" data-delcat="${c.id}">${svg(I.trash)}</button></div>`;}
function openCatIcon(catId){
  const c=cat(catId); if(!c)return; const cols=PALETTE.slice(0,8);
  document.getElementById('back').innerHTML=`<div class="modal"><h2>${svg(I.cat)} Ícone & cor <button class="close" data-close="1">&times;</button></h2>
  <div class="body">
    <div style="display:flex;align-items:center;gap:12px">${catIconHtml(c,46)}<div style="min-width:0"><div style="font-weight:700">${esc(c.nome)}</div><div class="dsub" style="margin:0">Escolhe a cor e um ícone.</div></div></div>
    <label style="margin-top:10px">Cor</label>
    <div class="metacols">${cols.map(col=>`<button type="button" class="metacol${c.cor===col?' on':''}" data-caticoncol="${catId}|${col}" style="background:${col}"></button>`).join('')}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap">
      <input type="color" id="catColPick" data-cat="${catId}" value="${/^#[0-9a-fA-F]{6}$/.test(c.cor||'')?c.cor:'#7aa183'}" title="Roda de cores" style="width:48px;height:38px;padding:2px">
      <input type="text" id="catColHex" data-cat="${catId}" value="${esc(c.cor||'')}" maxlength="7" placeholder="#RRGGBB" style="max-width:120px">
      <span class="dsub" style="margin:0">roda de cores ou código #RRGGBB</span>
    </div>
    <label style="margin-top:12px">Ícone</label>
    <div class="iconpick"><button class="${!c.icon?'on':''}" data-caticonpick="${catId}|" title="Sem ícone (só cor)"><span class="cicon dotcol" style="width:15px;height:15px;background:${c.cor}"></span></button>${Object.keys(CAT_ICONS).map(k=>`<button class="${c.icon===k?'on':''}" data-caticonpick="${catId}|${k}" title="${k}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${CAT_ICONS[k]}"/></svg></button>`).join('')}</div>
  </div>
  <div class="foot"><div class="spacer"></div><button class="btn primary" data-close="1">${svg(I.check)}Concluir</button></div></div>`;
  openBack();
}
function catTree(tipo){return topCats(tipo).map(c=>{
  const kids=childrenOf(c.id); const open=defCatOpen.has(c.id);
  const lead = kids.length? `<button class="iconbtn" data-defcatopen="${c.id}" style="padding:2px;flex:none" title="${open?'Fechar':'Abrir'} (${kids.length})">${open?'▾':'▸'}</button>` : '<span style="width:18px;display:inline-block;flex:none"></span>';
  const badge = kids.length? `<span class="catcount" data-defcatopen="${c.id}" title="${open?'Fechar':'Abrir'} sub-categorias">${kids.length}</span>` : '';
  let h=catRow(c,false,lead,badge);
  if(open) h+=kids.map(k=>catRow(k,true)).join('');
  return h;
}).join('');}

/* ================= EVENTS ================= */
document.addEventListener('click',e=>{
  const t=e.target.closest('button,a,[data-cell],[data-delmov],[data-movmov],[data-newcat]');
  // cell click (td) handled separately:
  const ren=e.target.closest('[data-rencat]');
  if(ren){ renameCat(ren.dataset.rencat); return; }
  const tog=e.target.closest('[data-toggle]');
  if(tog){ const id=tog.dataset.toggle; if(expandedCols.has(id))expandedCols.delete(id); else expandedCols.add(id); render(); return; }
  if(e.target.closest('[data-poupcont]')){ poupCont=!poupCont; render(); return; }
  const acy=e.target.closest('[data-acyear]'); if(acy){ const led=acertoLedger(); if(!acAnosOpen)acAnosOpen=new Set([Math.max(...led.map(r=>+r.ym.slice(0,4)))]); const y=+acy.dataset.acyear; if(acAnosOpen.has(y))acAnosOpen.delete(y); else acAnosOpen.add(y); render(); return; }
  const pl=e.target.closest('[data-poupledger]'); if(pl){ const a=pl.dataset.poupledger.split('|'); openContaLedger(a[0],+a[1]); return; }
  const dco=e.target.closest('[data-defcatopen]'); if(dco){ const id=dco.dataset.defcatopen; defCatOpen.has(id)?defCatOpen.delete(id):defCatOpen.add(id); render(); return; }
  const sgo=e.target.closest('[data-go]'); if(sgo){ gotoMov(sgo.dataset.go); return; }
  const delHead=e.target.closest('.delcol[data-delcat]');
  if(delHead){ delCat(delHead.dataset.delcat); return; }
  const cellTd=e.target.closest('[data-cell]');
  if(cellTd){ popEditId=null; openCellPop(...cellTd.dataset.cell.split('|').map((v,i)=>i?+v:v), cellTd); return; }
  if(!t) return;
  const d=t.dataset;
  if(d.tab){tab=d.tab;closePop();render();return;}
  if(d.year){ano+=+d.year;render();return;}
  if(d.gt){gridTipo=d.gt;render();return;}
  if(d.gview){gridView=d.gview;render();return;}
  if(d.gmmonth!=null){const _i=+d.gmmonth;gmOpen.has(_i)?gmOpen.delete(_i):gmOpen.add(_i);render();return;}
  if(d.acexpand){const led=acertoLedger();acAnosOpen=new Set(led.map(r=>+r.ym.slice(0,4)));render();return;}
  if(d.accollapse){acAnosOpen=new Set();render();return;}
  if(t.id==='acCsv'){expAcertoCSV();return;}
  if(d.delmov){const mv=state.movimentos.find(x=>x.id===d.delmov);if(mv&&isFrozenYm(mv.data.slice(0,7))){toast('Mês congelado — não pode ser apagado');return;}if(mv&&!confirm('Apagar este movimento?\n'+catName(mv.categoriaId)+' · '+fmt(Math.abs(mv.valor))+' · '+mv.data))return;reverteValete(mv);state.movimentos=state.movimentos.filter(x=>x.id!==d.delmov);save();const pc=popCell;render();if(pc){const an=document.querySelector(`[data-cell="${pc.catId}|${pc.mi}"]`);if(an)openCellPop(pc.catId,pc.mi,an);}return;}
  if(d.editmov){ popEditId=d.editmov; reopenPop(); return; }
  if(d.editsave){ saveEditMov(d.editsave); return; }
  if(d.editcancel){ popEditId=null; reopenPop(); return; }
  if(d.delcat){delCat(d.delcat);return;}
  if(d.newcat){openNewCat(d.newcat);return;}
  if(d.newsub){const pc=cat(d.newsub);openNewCat(pc.tipo,d.newsub);return;}
  if(d.movecat){openMoveCat(d.movecat);return;}
  if(t.id==='saveMoveCat'){saveMoveCat();return;}
  if(t.id==='doMerge'){mergeCat();return;}
  if(d.poupadd){ state.poupancas[d.poupadd]=state.poupancas[d.poupadd]||{contas:[],contagem:[]}; state.poupancas[d.poupadd].contas.push({nome:'Nova conta',valor:0}); save(); render(); return; }
  if(d.poupdel){ const [y,i]=d.poupdel.split('|'); state.poupancas[y].contas.splice(+i,1); save(); render(); return; }
  if(d.poupcont){ poupCont=!poupCont; render(); return; }
  if(d.recontei){ state.poupancas[d.recontei]=state.poupancas[d.recontei]||{contas:[],contagem:[]}; state.poupancas[d.recontei].contagemData=Date.now(); save(); render(); toast('Contagem marcada como atual'); return; }
  if(d.fch){ state.forecast.horizonte=+d.fch; save(); render(); return; }
  if(d.cenario){ const c=CENARIOS[d.cenario]; if(c){ state.forecast.gRec=c.gRec; state.forecast.gDesp=c.gDesp; state.forecast.juro=c.juro; save(); render(); } return; }
  if(t.id==='fcExport'){ expForecast(); return; }
  if(t.id==='fcInflReal'){ const r=inflacaoHistorica(); if(r!=null){state.forecast.gDesp=r;save();render();} return; }
  if(d.caticon){ openCatIcon(d.caticon); return; }
  if(d.caticonpick!=null){ const [id,k]=d.caticonpick.split('|'); const c=cat(id); if(c){ if(k&&CAT_ICONS[k])c.icon=k; else delete c.icon; save(); render(); openCatIcon(id); } return; }
  if(d.caticoncol!=null){ const [id,col]=d.caticoncol.split('|'); const c=cat(id); if(c){ c.cor=col; save(); render(); openCatIcon(id); } return; }
  if(d.novameta!=null){openMeta('');return;}
  if(d.metaedit){openMeta(d.metaedit);return;}
  if(d.metaadd){openMetaAdd(d.metaadd);return;}
  if(d.metadel){delMeta(d.metadel);return;}
  if(d.metacol){const hid=document.getElementById('mtCor');if(hid){hid.value=d.metacol;document.querySelectorAll('#back .metacol').forEach(b=>b.classList.toggle('on',b.dataset.metacol===d.metacol));}return;}
  if(t.id==='saveMeta'){saveMeta();return;}
  if(t.id==='metaAdd'){saveMetaAdd(1);return;}
  if(t.id==='metaSub'){saveMetaAdd(-1);return;}
  if(d.superflag){ const c=cat(d.superflag); if(c){c.superfluo=!c.superfluo; save(); render();} return; }
  if(d.acertoflag){ const c=cat(d.acertoflag); if(c){c.acerto=!c.acerto; save(); render();} return; }
  if(d.descflag){ const c=cat(d.descflag); if(c){c.desconto=!c.desconto; save(); render();} return; }
  if(t.id==='saveMargem'){ state.settings.valeteMargem=Math.max(0,parseFloat(val('valeteMargem'))||0); state.settings.diaSalario=Math.min(28,Math.max(1,parseInt(val('diaSalario'))||23)); save(); render(); toast('Guardado'); return; }
  if(t.id==='bell'){ const p=document.getElementById('alertPanel'); if(p.classList.contains('on')){p.classList.remove('on');} else { renderAlertPanel(); const r=t.getBoundingClientRect(); p.style.top=(r.bottom+8)+'px'; p.style.left=Math.max(10,r.right-340)+'px'; p.classList.add('on'); } return; }

let dragCat=null;
function nestCat(fromId,toId){
  const from=cat(fromId),to=cat(toId); if(!from||!to||fromId===toId)return;
  if(from.tipo!==to.tipo){ toast('Categorias de tipos diferentes'); return; }
  if(hasKids(fromId)){ toast('Tem sub-categorias — esvazia/move-as primeiro'); return; }
  const toTop = to.parent?to.parent:to.id;
  if(toTop===fromId){ return; }
  if(from.parent===toTop){ toast('Já está nesse grupo'); return; }
  from.parent=toTop; save(); render(); toast(`"${from.nome}" → dentro de "${cat(toTop).nome}"`);
}
function unnestCat(id){ const c=cat(id); if(!c||!c.parent)return; c.parent=null; save(); render(); toast(`"${c.nome}" passou a coluna principal`); }
function renameCat(id){ const c=cat(id); if(!c)return; const nv=prompt('Novo nome da categoria:',c.nome); if(nv&&nv.trim()){ c.nome=nv.trim(); save(); render(); toast('Categoria renomeada'); } }
function reorderBefore(fromId,beforeId){
  const from=cat(fromId),before=cat(beforeId); if(!from||!before||fromId===beforeId)return;
  if(from.tipo!==before.tipo){ toast('Categorias de tipos diferentes'); return; }
  const targetParent=before.parent||null;
  if(hasKids(fromId)&&targetParent){ toast('Um grupo não pode ir para dentro de outro'); return; }
  from.parent=targetParent;
  const sibs=catsOf(from.tipo).filter(c=>(c.parent||null)===targetParent && c.id!==fromId);
  let idx=sibs.findIndex(c=>c.id===beforeId); if(idx<0)idx=sibs.length;
  sibs.splice(idx,0,from);
  sibs.forEach((c,k)=>c.ordem=k);
  save(); render(); toast('Reordenado');
}
function clearDropFx(){ document.querySelectorAll('.th-drop,.th-before').forEach(x=>x.classList.remove('th-drop','th-before')); }
function dropMode(e,th){ const r=th.getBoundingClientRect(); return (e.clientX-r.left) < r.width*0.4 ? 'before' : 'nest'; }
document.addEventListener('dragstart',e=>{ const th=e.target.closest('th[data-cat]'); if(th){ dragCat=th.dataset.cat; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',dragCat);}catch(_){ } } });
document.addEventListener('dragover',e=>{ if(!dragCat)return; clearDropFx(); const top=e.target.closest('th[data-droptop]'); if(top){ e.preventDefault(); top.classList.add('th-drop'); return; } const t=e.target.closest('th[data-cat]'); if(t){ e.preventDefault(); e.dataTransfer.dropEffect='move'; t.classList.add(dropMode(e,t)==='before'?'th-before':'th-drop'); } });
document.addEventListener('drop',e=>{ if(!dragCat)return; const top=e.target.closest('th[data-droptop]'); const t=e.target.closest('th[data-cat]'); e.preventDefault(); clearDropFx(); if(top){ unnestCat(dragCat); } else if(t){ if(dropMode(e,t)==='before') reorderBefore(dragCat,t.dataset.cat); else nestCat(dragCat,t.dataset.cat); } dragCat=null; });
document.addEventListener('dragend',()=>{ dragCat=null; clearDropFx(); });

/* ===== LEMBRETES DE DÉBITOS ===== */
/* despesas fixas (com dia aprendido das faturas) ainda não pagas este mês, a vencer nos próximos `dias` */
function proximosDebitos(dias){
  const d=new Date();const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0');const dim=new Date(Y,M+1,0).getDate();
  if(typeof dias!=='number')dias=99;
  // agendados (faturas com débito futuro) — valor EXATO, marcados como confirmados
  const pend=(state.movimentos||[]).filter(m=>m.tipo==='despesa'&&m.pendente&&m.data.slice(0,7)===ymCur)
    .map(m=>({nome:catName(m.categoriaId),catId:m.categoriaId,valor:Math.abs(m.valor),dia:Math.min(dim,Math.max(1,+m.data.slice(8,10))),agendado:true}));
  // estimativa pelas fixas, excluindo categorias que já têm movimento este mês (inclui os agendados)
  const est=(state.recorrencias||[]).filter(r=>r.ativo!==false).map(r=>({
    nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),
    catId:r.categoriaId, valor:medValorFixa(r), dia:Math.min(dim,Math.max(1,+r.dia||8)),
    pago:catMesTotal(r.categoriaId,ymCur)>0
  })).filter(x=>!x.pago && x.valor>0);
  return [...pend,...est].filter(x=>x.dia>=today && x.dia<=today+dias).sort((a,b)=>a.dia-b.dia);
}

  try{

    if(!force && localStorage.getItem('casa-lembrete')===hoje) return; // 1x por dia
    const due=proximosDebitos(3);

    }
  }catch(e){}
}

function _norm(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function openSearch(){
  document.getElementById('back').innerHTML=`<div class="modal"><h2>${svg(I.search)} Pesquisar movimentos <button class="close" data-close="1">&times;</button></h2>
  <div class="body">
    <input id="searchq" type="text" placeholder="categoria, nota, valor, mês… (ex: luz, 42, jun 2025, receita)" autocomplete="off" style="font-size:15px">
    <div id="searchres" style="margin-top:10px;max-height:50vh;overflow:auto"></div>
  </div></div>`;
  openBack();
  const inp=document.getElementById('searchq');
  inp.addEventListener('input',searchRender);
  setTimeout(()=>inp.focus(),50);
  searchRender();
}
function searchRender(){
  const q=_norm(document.getElementById('searchq').value).trim();
  const res=document.getElementById('searchres');
  if(q.length<1){res.innerHTML=`<div class="hint">Escreve para procurar em todos os anos. Podes combinar termos (ex: <b>super junho</b>).</div>`;return;}
  const terms=q.split(/\s+/).filter(Boolean);
  const hits=state.movimentos.filter(m=>{
    const d=m.data; const mes=MESES[+d.slice(5,7)-1]||''; const ano4=d.slice(0,4);
    const hay=_norm([d,mes,ano4,m.tipo,catName(m.categoriaId),m.nota||'',Math.abs(m.valor).toFixed(2),Math.abs(m.valor).toFixed(2).replace('.',',')].join(' '));
    return terms.every(t=>hay.includes(t));
  }).sort((a,b)=>b.data.localeCompare(a.data)).slice(0,80);
  if(!hits.length){res.innerHTML=`<div class="pempty">Nada encontrado.</div>`;return;}
  const total=hits.reduce((a,m)=>a+(m.tipo==='despesa'?-Math.abs(m.valor):m.valor),0);
  res.innerHTML=`<div style="font-size:12px;color:var(--mut);margin-bottom:6px">${hits.length} resultado(s)${hits.length>=80?' (mostro os 80 mais recentes)':''} · saldo ${fmt(round2(total))}</div>`+
    hits.map(m=>{const neg=m.tipo==='despesa'||m.valor<0;return `<div class="srow" data-go="${m.id}" style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer">
      <span style="width:74px;font-size:11.5px;color:var(--mut)">${m.data.slice(8,10)}/${m.data.slice(5,7)}/${m.data.slice(0,4)}</span>
      <span style="flex:1;font-size:13px">${esc(catName(m.categoriaId))}${m.nota?` <span style="color:var(--mut);font-size:11.5px">· ${esc(m.nota)}</span>`:''}${m.cash?' 💵':''}</span>
      <span style="font-weight:700;color:${neg?'var(--out)':'var(--in)'}">${neg?'−':'+'}${fmt(Math.abs(m.valor))}</span></div>`;}).join('');
}
function gotoMov(id){const m=state.movimentos.find(x=>x.id===id);if(!m)return;ano=+m.data.slice(0,4);gridTipo=m.tipo;tab='grelha';closeBack();render();toast(catName(m.categoriaId)+' · '+m.data);}

function quickAdd(cash){
  const v=parseFloat(val('qVal')); if(isNaN(v)||v===0){document.getElementById('qVal').focus();return;}
  const catId=document.getElementById('qCat').value, mi=+document.getElementById('qMes').value;
  if(isFrozenMi(ano,mi)){toast('Mês congelado — só podes lançar do mês atual para a frente');return;}

/* ===== Sincronização com a Dropbox (OAuth PKCE, código manual — sem servidor) ===== */
const DBX_FILE='/CASA-dados.json';
let _dbxTok=null,_dbxTokExp=0,_syncTimer=null,_syncing=false,_lastSync=null,_syncErr=null;
function dbxCfg(){try{return JSON.parse(localStorage.getItem('casa-dropbox')||'null');}catch(e){return null;}}
function dbxSet(c){localStorage.setItem('casa-dropbox',JSON.stringify(c));}
function dbxOn(){const c=dbxCfg();return !!(c&&c.refresh);}
function _b64url(buf){let s=btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));return s.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return _b64url(a.buffer);}
async function _pkce(){const verifier=_rand(48);if(crypto.subtle){try{const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier));return{verifier,challenge:_b64url(d),method:'S256'};}catch(e){}}return{verifier,challenge:verifier,method:'plain'};}
async function dbxStartAuth(){
  const key=(val('dbxKey')||'').trim(); if(!key){toast('Cola a App key da Dropbox');return;}
  const p=await _pkce(); dbxSet({key,verifier:p.verifier,pending:true});
  const url='https://www.dropbox.com/oauth2/authorize?client_id='+encodeURIComponent(key)+'&response_type=code&token_access_type=offline&code_challenge='+p.challenge+'&code_challenge_method='+p.method;
  window.open(url,'_blank'); render();
}
async function dbxFinishAuth(){
  const c=dbxCfg(); const code=(val('dbxCode')||'').trim();
  if(!c||!c.verifier){toast('Recomeça a ligação');return;} if(!code){toast('Cola o código');return;}
  try{
    const body=new URLSearchParams({code,grant_type:'authorization_code',client_id:c.key,code_verifier:c.verifier});
    const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    if(!r.ok)throw new Error('token '+r.status);
    const j=await r.json(); dbxSet({key:c.key,refresh:j.refresh_token});
    _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000;
    toast('Dropbox ligada ✓'); await syncOpen(); render();
  }catch(e){toast('Falha a ligar: '+e.message); _syncErr=e.message; render();}
}
function dbxDisconnect(){localStorage.removeItem('casa-dropbox');_dbxTok=null;_lastSync=null;_syncErr=null;toast('Dropbox desligada');render();}
async function dbxToken(){
  const c=dbxCfg(); if(!c||!c.refresh)return null;
  if(_dbxTok&&Date.now()<_dbxTokExp)return _dbxTok;
  const body=new URLSearchParams({grant_type:'refresh_token',refresh_token:c.refresh,client_id:c.key});
  const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok)throw new Error('refresh '+r.status); const j=await r.json();
  _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000; return _dbxTok;
}

async function syncOpen(){ /* ao abrir: adota o remoto se for mais recente; senão envia o local */
  if(!dbxOn())return; _syncing=true;_syncUI();
  try{

    if(txt){ const remote=JSON.parse(txt);

/* valor junto a um rótulo (ex.: "Total a pagar"): procura DEPOIS e também ANTES do rótulo,
   porque há faturas (ex.: Endesa) que escrevem "42,52 € TOTAL A DEBITAR" e depois sub-linhas (LUZ 35,65 €).
   Escolhe o valor mais próximo do rótulo; o "antes" só conta se tiver € entre o valor e o rótulo. */
function _amountNear(text,re){
  const m=re.exec(text);if(!m)return null;
  const idx=m.index,endi=idx+m[0].length;
  const aRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g;
  const after=text.slice(endi,endi+90); aRe.lastIndex=0; const af=aRe.exec(after);
  const afterVal=af?{v:parseValorPT(af[0]),d:af.index}:null;
  const before=text.slice(Math.max(0,idx-24),idx); let bm=null,mm; const bRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g; while((mm=bRe.exec(before)))bm=mm;
  let beforeVal=null;
  if(bm){const gap=before.slice(bm.index+bm[0].length); if(gap.includes('€')||/\beur/i.test(gap)) beforeVal={v:parseValorPT(bm[0]),d:gap.length};}
  if(beforeVal && (!afterVal || beforeVal.d<afterVal.d)) return beforeVal.v;
  return afterVal?afterVal.v:null;
}
/* datas PT: aceita "13 jun 2026", "17 Junho 2026", "22 de junho de 2026" e numéricas dd-mm-aaaa / aaaa-mm-dd */
function _mesPT(tok){tok=String(tok).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');const a=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];for(let i=0;i<12;i++)if(tok.startsWith(a[i]))return i;return -1;}
function parseDataPT(str){
  if(!str)return null;
  let m=str.match(/(\d{1,2})\s*(?:de\s+)?([A-Za-zçÇÀ-ſ]{3,12})\.?\s*(?:de\s+)?(\d{4})/);
  if(m){const mi=_mesPT(m[2]),y=+m[3];if(mi>=0&&y>=2015&&y<=2035)return[mi,y,+m[1]];}
  m=str.match(/(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/);
  if(m){let mo=+m[2]-1,y=+m[3];if(y<100)y+=2000;if(mo>=0&&mo<12&&y>=2015&&y<=2035)return[mo,y,+m[1]];}
  m=str.match(/(\d{4})[\/.\-](\d{1,2})[\/.\-](\d{1,2})/);
  if(m){const y=+m[1],mo=+m[2]-1;if(mo>=0&&mo<12)return[mo,y,+m[3]];}
  return null;
}
/* data em que sai da conta (débito direto) — prioritária; cada fornecedor escreve à sua maneira */
function dataDebito(text){
  const A=[/debitad[oa][^.]{0,70}?a\s*partir\s*d[eo]\s*(?:o\s*dia)?:?\s*/i,/d[ée]bito\s*(?:directo|direto)?\s*a\s*partir\s*d[eo]\s*(?:o\s*)?(?:dia)?:?\s*/i,/cobran[çc]a\s*em:?\s*/i,/(?:deve\s*ser\s*paga|a\s*pagar)\s*at[ée]\s*/i,/data\s*limite\s*(?:de\s*)?pagamento:?\s*/i];
  for(const re of A){const m=re.exec(text);if(m){const start=m.index+m[0].length;const d=parseDataPT(text.slice(start,start+30));if(d)return d;}}
  return null;
}
/* deteta movimento já existente (mesma natureza, valor ao cêntimo e mês) — evita importar a mesma fatura/recibo 2x */
function isDupMov(tipo,catId,valor,ym){return state.movimentos.find(m=>m.tipo===tipo&&m.categoriaId===catId&&Math.abs(Math.abs(m.valor)-Math.abs(valor))<0.005&&m.data.slice(0,7)===ym)||null;}
function parseFatura(text){
  const amtRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g;
  const all=[...text.matchAll(amtRe)].map(m=>parseValorPT(m[0])).filter(v=>v!=null&&v>0);
  let total=null;
  const KW=[/total\s*a\s*debitar/i,/total\s*a\s*pagar/i,/valor\s*a\s*pagar/i,/montante\s*a\s*pagar/i,/total\s*a\s*liquidar/i,/valor\s*a\s*debitar/i,/pr[ée]mio\s*total/i,/total\s*da\s*fatura/i,/total\s*c\/?\s*iva/i,/valor\s*desta\s*fatura/i,/\btotal\b/i,/\bmontante\b/i,/\ba\s*pagar\b/i];
  for(const re of KW){const v=_amountNear(text,re);if(v!=null){total=v;break;}}
  if(total==null&&all.length)total=Math.max(...all);
  const cand=[...new Set(all)].sort((a,b)=>b-a).slice(0,8);
  // data: débito direto (quando sai da conta) primeiro; senão data de emissão/fatura
  let mi=null,year=null,dia=null;
  const deb=dataDebito(text);
  if(deb){mi=deb[0];year=deb[1];dia=deb[2];}
  if(mi==null){const idx=text.search(/data\s*(?:de|da)?\s*(?:emiss|fatura)/i);const d=idx>=0?parseDataPT(text.slice(idx,idx+45)):parseDataPT(text);if(d){mi=d[0];year=d[1];if(dia==null)dia=d[2];}}
  // categoria pelo fornecedor (regra que dispara é a "assinatura" segura: não depende do nome do cliente)
  let catId=null,forn=null;
  for(const [re,nome] of FATURA_CATS){if(re.test(text)){const c=findCatByName(nome);if(c){catId=c.id;forn=nome;break;}}}
  // categoria aprendida (override): se já corrigiste antes a categoria deste tipo de fornecedor
  const learned=forn?(state.faturaMap||{})[forn]:null;
  if(learned&&cat(learned))catId=learned;
  return {total,cand,mi,year,dia,catId,forn,sig:forn,text};
}
async function processFatura(file){
  if(!file)return; toast('A ler a fatura…');
  try{
    const text=await extractPdfText(file);
    if(!text||text.replace(/\s/g,'').length<20){ toast('PDF sem texto (parece digitalizado/imagem) — não dá para ler offline.'); return; }
    openFaturaReview(parseFatura(text));
  }catch(e){ toast('Falha a ler o PDF: '+(e.message||e.name||'erro')); }
}

function inboxAdd(id){
  const it=(state.inbox||[]).find(x=>x.id===id); if(!it)return;
  const catId=(document.getElementById('ibcat_'+id)||{}).value||it.catId;
  if(!catId){toast('Escolhe a categoria');return;}
  const mi=+((document.getElementById('ibmes_'+id)||{}).value)||0;
  const year=+((document.getElementById('ibano_'+id)||{}).value)||ano;
  const tipo=it.tipo||'despesa';
  const isBank=it.source==='bank';
  const isMail=it.source==='mail';
  const useExact=isBank||isMail; // banco e faturas de email já trazem a data real
  const cash=tipo==='despesa' && !!(document.getElementById('ibcash_'+id)||{}).checked;
  if(isFrozenMi(year,mi)){toast('Mês congelado — desbloqueia na grelha');return;}
  // banco => usa a data real do movimento; QR despesa recorrente => dia de débito aprendido
  const rec=tipo==='despesa'?(state.recorrencias||[]).find(r=>r.categoriaId===catId&&r.ativo!==false):null;
  const recorrente = !useExact && !!(rec&&rec.dia);
  const dia = recorrente ? Math.min(rec.dia,28) : (it.dia&&it.dia>=1&&it.dia<=28?it.dia:15);
  const ym=`${year}-${String(mi+1).padStart(2,'0')}`;
  const dataStr=`${ym}-${String(dia).padStart(2,'0')}`;
  const dupe=isDupMov(tipo,catId,it.total,ym);
  if(dupe&&!confirm('Já existe um movimento igual neste mês ('+catName(catId)+' · '+fmt(Math.abs(dupe.valor))+').\nAdicionar à mesma?'))return;
  const mv={id:nid('m'),data:dataStr,tipo,categoriaId:catId,valor:valorComSinal(catId,tipo,it.total),pagador:P()[0].id,split:{...state.settings.splitDefault},nota:(isBank||isMail)?(it.desc||(isMail?'fatura':'banco')):'fatura'};
  if(rec)mv.recId=rec.id;
  if(cash){mv.cash=true;mv.ts=Date.now();}
  // banco pendente (não cobrado) ou QR recorrente com débito futuro => agendado
  const futuro = (isBank ? it.pend : ((isMail||recorrente) && !cash && dataStr>isoToday())) && !isPastMonth(year,mi);
  if(futuro)mv.pendente=true;
  state.movimentos.push(mv); if(!futuro && !isPastMonth(year,mi))aplicaValete(mv);
  if(it.nif)state.nifMap[it.nif]=catId; // aprende NIF -> categoria
  if(isMail && it.from){ // aprende remetente -> categoria (cria/atualiza o fornecedor)
    state.providers=state.providers||[];
    let pv=findProvider(it.from); if(!pv){pv={id:nid('pv'),label:it.fromName||it.from,from:it.from,catId,auto:false,n:0,last:null};state.providers.push(pv);}
    pv.catId=catId; pv.n=(pv.n||0)+1; pv.last={total:it.total,ym};
  }
  state.inbox=state.inbox.filter(x=>x.id!==id);
  save(); render(); openInbox();
  toast((futuro?'Agendado p/ '+dia+'/'+String(mi+1).padStart(2,'0')+': ':(cash?'Dinheiro: ':(tipo==='receita'?'Receita: ':'Adicionada: ')))+fmt(Math.abs(it.total))+' · '+catName(catId));
}
function inboxDiscard(id){
  const it=(state.inbox||[]).find(x=>x.id===id); if(!it)return;
  if(!confirm('Descartar esta fatura da caixa de entrada?\n'+fmt(it.total)))return;
  state.inbox=state.inbox.filter(x=>x.id!==id); save(); render(); openInbox();
}

/* ===== FOTO DA FATURA — OCR 100% LOCAL (Tesseract.js, a imagem nunca sai do dispositivo) ===== */
let _tess=null;
async function loadTesseract(){
  if(_tess)return _tess;
  const m=await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js');
  _tess=m.default||m.Tesseract||m; return _tess;
}
/* melhora a foto antes do OCR: upscale (mín. 1500px de largura), cinzento e reforço de contraste */
function preprocessImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{ try{
      const tw=Math.min(2200,Math.max(1500,img.naturalWidth)); const r=tw/img.naturalWidth;
      const w=Math.round(img.naturalWidth*r), h=Math.round(img.naturalHeight*r);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,w,h);
      const id=ctx.getImageData(0,0,w,h),d=id.data;
      for(let i=0;i<d.length;i+=4){ let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; g=(g-128)*1.5+135; g=g<0?0:g>255?255:g; d[i]=d[i+1]=d[i+2]=g; }
      ctx.putImageData(id,0,0); cv.toBlob(b=>resolve(b||file),'image/png');
    }catch(e){ resolve(file); } };
    img.onerror=()=>resolve(file);
    img.src=URL.createObjectURL(file);
  });
}
async function ocrImagem(file){
  const T=await loadTesseract();
  const pre=await preprocessImage(file);
  const {data}=await T.recognize(pre,'por',{logger:msg=>{ if(msg&&msg.status==='recognizing text'){ toast('A ler a foto… '+Math.round((msg.progress||0)*100)+'%'); } }});
  return (data&&data.text)||'';
}
/* corrige erros típicos de OCR em valores monetários (mantém o resto do texto intacto) */
function ocrFixNums(text){
  return String(text||'')
    .replace(/(\d)[.·•](\d{2})(?!\d)/g,'$1,$2') // 40.92 / 40·92 -> 40,92
    .replace(/(\d)\s+,(\d{2})/g,'$1,$2')                  // "40 ,92" -> "40,92"
    .replace(/(\d),\s+(\d{2})/g,'$1,$2')                  // "40, 92" -> "40,92"
    .replace(/(\d)\s(\d{3})\b/g,'$1$2');                  // "1 234" milhares -> "1234"
}
/* ----- QR code da fatura (formato AT) — leitura local com jsQR ----- */
function loadJsQR(){
  if(window.jsQR)return Promise.resolve(window.jsQR);
  return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';s.onload=()=>res(window.jsQR);s.onerror=()=>rej(new Error('jsQR'));document.head.appendChild(s);});
}
async function readQR(file){
  const jsQR=await loadJsQR();
  const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=URL.createObjectURL(file);});
  for(const tw of [1100,1700,800,2200]){
    const r=tw/img.naturalWidth; if(!isFinite(r)||r<=0)continue;
    const w=Math.round(img.naturalWidth*r),h=Math.round(img.naturalHeight*r);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
    const id=ctx.getImageData(0,0,w,h);
    const code=jsQR(id.data,w,h,{inversionAttempts:'attemptBoth'});
    if(code&&code.data)return code.data;
  }
  return null;
}
/* QR AT: campos separados por '*', cada um "Letra:valor". O=total c/ imposto, A=NIF emitente, F=data (AAAAMMDD) */
function parseFaturaQR(str){
  if(!str||str.indexOf('*')<0||str.indexOf(':')<0)return null;
  const f={}; str.split('*').forEach(p=>{const i=p.indexOf(':');if(i>0)f[p.slice(0,i).trim()]=p.slice(i+1).trim();});
  if(!f.A&&!f.O)return null;
  const total=f.O?parseFloat(String(f.O).replace(',','.')):null;
  let mi=null,year=null,dia=null;
  if(f.F&&/^\d{8}$/.test(f.F)){year=+f.F.slice(0,4);mi=+f.F.slice(4,6)-1;dia=+f.F.slice(6,8);}
  return {total:(isNaN(total)?null:total), nif:f.A||null, year, mi, dia, tipo:f.D||null};
}
function inboxFromQR(q){
  const catId=(state.nifMap||{})[q.nif]||null;
  state.inbox=state.inbox||[];
  state.inbox.push({id:nid('ib'),total:q.total,nif:q.nif||null,year:q.year||null,mi:(q.mi!=null?q.mi:null),dia:(q.dia||null),catId,ts:Date.now()});
  save(); render();
  toast('Fatura na Caixa de entrada (QR): '+fmt(q.total)+(catId?' · '+catName(catId):' · por classificar'));
}
async function processFotoFatura(file){
  if(!file)return; toast('A analisar a foto…');
  try{
    // 1) QR primeiro (exato, sem erros) — vai para a Caixa de entrada
    let qr=null; try{ qr=await readQR(file); }catch(e){}
    if(qr){ const q=parseFaturaQR(qr); if(q&&q.total!=null){ inboxFromQR(q); return; } }
    // 2) sem QR legível -> OCR + revisão imediata
    toast('Sem QR legível — a ler por OCR…');
    let text=await ocrImagem(file);
    text=ocrFixNums(text);
    if(!text||text.replace(/\s/g,'').length<15){ toast('Não consegui ler a foto. Tenta com mais luz, de frente e sem sombras.'); return; }
    const p=parseFatura(text); p._foto=true;
    openFaturaReview(p);
  }catch(e){ toast('Falha a ler a foto: '+(e.message||e.name||'erro')); }
}
let _faturaDia=null,_faturaSig='',_faturaCatSug=null;

  <div class="body">

    <div class="f2">

      <div><label>Categoria${p.forn?' (sugerida: '+esc(p.forn)+')':''}</label><select id="fatCat">${catOptions('despesa',p.catId)}</select></div>
    </div>
    <div class="f2">

    </div>
    ${p.cand&&p.cand.length>1?`<div><label>Valores detetados no PDF (clica para usar)</label><div style="display:flex;gap:6px;flex-wrap:wrap">${p.cand.map(v=>`<button class="chip" data-fatcand="${v}">${fmtn(v)}</button>`).join('')}</div></div>`:''}
    <div class="hint" style="border-left:3px solid var(--warn)">Confere o <b>valor</b> e a <b>data</b> com a fatura antes de gravar — a leitura é automática mas tu é que validas.</div>
    <details><summary style="cursor:pointer;color:var(--mut);font-size:12px">Ver texto lido do PDF</summary><pre style="white-space:pre-wrap;max-height:150px;overflow:auto;font-size:11px;color:var(--mut);margin-top:6px">${esc(p.text.slice(0,2500))}</pre></details>
  </div>
  <div class="foot"><div class="spacer"></div><button class="btn" data-close="1">Cancelar</button><button class="btn primary" id="fatSave">${svg(I.check)}Gravar despesa</button></div></div>`;
  openBack(); setTimeout(()=>{const i=document.getElementById('fatVal');if(i&&!i.value)i.focus();},40);

function gravarFatura(){
  const v=parseFloat(val('fatVal')); if(isNaN(v)||v===0){toast('Indica o valor');document.getElementById('fatVal').focus();return;}
  const catId=document.getElementById('fatCat').value, mi=+document.getElementById('fatMes').value, year=+val('fatAno')||ano;
  if(isFrozenMi(year,mi)){toast('Mês congelado — desbloqueia na grelha para lançar no passado');return;}
  const dupe=isDupMov('despesa',catId,v,`${year}-${String(mi+1).padStart(2,'0')}`);
  if(dupe&&!confirm('Já existe uma despesa igual neste mês ('+catName(catId)+' · '+fmt(Math.abs(dupe.valor))+' em '+dupe.data+').\nGravar mesmo assim?'))return;
  const dia=(_faturaDia!=null)?Math.min(_faturaDia,28):15;
  const dataStr=`${year}-${String(mi+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
  const mv={id:nid('m'),data:dataStr,tipo:'despesa',categoriaId:catId,valor:Math.abs(v),pagador:P()[0].id,split:{...state.settings.splitDefault},nota:'fatura'};
  // liga à despesa fixa correspondente (evita dupla contagem na previsão) e aprende o dia do débito
  const rec=(state.recorrencias||[]).find(r=>r.categoriaId===catId&&r.ativo!==false);
  if(rec)mv.recId=rec.id;
  if(_faturaDia!=null&&rec&&rec.dia!==_faturaDia)rec.dia=Math.min(_faturaDia,28);
  // débito FUTURO => fica AGENDADO (pendente): não abate no Valete real até chegar o dia
  const futuro = dataStr>isoToday() && !isPastMonth(year,mi);
  if(futuro){ mv.pendente=true; }
  state.movimentos.push(mv); if(!futuro && !isPastMonth(year,mi))aplicaValete(mv);
  // aprender fornecedor->categoria se corrigiste a sugestão
  let aprendi=false; if(_faturaSig&&catId!==_faturaCatSug){state.faturaMap[_faturaSig]=catId;aprendi=true;}
  ano=year; save(); closeBack(); render();
  toast((futuro?'Fatura agendada p/ '+dataStr.slice(8,10)+'/'+dataStr.slice(5,7)+': ':'Fatura gravada: ')+fmt(Math.abs(v))+' · '+catName(catId)+(aprendi?' · aprendi a categoria':''));
  _faturaDia=null;_faturaSig='';_faturaCatSug=null;
}

/* ===== IMPORTAR VÁRIAS FATURAS (lote) ===== */
let _fatBatch=null;
async function processFaturasBatch(files){
  toast('A ler '+files.length+' faturas…');
  const items=[];
  for(const f of files){
    try{ const text=await extractPdfText(f);
      if(!text||text.replace(/\s/g,'').length<20){ items.push({nome:f.name,erro:'sem texto (imagem?)'}); continue; }
      const p=parseFatura(text); items.push({nome:f.name,p});
    }catch(e){ items.push({nome:f.name,erro:(e.message||e.name||'erro')}); }

function findOrCreateReceitaCat(nome,opts){
  opts=opts||{};

  if(c)return c.id;

/* mapeia a descrição de uma linha do recibo -> categoria de receita da app */
function mapReciboLinha(desc,tipo){ // tipo: 'R' remuneração / 'D' desconto
  const d=desc.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  if(tipo==='D'){
    if(/seg.*social|seguranca social/.test(d))return {catId:findOrCreateReceitaCat('Desc. SS',{desconto:true}),label:'Desc. SS'};
    if(/\birs\b/.test(d))return {catId:findOrCreateReceitaCat('IRS',{desconto:true}),label:'IRS'};
    if(/especie/.test(d))return {catId:null,label:'(espécie — anula subsídio em géneros)',skip:true};
    if(/seguro\s*saude|seguro\s*de\s*saude/.test(d))return {catId:findOrCreateReceitaCat('Outros descontos',{desconto:true}),label:'Outros descontos'};
    return {catId:findOrCreateReceitaCat('Outros descontos',{desconto:true}),label:'Outros descontos'};
  }
  // remunerações
  if(/alimenta|generos|géneros/.test(d)&&/generos|géneros|especie/.test(d))return {catId:findOrCreateReceitaCat('Coverflex',{coverflex:true}),label:'Coverflex'};
  if(/alimenta/.test(d))return {catId:findOrCreateReceitaCat('Subsídios'),label:'Subsídios'};
  if(/vencimento|ordenado|salario/.test(d))return {catId:findOrCreateReceitaCat('Salário'),label:'Salário'};
  if(/ajuda/.test(d))return {catId:findOrCreateReceitaCat('Ajudas'),label:'Ajudas'};
  if(/comiss/.test(d))return {catId:findOrCreateReceitaCat('Comissões'),label:'Comissões'};
  if(/bonus|bónus|premio|prémio/.test(d))return {catId:findOrCreateReceitaCat('Compl. salário'),label:'Compl. salário'};
  if(/assist|subsidio|subsídio|complement/.test(d))return {catId:findOrCreateReceitaCat('Compl. salário'),label:'Compl. salário'};
  return {catId:findOrCreateReceitaCat('Compl. salário'),label:'Compl. salário'};
}
function parseRecibo(text){
  const codeRe=/([RD])\s?(\d{2})\b/g; // R01, D01...
  const codes=[]; let m;
  while((m=codeRe.exec(text)))codes.push({tipo:m[1],idx:m.index,end:codeRe.lastIndex});
  const amtRe=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/;
  const amtReG=/\d{1,3}(?:[.\s]\d{3})*,\d{2}/g;
  const cleanDesc=s=>s.replace(/^.*\b(?:Data|Descri[çc][ãa]o|Remunera\S+|Descontos|C[óo]d\S*)\b\s*/i,'').replace(amtReG,'').replace(/\s+/g,' ').trim();
  const linhas=[];
  for(let i=0;i<codes.length;i++){
    const seg=text.slice(i===0?0:codes[i-1].end, codes[i].idx);
    const tipo=codes[i].tipo;
    let valor=null,desc='';
    if(tipo==='R'){ // desc ... valor R
      const am=[...seg.matchAll(amtReG)]; if(am.length){const last=am[am.length-1];valor=parseValorPT(last[0]);desc=cleanDesc(seg.slice(0,last.index));}
    } else { // valor desc D
      const am=amtRe.exec(seg); if(am){valor=parseValorPT(am[0]);desc=cleanDesc(seg.slice(am.index+am[0].length));}
    }
    if(valor!=null&&valor>0&&desc) linhas.push({tipo,desc,valor});
  }
  // data / período
  let mi=null,year=null,dia=null;
  const dm=text.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(dm){mi=+dm[2]-1;year=+dm[3];dia=+dm[1];}
  if(mi==null){const d=parseDataPT(text);if(d){mi=d[0];year=d[1];dia=d[2];}}
  // total pago (validação)
  let totalPago=_amountNear(text,/total\s*pago/i);
  return {linhas,mi,year,dia,totalPago,text};
}
