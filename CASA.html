<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CASA · Finanças</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f141b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CASA">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="CASA · Finanças">
<meta property="og:description" content="Gestão financeira pessoal — grelha, poupanças, previsão e controlo.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://diduvalle.github.io/finance/CASA.html">
<meta property="og:image" content="https://diduvalle.github.io/finance/icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CASA · Finanças">
<meta name="twitter:description" content="Gestão financeira pessoal.">
<meta name="twitter:image" content="https://diduvalle.github.io/finance/icon-512.png">
<style>
:root{
  --bg:#0f141b; --bg2:#141a22; --card:#1a212b; --card2:#212a36; --line:#2a3441; --line2:#374252;
  --txt:#e8edf4; --mut:#8d9bad; --acc:#22c55e; --accd:#16a34a;
  --in:#22c55e; --out:#f87171; --warn:#f59e0b; --info:#38bdf8;
  --sh:0 4px 18px rgba(0,0,0,.3); --r:12px;
}
[data-theme="light"]{
  --bg:#f1f4f9; --bg2:#e9eef5; --card:#fff; --card2:#f5f8fc; --line:#dde4ee; --line2:#cdd6e3;
  --txt:#16202b; --mut:#637084; --sh:0 4px 16px rgba(20,40,80,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.4}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 18px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--accd));display:grid;place-items:center;color:#fff;font-size:17px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px}
.tabs button{background:none;border:0;color:var(--mut);padding:7px 13px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.tabs button svg{width:17px;height:17px;flex:none}
.tabs button.on{background:var(--acc);color:#fff}
.spacer{flex:1}
.yearnav{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
.yearnav button{background:none;border:0;color:var(--mut);cursor:pointer;width:30px;height:28px;border-radius:6px;font-size:16px}
.yearnav button:hover{background:var(--card2);color:var(--txt)}
.yearnav .y{font-weight:800;font-size:15px;min-width:54px;text-align:center}
.btn{background:var(--card);color:var(--txt);border:1px solid var(--line);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn svg{width:15px;height:15px}
.btn.primary{background:linear-gradient(135deg,var(--acc),var(--accd));border:0;color:#fff}
.btn.primary:hover{filter:brightness(1.08);color:#fff}
.btn.sm{padding:5px 9px;font-size:12px}
.btn.danger:hover{border-color:var(--out);color:var(--out)}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:none;border:0;color:var(--mut);padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600}
.seg button.on-out{background:var(--out);color:#fff}
.seg button.on-in{background:var(--in);color:#fff}
input,select{font-family:inherit;font-size:14px;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;outline:none}
input:focus,select:focus{border-color:var(--acc)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
@media(max-width:720px){.tabs .tablabel{display:none}.tabs button{padding:9px 12px}}
#bell{background:none;border:0;color:var(--mut);cursor:pointer;position:relative;padding:6px;border-radius:9px;display:inline-flex}
#bell:hover{color:var(--txt);background:var(--card)}
#bell svg{width:19px;height:19px;display:block}
#refreshBtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:6px;border-radius:9px;display:inline-flex}
#refreshBtn:hover{color:var(--txt);background:var(--card)}
#refreshBtn svg{width:18px;height:18px;display:block}
#refreshBtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bell-badge{position:absolute;top:-1px;right:-1px;background:var(--out);color:#fff;font-size:10px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
.main{padding:16px 20px 80px;flex:1}
/* KPI strip */
.kstrip{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kbox{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 16px;flex:1;min-width:150px}
.kbox .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kbox .v{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.pos{color:var(--in)} .neg{color:var(--out)}
/* Quick add */
.qadd{display:flex;gap:8px;align-items:flex-end;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:14px;flex-wrap:wrap}
.qadd .fld{display:flex;flex-direction:column}
.qadd input,.qadd select{padding:9px 11px}
.qadd .v{width:120px;font-weight:700;font-size:16px}
/* Grid */
.gridwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:auto;box-shadow:var(--sh)}
table.grid{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.grid th,table.grid td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:0;text-align:right;white-space:nowrap}
table.grid thead th{position:sticky;top:0;background:var(--card2);z-index:2;font-size:11.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:9px 10px;cursor:default}
table.grid thead th .delcol{opacity:0;color:var(--mut);cursor:pointer;margin-left:6px;font-weight:400}
table.grid thead th:hover .delcol{opacity:.6}
table.grid thead th .delcol:hover{opacity:1;color:var(--out)}
table.grid tbody th,table.grid tfoot th{position:sticky;left:0;background:var(--card2);z-index:1;text-align:left;font-weight:700;padding:9px 12px;font-size:13px;color:var(--txt)}
table.grid td.cell{padding:9px 10px;cursor:pointer;font-size:13.5px;min-width:88px}
table.grid td.cell:hover{background:rgba(34,197,94,.10);box-shadow:inset 0 0 0 1.5px var(--acc)}
table.grid td.cell.z{color:var(--mut);font-weight:400}
table.grid td.tot,table.grid th.tot{background:var(--card2);font-weight:800;position:sticky;right:0;border-left:1px solid var(--line2)}
table.grid tfoot th,table.grid tfoot td{position:sticky;bottom:0;background:var(--card2);font-weight:800;border-top:2px solid var(--line2);z-index:1;padding:9px 10px}
table.grid tr.now th,table.grid tr.now td.cell{background:rgba(56,189,248,.07)}
table.grid tr.now th{color:var(--info)}
.addcol-th{cursor:pointer;color:var(--acc)!important}
table.grid th.subcol,table.grid td.subcol{background:var(--bg2)}
table.grid td.subcell{background:rgba(56,189,248,.04);font-size:12.5px;color:var(--mut)}
table.grid td.subcell:hover{background:rgba(34,197,94,.10);color:var(--txt)}
table.grid td.cell.over{color:var(--out)!important;font-weight:800;background:rgba(248,113,113,.10)}
table.grid td.cell.warn{color:var(--warn)!important;font-weight:700}
table.grid thead th.subcol{font-weight:600;font-size:10.5px}
.exptog{color:var(--info);font-size:13px;width:15px;display:inline-grid;place-items:center;border-radius:4px;font-weight:700}
table.grid th.thtog{cursor:pointer;user-select:none}
table.grid th.thtog:hover{background:rgba(56,189,248,.12)}
table.grid th.thtog:hover .exptog{color:var(--info)}
table.grid thead th[data-cat]{cursor:grab}
table.grid thead th.th-drop{outline:2px dashed var(--acc);outline-offset:-2px;background:rgba(34,197,94,.16)!important}
table.grid thead th.th-before{box-shadow:inset 4px 0 0 var(--acc)}
.thedit{background:none;border:0;color:var(--mut);cursor:pointer;padding:1px;border-radius:4px;opacity:.35;display:inline-flex;margin-left:2px}
.thedit svg{width:13px;height:13px}
table.grid thead th:hover .thedit{opacity:.7}
.thedit:hover{opacity:1!important;color:var(--acc)}
.pinp{background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;width:100%;font-size:13.5px}
.pinp:hover{border-color:var(--line)}
.pinp:focus{border-color:var(--acc);background:var(--card2)}
.pinp.pnum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;max-width:160px}
.poupval{cursor:pointer;font-weight:700;font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line);padding-bottom:1px}
.poupval:hover{border-color:var(--acc);color:var(--acc)}
.defs-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;max-width:1120px;align-items:start}
.defs-grid .span2{grid-column:1/-1}
.defs-grid>.card{min-width:0}
.defgroup{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--bg2);overflow:hidden}
.defgroup>summary{cursor:pointer;list-style:none;padding:14px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.defgroup>summary::-webkit-details-marker{display:none}
.defgroup>summary::before{content:'▸';color:var(--mut);font-size:12px}
.defgroup[open]>summary::before{content:'▾'}
.defgroup[open]>summary{border-bottom:1px solid var(--line)}
.defgroup .defs-grid{padding:14px}
.cols-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.twocol{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px}
.cols-2>*,.twocol>*{min-width:0}
@media(max-width:720px){.cols-2,.twocol{grid-template-columns:1fr;gap:12px}}
.dh{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin:0 0 12px}
.dh svg{width:17px;height:17px;color:var(--acc);flex:none}
.dsub{color:var(--mut);font-size:12px;margin:-7px 0 12px;line-height:1.35}
@media(max-width:780px){.defs-grid{grid-template-columns:minmax(0,1fr)}}
/* tamanho seguro p/ todos os ícones SVG (evita ícones gigantes em h2/cartões) */
svg{width:16px;height:16px;flex:none}
h2 svg{width:18px;height:18px;vertical-align:middle}
.modal h2 svg{width:19px;height:19px}
/* Resumo anual */
.sumtable{width:100%;border-collapse:collapse;margin-top:0}
.sumtable th,.sumtable td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
.sumtable th:first-child,.sumtable td:first-child{text-align:left}
.sumtable thead th{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.sumtable tfoot td{font-weight:800;border-top:2px solid var(--line2)}
.sumtable tr.now td{background:rgba(56,189,248,.07)}
.section-h{font-size:13px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:18px 4px 8px}
/* Popover */
.pop{position:fixed;z-index:80;background:var(--card);border:1px solid var(--line2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.45);width:290px;display:none}
.pop.on{display:block;animation:pp .12s}
@keyframes pp{from{opacity:0;transform:translateY(-4px)}}
.pop .ph{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.pop .ph .dot{width:9px;height:9px;border-radius:50%}
.pop .pb{padding:12px 14px}
.pop .padd{display:flex;gap:7px;margin-bottom:10px}
.pop .padd input{width:100%;font-size:15px;font-weight:700}
.pop .padd button{flex:none;padding:8px 12px}
.plist{max-height:180px;overflow:auto;display:grid;gap:5px}
.pe{display:flex;align-items:center;gap:8px;font-size:12.5px;background:var(--card2);border-radius:7px;padding:6px 9px}
.pe .x{margin-left:auto;cursor:pointer;color:var(--mut);background:none;border:0;font-size:13px;line-height:1;padding:2px 4px;border-radius:5px}
.pe .x:hover{color:var(--out);background:var(--card)}
.pop .popt{display:flex;gap:6px;margin-bottom:9px}
.pop .popt select{flex:1;padding:6px 8px;font-size:12px}
.pempty{color:var(--mut);font-size:12px;text-align:center;padding:8px}
/* Modal */
.back{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow:auto;padding:50px 16px}
.back.on{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:15px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h2{font-size:17px;padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.modal .body{padding:18px 20px;display:grid;gap:13px}
.modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.f2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}
.f2>div{min-width:0}
.close{margin-left:auto;background:none;border:0;color:var(--mut);cursor:pointer;font-size:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--acc);padding:11px 18px;border-radius:10px;box-shadow:var(--sh);z-index:300;font-weight:600;font-size:13px;display:none}
.toast.on{display:block;animation:pp .2s}
.hint{font-size:12.5px;color:var(--mut);background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--info);border-radius:8px;padding:10px 12px}
.splitseg{display:flex;gap:6px;flex-wrap:wrap}
.splitseg button{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12px;font-weight:600;cursor:pointer}
.splitseg button.on{border-color:var(--acc);background:rgba(34,197,94,.12);color:var(--acc)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:0 12px;height:34px;font-size:12.5px;font-weight:600;box-sizing:border-box}
.chip.warn{border-color:var(--out);color:var(--out)}
.chip.warn svg{width:14px;height:14px}
#valeteHead{display:inline-flex;align-items:center;gap:6px}
.topbar #refreshBtn,.topbar #bell{height:34px;width:34px;padding:0;align-items:center;justify-content:center}
.topbar .yearnav{height:34px}
.catedit{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.catedit .dot{width:13px;height:13px;border-radius:4px;flex:none}
.catedit input{flex:1}
.catcount{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:1px 8px;font-size:11.5px;font-weight:700;cursor:pointer}
.catcount:hover{border-color:var(--acc);color:var(--acc)}
.iconbtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:5px;border-radius:6px}
.iconbtn:hover{color:var(--acc);background:var(--card2)}
.iconbtn svg{width:16px;height:16px;display:block}
.foot-credit{text-align:center;color:var(--mut);font-size:11.5px;padding:20px}
@media(max-width:720px){
  .main{padding:12px 10px 80px}
  .topbar{gap:8px;padding:10px 12px}
  .tabs{width:100%;order:3;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:0 0 auto;padding:8px 14px;font-size:13.5px;white-space:nowrap}
  .qadd{gap:6px}.qadd .v{width:90px}
  .qadd .fld{flex:1 1 calc(50% - 6px)}
  .kbox{min-width:calc(50% - 5px);padding:9px 12px}.kbox .v{font-size:18px}
  .brand small{display:none}
  .f2{grid-template-columns:1fr}
}
</style>
</head>
<body data-theme="dark">
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo">€</div></div>
    <div class="tabs" id="tabs"></div>
    <div class="spacer"></div>
    <div id="valeteHead"></div>
    <button id="refreshBtn" title="Atualizar — limpar cache e recarregar"></button>
    <button id="bell" title="Alertas & poupança"></button>
    <div id="topright"></div>
  </div>
  <div class="main" id="main"></div>
  <div class="pop" id="alertPanel" style="width:340px"></div>
</div>
<div class="pop" id="pop"></div>
<div class="back" id="back"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* rede de segurança: se algo rebentar no arranque, mostra o erro (em vez de ecrã branco) + botão p/ limpar cache */
window.addEventListener('error',function(ev){
  try{
    var m=document.getElementById('main');
    if(m && m.innerHTML.length>50) return; // app já desenhou, não mexer
    document.body.innerHTML='<div style="padding:24px;font-family:system-ui,sans-serif;color:#e8edf4;background:#0f141b;min-height:100vh">'
      +'<div style="font-size:34px;margin-bottom:8px">€</div>'
      +'<h3 style="margin:0 0 8px">Não consegui abrir</h3>'
      +'<p style="color:#8d9bad;margin:0 0 12px">Provavelmente ficou uma versão antiga em cache. Toca no botão:</p>'
      +'<button id="_fix" style="padding:13px 16px;background:#22c55e;border:0;color:#fff;border-radius:10px;font-weight:700;font-size:15px">Limpar cache e recarregar</button>'
      +'<pre style="white-space:pre-wrap;color:#6b7787;font-size:11px;margin-top:18px">'+((ev&&(ev.message||ev.error))||'')+'</pre></div>';
    var b=document.getElementById('_fix');
    if(b) b.onclick=async function(){ try{if(navigator.serviceWorker){var rs=await navigator.serviceWorker.getRegistrations();for(var i=0;i<rs.length;i++)await rs[i].unregister();}}catch(e){} try{if(window.caches){var ks=await caches.keys();for(var j=0;j<ks.length;j++)await caches.delete(ks[j]);}}catch(e){} location.reload(); };
  }catch(e){}
});
const I={
  plus:'<path d="M12 5v14M5 12h14"/>',
  edit:'<path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/>',
  trash:'<path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 00-1.7-1l-.3-2.4h-4l-.3 2.4a7 7 0 00-1.7 1l-2.3-1-2 3.4 2 1.6a7 7 0 000 2l-2 1.6 2 3.4 2.3-1a7 7 0 001.7 1l.3 2.4h4l.3-2.4a7 7 0 001.7-1l2.3 1 2-3.4-2-1.6a7 7 0 00.1-1z"/>',
  scale:'<path d="M12 3v18M5 7h14M5 7l-3 7h6zM19 7l-3 7h6z"/>',
  repeat:'<path d="M17 2l4 4-4 4M3 11V9a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  download:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  upload:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>',
  move:'<path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>',
  report:'<path d="M3 3v18h18M8 16V9M13 16V5M18 16v-4"/>',

  const fixas=[['Casa (prestação)',474.38],['Seguros',39.72],['Gás',42.68],['Luz',44.59],['Água',28.41],['Telecom',39.99]];

  state.settings.splitDefault=state.settings.splitDefault||{DV:100,DA:0};
  if(!state._split100){state.settings.splitDefault={DV:100,DA:0};state._split100=true;}

  state.settings.parceira = state.settings.parceira || 'Catarina';
  // dia do mês de cada despesa fixa (para a previsão de tesouraria do Valete)
  if(!state._recdiaV1){
    const diaDef=nome=>{const n=(nome||'').toLowerCase();if(/cr[ée]dito|presta/.test(n))return 8;if(/seguro|nb|prevoir|mudum/.test(n))return 8;if(/luz|edp/.test(n))return 12;if(/g[áa]s/.test(n))return 12;if(/[áa]gua/.test(n))return 16;if(/telecom|nos/.test(n))return 22;return 8;};
    state.recorrencias.forEach(r=>{if(r.dia==null)r.dia=diaDef(cat(r.categoriaId)?cat(r.categoriaId).nome:r.nome);});
    state._recdiaV1=true;
  }
  state.settings.valeteMargem = state.settings.valeteMargem ?? 0; // margem de segurança do Valete
  state.settings.diaSalario = state.settings.diaSalario ?? 23; // dia em que a receita líquida costuma entrar

  // Descontos de receita (SS/IRS) — valores negativos; criar IRS se não existir
  if(!state._descV1){

    if(!state.categorias.some(c=>c.tipo==='receita'&&/^\s*irs\s*$/i.test(c.nome||''))){

    }
    state._descV1=true;
  }
  // Coverflex: receita (carregamentos) soma e despesa (consumo) abate no saldo Coverflex das Poupanças
  if(!state._coverflexV1){
    state.categorias.filter(c=>(c.nome||'').trim().toLowerCase()==='coverflex').forEach(c=>c.coverflex=true);
    if(!state.categorias.some(c=>c.tipo==='despesa'&&(c.nome||'').trim().toLowerCase()==='coverflex')){
      const ord=state.categorias.filter(c=>c.tipo==='despesa').length;
      state.categorias.push({id:nid('c'),nome:'Coverflex',tipo:'despesa',parent:null,fixa:false,coverflex:true,cor:'#10b981',ordem:ord});
    }
    state._coverflexV1=true;
  }
  state.recorrencias=state.recorrencias||[]; state.movimentos=state.movimentos||[]; state.poupancas=state.poupancas||{}; state.orcamentos=state.orcamentos||{};
  if(!state.acerto||!state.acerto.length) state.acerto=clone(EMBED_ACERTO);
  state.forecast=state.forecast||{}; const _anos=[...new Set(state.movimentos.filter(m=>m.tipo==='receita').map(m=>+m.data.slice(0,4)))].sort();
  if(!state.forecast.baseAno) state.forecast.baseAno = _anos.length? String(_anos[_anos.length-2]||_anos[_anos.length-1]) : String(new Date().getFullYear());
  state.forecast.gRec=state.forecast.gRec??2; state.forecast.gDesp=state.forecast.gDesp??2; state.forecast.juro=state.forecast.juro??1; state.forecast.horizonte=state.forecast.horizonte||10;
  state.forecast.reforcoMensal=state.forecast.reforcoMensal??150; state.forecast.meta=state.forecast.meta||{valor:0,ano:''};
  state.movimentos.forEach(m=>{if(!m.split)m.split={DV:50,DA:50};if(!m.pagador)m.pagador='shared';});
  const ds=state.movimentos.map(m=>m.data).sort(); if(ds.length) ano=+ds[ds.length-1].slice(0,4); else ano=new Date().getFullYear();
  state._updated=state._updated||0;
  persist();
}

function cellSum(catId,mi){let s=directSum(catId,mi);childrenOf(catId).forEach(c=>{s+=directSum(c.id,mi);});return s;}
function isoToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function curMi(){const d=new Date();return d.getFullYear()===ano?d.getMonth():-1;}
function dateFor(mi){const d=new Date();if(d.getFullYear()===ano&&d.getMonth()===mi)return isoToday();return ano+'-'+String(mi+1).padStart(2,'0')+'-15';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function sumMonth(tipo,mi){return state.movimentos.filter(m=>m.tipo===tipo&&+m.data.slice(0,4)===ano&&+m.data.slice(5,7)-1===mi).reduce((a,m)=>a+m.valor,0);}

function sumYearOf(tipo,y){return state.movimentos.filter(m=>m.tipo===tipo&&m.data.slice(0,4)===String(y)).reduce((a,m)=>a+m.valor,0);}
function patrimonioDe(y){const p=state.poupancas[y];if(!p)return 0;const cofre=(p.contagem||[]).reduce((a,r)=>a+(+r.d)*(parseFloat(r.q)||0),0);return (p.contas||[]).reduce((a,c)=>a+(parseFloat(c.valor)||0),0)+cofre;}
function ultimoAnoPoup(){const ks=Object.keys(state.poupancas||{}).sort();return ks.length?ks[ks.length-1]:String(new Date().getFullYear());}
function valeteAtual(){const p=state.poupancas[ultimoAnoPoup()];if(!p)return null;const v=(p.contas||[]).find(c=>(c.nome||'').trim().toLowerCase()==='valete');return v?(parseFloat(v.valor)||0):null;}
function valeteConta(){const p=state.poupancas[ultimoAnoPoup()];if(!p)return null;return (p.contas||[]).find(c=>(c.nome||'').trim().toLowerCase()==='valete');}
function coverflexConta(){const p=state.poupancas[ultimoAnoPoup()];if(!p)return null;return (p.contas||[]).find(c=>(c.nome||'').trim().toLowerCase()==='coverflex');}
function isCoverflexCat(catId){let c=cat(catId);if(!c)return false;if(c.coverflex)return true;const p=c.parent?cat(c.parent):null;return !!(p&&p.coverflex);}
function isDescontoCat(catId){let c=cat(catId);if(!c)return false;if(c.desconto)return true;const p=c.parent?cat(c.parent):null;return !!(p&&p.desconto);}
/* valor com sinal: descontos de receita (SS/IRS) entram como negativos; o resto positivo */
function valorComSinal(catId,tipo,v){return (tipo==='receita'&&isDescontoCat(catId))?-Math.abs(v):Math.abs(v);}
/* conta de poupança afetada por um lançamento: Coverflex (cat ligada) ou Valete (saldo real) */
function contaDeMov(mv){return isCoverflexCat(mv.categoriaId)?coverflexConta():valeteConta();}
/* lançamentos novos na app abatem/somam na conta certa; guardam vAdj+conta p/ reverter ao apagar.
   Pagamentos em dinheiro (mv.cash) NÃO mexem no Valete — saem do Cofre (contado à mão; ver "Esperado" nas Poupanças). */
function aplicaValete(mv){if(mv.cash)return;const c=contaDeMov(mv);if(!c)return;const delta=mv.tipo==='receita'?mv.valor:(mv.tipo==='despesa'?-mv.valor:0);if(!delta)return;c.valor=round2((parseFloat(c.valor)||0)+delta);mv.vAdj=delta;mv.vAdjConta=(c.nome||'').trim().toLowerCase();}
/* dinheiro gasto (cash) desde a última contagem do Cofre — para mostrar o "Esperado" */
function saidasDinheiro(){const base=(state.poupancas[ultimoAnoPoup()]||{}).contagemData||0;return round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.cash&&m.ts&&m.ts>base).reduce((a,m)=>a+m.valor,0));}
function reverteValete(mv){if(!mv||!mv.vAdj)return;const p=state.poupancas[ultimoAnoPoup()];if(!p)return;const c=(p.contas||[]).find(x=>(x.nome||'').trim().toLowerCase()===(mv.vAdjConta||'valete'));if(c)c.valor=round2((parseFloat(c.valor)||0)-mv.vAdj);}
/* HISTÓRICO CONGELADO: só se pode lançar/editar do mês atual para a frente */
function nowYm(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function ymOf(year,mi){return year+'-'+String(mi+1).padStart(2,'0');}
function isFrozenYm(ym){return ym<nowYm();}
function isFrozenMi(year,mi){return ymOf(year,mi)<nowYm();}
/* ---- alertas & poupança (heurística sobre o histórico) ---- */
function mediana(arr){const s=arr.slice().sort((a,b)=>a-b);const n=s.length;return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0;}
function mesesDespesa(){return [...new Set(state.movimentos.filter(m=>m.tipo==='despesa').map(m=>m.data.slice(0,7)))].sort();}
function catMesTotal(catId,ym){const ids=[catId,...childrenOf(catId).map(c=>c.id)];return state.movimentos.filter(m=>m.tipo==='despesa'&&ids.includes(m.categoriaId)&&m.data.slice(0,7)===ym).reduce((a,m)=>a+m.valor,0);}
function computeAlertas(){
  const ms=mesesDespesa(); if(!ms.length)return {ref:null,acima:[],orc:[],out:[],superf:{mes:0,ano:0,cats:[]},total:0,n:0};
  const ref=ms[ms.length-1]; const prev=ms.filter(x=>x<ref).slice(-12); const yr=ref.slice(0,4);
  const acima=[],orc=[];
  topCats('despesa').forEach(c=>{
    const cur=round2(catMesTotal(c.id,ref));
    if(cur>0){ const hist=prev.map(m=>catMesTotal(c.id,m)).filter(v=>v>0); if(hist.length>=3){ const med=mediana(hist); if(med>0 && cur>med*1.4 && (cur-med)>=20){ acima.push({nome:c.nome,cor:c.cor,cur,med:round2(med),exc:round2(cur-med),pct:Math.round((cur-med)/med*100)}); } } }
    const lim=+state.orcamentos[c.id]||0; if(lim>0 && cur>lim){ orc.push({nome:c.nome,cor:c.cor,cur,lim,exc:round2(cur-lim),pct:Math.round((cur-lim)/lim*100)}); }
  });
  acima.sort((a,b)=>b.exc-a.exc); orc.sort((a,b)=>b.exc-a.exc);
  // outliers: movimentos individuais grandes no mês ref (vs mediana histórica da categoria)
  const out=[];
  state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,7)===ref).forEach(m=>{
    const hist=state.movimentos.filter(x=>x.tipo==='despesa'&&x.categoriaId===m.categoriaId&&x.data.slice(0,7)<ref).map(x=>x.valor);
    if(hist.length<4)return; const med=mediana(hist);
    if(med>0 && m.valor>=Math.max(med*3,100)){ out.push({nome:catName(m.categoriaId),valor:round2(m.valor),med:round2(med),data:m.data}); }
  });
  out.sort((a,b)=>b.valor-a.valor);
  // supérfluos (categorias marcadas + filhos)
  const superIds=[]; state.categorias.filter(c=>c.superfluo).forEach(c=>{superIds.push(c.id);childrenOf(c.id).forEach(k=>superIds.push(k.id));});
  const mesSup=round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,7)===ref&&superIds.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));
  const anoSup=round2(state.movimentos.filter(m=>m.tipo==='despesa'&&m.data.slice(0,4)===yr&&superIds.includes(m.categoriaId)).reduce((a,m)=>a+m.valor,0));
  const superfCats=state.categorias.filter(c=>c.superfluo&&!c.parent).map(c=>c.nome);
  return {ref,acima,orc,out:out.slice(0,5),superf:{mes:mesSup,ano:anoSup,cats:superfCats},total:round2(acima.reduce((a,x)=>a+x.exc,0)),n:acima.length+orc.length+out.length};
}

/* média ponderada (recente pesa mais) de uma série cronológica, removendo o outlier alto e baixo */
function _estPond(arr){
  arr=(arr||[]).filter(t=>t>0); if(!arr.length)return 0;
  let a=arr.slice();
  if(a.length>=5){ const s=a.slice().sort((x,y)=>x-y); const lo=s[0],hi=s[s.length-1]; let rl=false,rh=false; a=a.filter(v=>{if(!rl&&v===lo){rl=true;return false;}if(!rh&&v===hi){rh=true;return false;}return true;}); }
  let w=0,vs=0; a.forEach((v,i)=>{w+=i+1;vs+=v*(i+1);}); return round2(vs/w);
}
function mesesTipo(tipo){return [...new Set(state.movimentos.filter(m=>m.tipo===tipo).map(m=>m.data.slice(0,7)))].sort();}
/* estimativa do total de despesa do mês */
function estimativaMensal(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('despesa').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* estimativa da receita LÍQUIDA do mês (já com descontos SS/IRS, que são negativos) */
function estimativaReceitaLiq(ymCur){
  ymCur=ymCur||nowYm();
  const meses=mesesTipo('receita').filter(m=>m<ymCur).slice(-12);
  return _estPond(meses.map(m=>state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===m).reduce((a,x)=>a+x.valor,0)));
}
/* valor típico de uma fixa = mediana do que essa categoria gastou nos últimos meses (cai bem quando o valor varia) */
function medValorFixa(r){
  const hist=mesesDespesa().slice(-12).map(m=>catMesTotal(r.categoriaId,m)).filter(v=>v>0);
  return hist.length>=2?round2(mediana(hist)):round2(+r.valor||0);
}
/* Previsão de tesouraria do Valete (mês corrente): combina fixas com dia (âncoras) + gasto variável espalhado.
   Tudo estimado pelo histórico (mediana), porque dias e valores variam. */
function valeteForecast(){
  const v=valeteAtual();
  const d=new Date(); const Y=d.getFullYear(),M=d.getMonth(),today=d.getDate();
  const ymCur=Y+'-'+String(M+1).padStart(2,'0'); const dim=new Date(Y,M+1,0).getDate();
  const estMensal=estimativaMensal(ymCur);
  const gastoMes=round2(state.movimentos.filter(x=>x.tipo==='despesa'&&x.data.slice(0,7)===ymCur).reduce((a,x)=>a+x.valor,0));
  // fixas ainda não pagas este mês e com dia >= hoje (âncoras futuras), valor estimado pelo histórico
  const launched=new Set(state.movimentos.filter(m=>m.recId&&m.data.slice(0,7)===ymCur).map(m=>m.recId));
  const fixas=state.recorrencias.filter(r=>r.ativo!==false&&!launched.has(r.id))
    .map(r=>({nome:cat(r.categoriaId)?catName(r.categoriaId):(r.nome||'fixa'),valor:medValorFixa(r),dia:Math.min(dim,Math.max(1,+r.dia||8))}))
    .filter(f=>f.valor>0 && f.dia>=today).sort((a,b)=>a.dia-b.dia);
  const fixoFut=round2(fixas.reduce((a,f)=>a+f.valor,0));
  const varRest=Math.max(0,round2(estMensal-gastoMes-fixoFut));
  const diasRest=Math.max(1,dim-today+1); const varDia=varRest/diasRest;
  const need=round2(fixoFut+varRest); // total que ainda falta sair
  // RECEITA que ainda vai entrar este mês (líquida) e o dia em que entra
  const estReceita=estimativaReceitaLiq(ymCur);
  const recebidoMes=round2(state.movimentos.filter(x=>x.tipo==='receita'&&x.data.slice(0,7)===ymCur).reduce((a,x)=>a+x.valor,0));
  const restReceita=Math.max(0,round2(estReceita-recebidoMes));
  const diaSal=Math.min(28,Math.max(1,+state.settings.diaSalario||23));
  const diaChegada=restReceita>0?Math.max(today,diaSal):null; // se já passou, assume que entra hoje
  // curva de SALDO PROJETADO: Valete − despesas que saem + receita que entra, dia a dia
  const margem=Math.max(0,+state.settings.valeteMargem||0);
  const curva=[]; let accFix=0;
  for(let day=today;day<=dim;day++){
    accFix=round2(accFix+fixas.filter(f=>f.dia===day).reduce((a,f)=>a+f.valor,0));
    const out=round2(accFix+varDia*(day-today+1));
    const inflow=(diaChegada!=null&&day>=diaChegada)?restReceita:0;
    curva.push({day,saldo:(v==null?null:round2(v-out+inflow)),out,inflow});
  }
  let minSaldo=null,minDia=null,faltaDia=null,faltaValor=0;
  if(v!=null){ curva.forEach(c=>{ if(minSaldo==null||c.saldo<minSaldo){minSaldo=c.saldo;minDia=c.day;} if(faltaDia==null&&c.saldo<margem-0.001){faltaDia=c.day;faltaValor=round2(margem-c.saldo);} }); }
  return {v,margem,estMensal,gastoMes,fixas,fixoFut,varRest,need,estReceita,recebidoMes,restReceita,diaChegada,curva,minSaldo,minDia,faltaDia,faltaValor,today,dim,ok:(v==null?null:minSaldo>=margem-0.001)};
}
/* sparkline do saldo projetado do Valete ao longo do mês (com linhas da margem e do zero) */
function valeteSpark(F){
  if(!F.curva.length||F.v==null)return '';
  const w=300,h=64,pad=5;
  const vals=F.curva.map(c=>c.saldo).concat([F.v,F.margem,0]);
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const X=i=>pad+(F.curva.length<2?0:i/(F.curva.length-1))*(w-2*pad);
  const Yv=val=>h-pad-((val-min)/rng)*(h-2*pad);
  const pts=F.curva.map((c,i)=>`${X(i).toFixed(1)},${Yv(c.saldo).toFixed(1)}`).join(' ');
  const my=Yv(F.margem).toFixed(1);
  const fy=F.faltaDia!=null?X(F.curva.findIndex(c=>c.day===F.faltaDia)):null;
  const minIdx=F.curva.findIndex(c=>c.day===F.minDia);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;margin-top:6px">
    <line x1="${pad}" y1="${my}" x2="${w-pad}" y2="${my}" stroke="${F.margem>0?'var(--out)':'var(--mut)'}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="${pad}" y="${(+my-3)}" font-size="9" fill="${F.margem>0?'var(--out)':'var(--mut)'}">${F.margem>0?'margem':'0'}</text>
    <polyline points="${pts}" fill="none" stroke="${F.faltaDia!=null?'var(--out)':'var(--acc)'}" stroke-width="2"/>
    ${minIdx>=0?`<circle cx="${X(minIdx).toFixed(1)}" cy="${Yv(F.minSaldo).toFixed(1)}" r="3" fill="${F.faltaDia!=null?'var(--out)':'var(--acc)'}"/>`:''}
  </svg>`;
}

/* Constrói o livro de dívida: histórico do Excel + meses futuros calculados a partir das contas partilhadas. */
function acertoLedger(){
  const base=(state.acerto&&state.acerto.length?state.acerto:EMBED_ACERTO).map(r=>({ym:r.ym,deve:+r.deve||0,pago:+r.pago||0,fwd:false}));
  const lastYm=base.length?base[base.length-1].ym:'0000-00';
  // meses posteriores ao histórico: quota dela = metade das despesas das contas partilhadas lançadas na app
  const acIds=acertoCatIds(); const fwd={};
  state.movimentos.filter(x=>x.tipo==='despesa'&&acIds.has(x.categoriaId)&&x.data.slice(0,7)>lastYm)
    .forEach(x=>{const ym=x.data.slice(0,7);fwd[ym]=(fwd[ym]||0)+x.valor/2;});
  Object.keys(fwd).sort().forEach(ym=>base.push({ym,deve:round2(fwd[ym]),pago:0,fwd:true}));
  let run=0; base.forEach(r=>{r.saldo=round2(r.deve-r.pago);run=round2(run+r.saldo);r.acc=run;});
  return base;
}

/* ================= PREVISÃO / FORECAST ================= */
const CENARIOS={pessimista:{nome:'Pessimista',gRec:0,gDesp:4,juro:0},realista:{nome:'Realista',gRec:2,gDesp:2,juro:1},otimista:{nome:'Otimista',gRec:4,gDesp:1,juro:3}};
function projetar(baseRec,baseDesp,patr0,o){
  const proj=[]; let patr=patr0; const rAnual=(o.reforco||0)*12;
  for(let k=1;k<=o.horizonte;k++){
    const rec=baseRec*Math.pow(1+o.gRec/100,k), desp=baseDesp*Math.pow(1+o.gDesp/100,k);
    let poup=rec-desp; if(rAnual>0) poup=Math.max(poup,rAnual);
    patr=patr*(1+o.juro/100)+poup; proj.push({ano:+o.baseAno+k,rec,desp,poup,patr});
  }
  return proj;
}

  const proj=projetar(baseRec,baseDesp,patr0,opts);
  _lastProj=proj; _lastPatr0=patr0; _lastPatrAno=patrAno;
  const patrFim=proj.length?proj[proj.length-1].patr:patr0;
  const poupMedia=proj.length?proj.reduce((a,p)=>a+p.poup,0)/proj.length:0;
  // cenários (mesma base/património/horizonte/reforço; taxas de cada cenário)
  const cen=Object.keys(CENARIOS).map(k=>{const c=CENARIOS[k];const pj=projetar(baseRec,baseDesp,patr0,{gRec:c.gRec,gDesp:c.gDesp,juro:c.juro,horizonte:f.horizonte,baseAno:f.baseAno,reforco:f.reforcoMensal});const ativo=(f.gRec===c.gRec&&f.gDesp===c.gDesp&&f.juro===c.juro);return {k,nome:c.nome,fim:pj.length?pj[pj.length-1].patr:patr0,ativo};});

  if(meta.valor>0){ metaPct=Math.min(100,patr0/meta.valor*100); const hit=proj.find(p=>p.patr>=meta.valor);

    else if(hit) metaInfo=`Atinges <b>${fmt0(meta.valor)}</b> em <b>${hit.ano}</b>${meta.ano?(hit.ano<=+meta.ano?` <span class="pos">(dentro do prazo ${meta.ano} ✓)</span>`:` <span class="neg">(depois de ${meta.ano} ⚠)</span>`):''}`;
    else metaInfo=`<span class="neg">Não atinges ${fmt0(meta.valor)} em ${f.horizonte} anos</span> (faltam ${fmt0(meta.valor-patrFim)}). Aumenta a poupança ou o prazo.`; }
  // comparação anos reais (últimos 5)
  const comp=anos.slice(-5).map(y=>({y,r:sumYearOf('receita',y),d:sumYearOf('despesa',y)}));
  const pct=(cur,prev)=>{ if(!prev)return ''; const v=(cur-prev)/Math.abs(prev)*100; const up=v>=0; return `<span style="color:${up?'var(--in)':'var(--out)'};font-size:12px">${up?'▲':'▼'} ${Math.abs(v).toFixed(0)}%</span>`; };
  // gráfico de património (+ linha de meta)
  const pts=[{l:patrAno,v:patr0},...proj.map(p=>({l:String(p.ano),v:p.patr}))];
  const maxV=Math.max(1,meta.valor||0,...pts.map(p=>p.v)); const W=620,H=150,pad=4;
  const xs=i=>pad+i*((W-2*pad)/(pts.length-1)); const ys=v=>H-pad-(v/maxV)*(H-2*pad);
  const line=pts.map((p,i)=>`${xs(i).toFixed(0)},${ys(p.v).toFixed(0)}`).join(' ');
  const area=`${pad},${H-pad} ${line} ${(W-pad)},${H-pad}`;
  const metaY=meta.valor>0?ys(meta.valor):null;
  m.innerHTML=`
  <div class="kstrip">
    <div class="kbox"><div class="l">Património hoje (${patrAno})</div><div class="v pos">${fmt0(patr0)}</div></div>
    <div class="kbox"><div class="l">Daqui a ${f.horizonte} anos</div><div class="v pos">${fmt0(patrFim)}</div></div>
    <div class="kbox"><div class="l">Poupança média/ano</div><div class="v ${poupMedia>=0?'pos':'neg'}">${fmt0(poupMedia)}</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <h2 style="border:0;padding:0;margin:0 0 10px;font-size:15px">${svg(I.gear)} Pressupostos</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      ${cen.map(c=>`<button class="btn sm ${c.ativo?'primary':''}" data-cenario="${c.k}">${c.nome} <span style="opacity:.8">· ${fmt0(c.fim)}</span></button>`).join('')}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
      <div><label>Ano base</label><select id="fcBase">${anos.map(y=>`<option value="${y}" ${String(y)===String(f.baseAno)?'selected':''}>${y}</option>`).join('')}</select></div>
      <div><label>Cresc. receita %/ano</label><input id="fcGRec" type="number" step="0.5" value="${f.gRec}" style="width:88px"></div>
      <div><label>Inflação despesa %/ano</label><div style="display:flex;gap:6px;align-items:center"><input id="fcGDesp" type="number" step="0.5" value="${f.gDesp}" style="width:88px">${inflacaoHistorica()!=null?`<button class="btn sm" id="fcInflReal" title="Usar a mediana da variação anual real das tuas despesas (${inflacaoHistorica()}%)">real: ${inflacaoHistorica()}%</button>`:''}</div></div>
      <div><label>Rendim. poupança %/ano</label><input id="fcJuro" type="number" step="0.5" value="${f.juro}" style="width:88px"></div>
      <div><label>Reforço garantido €/mês</label><input id="fcReforco" type="number" step="10" value="${f.reforcoMensal}" style="width:100px"></div>
      <div><label>Horizonte</label><div class="seg"><button data-fch="5" class="${f.horizonte===5?'on-out':''}">5 anos</button><button data-fch="10" class="${f.horizonte===10?'on-out':''}">10 anos</button></div></div>
    </div>
    <div class="hint" style="margin-top:12px">Base: <b>${f.baseAno}</b> — receita ${fmt0(baseRec)}, despesa ${fmt0(baseDesp)}, poupança ${fmt0(baseRec-baseDesp)}/ano. ${f.reforcoMensal>0?`Garante-se pelo menos <b>${fmt0(f.reforcoMensal*12)}/ano</b> poupados (reforço).`:''} Os botões de cenário preenchem as taxas; podes ajustar à mão.</div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <h2 style="border:0;padding:0;margin:0 0 10px;font-size:15px">${svg(I.report)} Meta de património</h2>
    <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
      <div><label>Objetivo (€)</label><input id="fcMetaV" type="number" step="1000" placeholder="ex: 100000" value="${meta.valor||''}" style="width:130px"></div>
      <div><label>Até ao ano</label><input id="fcMetaA" type="number" step="1" placeholder="ex: 2032" value="${meta.ano||''}" style="width:100px"></div>
      <div style="flex:1;min-width:200px">${meta.valor>0?`<div style="height:10px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:${metaPct.toFixed(0)}%;background:var(--acc)"></div></div><div style="font-size:13px">${metaInfo}</div>`:'<div style="color:var(--mut);font-size:13px">Define um objetivo para veres quando o atinges.</div>'}</div>
    </div>
  </div>

  <div class="cols-2" style="margin-bottom:14px">
    <div class="card"><h2 style="border:0;padding:0;margin:0 0 10px;font-size:15px">${svg(I.report)} Comparação de anos</h2>
      <table class="sumtable"><thead><tr><th>Ano</th><th class="num">Receita</th><th class="num">Despesa</th><th class="num">Saldo</th></tr></thead>
      <tbody>${comp.map((c,i)=>{const pr=i>0?comp[i-1]:null;return `<tr><td>${c.y}</td><td class="num pos">${fmt0(c.r)} ${pr?pct(c.r,pr.r):''}</td><td class="num neg">${fmt0(c.d)} ${pr?pct(c.d,pr.d):''}</td><td class="num ${c.r-c.d>=0?'pos':'neg'}">${fmt0(c.r-c.d)}</td></tr>`;}).join('')}</tbody></table>
    </div>
    <div class="card"><h2 style="border:0;padding:0;margin:0 0 10px;font-size:15px">${svg(I.report)} Património projetado</h2>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:150px">
        <polygon points="${area}" fill="rgba(34,197,94,.15)"/>
        <polyline points="${line}" fill="none" stroke="var(--acc)" stroke-width="2"/>
        ${metaY!=null?`<line x1="${pad}" y1="${metaY.toFixed(0)}" x2="${W-pad}" y2="${metaY.toFixed(0)}" stroke="var(--warn)" stroke-width="1" stroke-dasharray="4 3"/>`:''}
        ${pts.map((p,i)=>`<circle cx="${xs(i).toFixed(0)}" cy="${ys(p.v).toFixed(0)}" r="2.5" fill="var(--acc)"/>`).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;color:var(--mut);font-size:11px"><span>${pts[0].l}</span><span>${pts[pts.length-1].l}</span></div>
    </div>
  </div>

  <div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><h2 style="border:0;padding:0;margin:0;font-size:15px">${svg(I.report)} Projeção a ${f.horizonte} anos</h2><button class="btn sm" id="fcExport">${svg(I.download)}Exportar CSV</button></div>
    <div class="gridwrap"><table class="sumtable">
      <thead><tr><th>Ano</th><th class="num">Receita</th><th class="num">Despesa</th><th class="num">Poupança no ano</th><th class="num">Património (fim)</th></tr></thead>
      <tbody><tr style="opacity:.7"><td>${patrAno} (hoje)</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">${fmt0(patr0)}</td></tr>
      ${proj.map(p=>`<tr${meta.valor>0&&p.patr>=meta.valor?' class="now"':''}><td>${p.ano}</td><td class="num pos">${fmt0(p.rec)}</td><td class="num neg">${fmt0(p.desp)}</td><td class="num ${p.poup>=0?'pos':'neg'}">${fmt0(p.poup)}</td><td class="num"><b>${fmt0(p.patr)}</b></td></tr>`).join('')}</tbody>
    </table></div>
    <div class="hint" style="margin-top:10px">Estimativa simples para planeamento — não é aconselhamento financeiro.</div>
  </div>`;
}
function expForecast(){ if(!_lastProj)return; const rows=[['Ano','Receita','Despesa','Poupança','Património']]; rows.push([_lastPatrAno+' (hoje)','','','',String(_lastPatr0.toFixed(2)).replace('.',',')]); _lastProj.forEach(p=>rows.push([p.ano,...[p.rec,p.desp,p.poup,p.patr].map(v=>String((Math.round(v*100)/100).toFixed(2)).replace('.',','))])); const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n'); dl(new Blob([csv],{type:'text/csv'}),'CASA-previsao.csv'); }

function catRow(c,child,lead,badge){return `<div class="catedit" style="${child?'padding-left:24px':''}">${child?'<span style="opacity:.4;margin-right:-2px">└</span>':(lead||'<span style="width:18px;display:inline-block;flex:none"></span>')}<span class="dot" style="background:${c.cor}"></span><input class="pinp" value="${esc(c.nome)}" data-catname="${c.id}">${badge||''}${!child?`<button class="iconbtn" data-newsub="${c.id}" title="Adicionar sub-categoria">${svg(I.plus)}</button>`:''}<button class="iconbtn" data-movecat="${c.id}" title="Mover / re-aninhar">${svg(I.move)}</button><button class="iconbtn" data-delcat="${c.id}">${svg(I.trash)}</button></div>`;}
function catTree(tipo){return topCats(tipo).map(c=>{
  const kids=childrenOf(c.id); const open=defCatOpen.has(c.id);
  const lead = kids.length? `<button class="iconbtn" data-defcatopen="${c.id}" style="padding:2px;flex:none" title="${open?'Fechar':'Abrir'} (${kids.length})">${open?'▾':'▸'}</button>` : '<span style="width:18px;display:inline-block;flex:none"></span>';
  const badge = kids.length? `<span class="catcount" data-defcatopen="${c.id}" title="${open?'Fechar':'Abrir'} sub-categorias">${kids.length}</span>` : '';
  let h=catRow(c,false,lead,badge);
  if(open) h+=kids.map(k=>catRow(k,true)).join('');
  return h;
}).join('');}

let dragCat=null;
function nestCat(fromId,toId){
  const from=cat(fromId),to=cat(toId); if(!from||!to||fromId===toId)return;
  if(from.tipo!==to.tipo){ toast('Categorias de tipos diferentes'); return; }
  if(hasKids(fromId)){ toast('Tem sub-categorias — esvazia/move-as primeiro'); return; }
  const toTop = to.parent?to.parent:to.id;
  if(toTop===fromId){ return; }
  if(from.parent===toTop){ toast('Já está nesse grupo'); return; }
  from.parent=toTop; save(); render(); toast(`"${from.nome}" → dentro de "${cat(toTop).nome}"`);
}
function unnestCat(id){ const c=cat(id); if(!c||!c.parent)return; c.parent=null; save(); render(); toast(`"${c.nome}" passou a coluna principal`); }
function renameCat(id){ const c=cat(id); if(!c)return; const nv=prompt('Novo nome da categoria:',c.nome); if(nv&&nv.trim()){ c.nome=nv.trim(); save(); render(); toast('Categoria renomeada'); } }
function reorderBefore(fromId,beforeId){
  const from=cat(fromId),before=cat(beforeId); if(!from||!before||fromId===beforeId)return;
  if(from.tipo!==before.tipo){ toast('Categorias de tipos diferentes'); return; }
  const targetParent=before.parent||null;
  if(hasKids(fromId)&&targetParent){ toast('Um grupo não pode ir para dentro de outro'); return; }
  from.parent=targetParent;
  const sibs=catsOf(from.tipo).filter(c=>(c.parent||null)===targetParent && c.id!==fromId);
  let idx=sibs.findIndex(c=>c.id===beforeId); if(idx<0)idx=sibs.length;
  sibs.splice(idx,0,from);
  sibs.forEach((c,k)=>c.ordem=k);
  save(); render(); toast('Reordenado');
}
function clearDropFx(){ document.querySelectorAll('.th-drop,.th-before').forEach(x=>x.classList.remove('th-drop','th-before')); }
function dropMode(e,th){ const r=th.getBoundingClientRect(); return (e.clientX-r.left) < r.width*0.4 ? 'before' : 'nest'; }
document.addEventListener('dragstart',e=>{ const th=e.target.closest('th[data-cat]'); if(th){ dragCat=th.dataset.cat; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',dragCat);}catch(_){ } } });
document.addEventListener('dragover',e=>{ if(!dragCat)return; clearDropFx(); const top=e.target.closest('th[data-droptop]'); if(top){ e.preventDefault(); top.classList.add('th-drop'); return; } const t=e.target.closest('th[data-cat]'); if(t){ e.preventDefault(); e.dataTransfer.dropEffect='move'; t.classList.add(dropMode(e,t)==='before'?'th-before':'th-drop'); } });
document.addEventListener('drop',e=>{ if(!dragCat)return; const top=e.target.closest('th[data-droptop]'); const t=e.target.closest('th[data-cat]'); e.preventDefault(); clearDropFx(); if(top){ unnestCat(dragCat); } else if(t){ if(dropMode(e,t)==='before') reorderBefore(dragCat,t.dataset.cat); else nestCat(dragCat,t.dataset.cat); } dragCat=null; });
document.addEventListener('dragend',()=>{ dragCat=null; clearDropFx(); });
document.addEventListener('dblclick',e=>{ const th=e.target.closest('th[data-cat]'); if(th) renameCat(th.dataset.cat); });

function quickAdd(cash){
  const v=parseFloat(val('qVal')); if(isNaN(v)||v===0){document.getElementById('qVal').focus();return;}
  const catId=document.getElementById('qCat').value, mi=+document.getElementById('qMes').value;
  if(isFrozenMi(ano,mi)){toast('Mês congelado — só podes lançar do mês atual para a frente');return;}
  const c=cat(catId); let pagador=P()[0].id,split={...state.settings.splitDefault};
  const mv={id:nid('m'),data:dateFor(mi),tipo:gridTipo,categoriaId:catId,valor:valorComSinal(catId,gridTipo,v),pagador,split,nota:''};
  if(cash&&gridTipo==='despesa'){mv.cash=true;mv.ts=Date.now();}
  state.movimentos.push(mv); aplicaValete(mv);
  save();render();toast((cash?'Dinheiro: ':'Adicionado: ')+fmt(Math.abs(v))+' · '+c.nome);
  setTimeout(()=>{const q=document.getElementById('qVal');if(q)q.focus();},20);
}
function genFix(){
  const mi=curMi()<0?new Date().getMonth():curMi();
  if(isFrozenMi(ano,mi)){toast('Mês congelado — só do mês atual para a frente');return;}
  let n=0;
  state.recorrencias.filter(r=>r.ativo!==false).forEach(r=>{
    const exists=state.movimentos.some(m=>m.recId===r.id && +m.data.slice(0,4)===ano && +m.data.slice(5,7)-1===mi);
    if(exists)return;
    const mv={id:nid('m'),data:dateFor(mi),tipo:'despesa',categoriaId:r.categoriaId,valor:r.valor,pagador:r.pagador||P()[0].id,split:{...state.settings.splitDefault},nota:'fixa',recId:r.id};
    state.movimentos.push(mv); aplicaValete(mv);
    n++;
  });
  save();render();toast(n?n+' despesas fixas lançadas em '+MESES[mi]:'Já estavam lançadas');
}
function delCat(id){
  if(hasKids(id)){toast('Tem sub-categorias — elimina-as primeiro');return;}
  const n=state.movimentos.filter(m=>m.categoriaId===id).length;
  if(n){toast(`Tem ${n} lançamento(s) associado(s) — não pode ser eliminada. Move ou funde primeiro.`);return;}
  if(confirm('Eliminar esta categoria (sem valores)?')){state.categorias=state.categorias.filter(c=>c.id!==id);save();render();}

function openMoveCat(id){

      </select>

function mergeCat(){
  const fromId=val('mvCatId'); const toId=document.getElementById('mvMerge').value;
  if(!toId){toast('Escolhe a categoria destino');return;}
  if(toId===fromId||hasKids(fromId))return;
  const from=cat(fromId), to=cat(toId);
  if(!confirm(`Fundir "${from.nome}" em "${catName(toId)}"? Os lançamentos de "${from.nome}" passam para lá e a categoria é eliminada. Afeta todos os anos.`))return;
  state.movimentos.forEach(m=>{ if(m.categoriaId===fromId) m.categoriaId=toId; });
  state.recorrencias.forEach(r=>{ if(r.categoriaId===fromId) r.categoriaId=toId; });
  state.categorias=state.categorias.filter(x=>x.id!==fromId);
  save();closeBack();render();toast('Categorias fundidas');
}
function saveMoveCat(){
  const id=val('mvCatId'); const c=cat(id); if(!c)return;
  const newParent=document.getElementById('mvParent').value||null;
  if(newParent){
    if(newParent===id){toast('Não pode ser pai de si própria');return;}
    if(hasKids(id)){toast('Tem sub-categorias — não pode ser aninhada');return;}
    const p=cat(newParent); if(p && p.parent){toast('Só se pode aninhar 1 nível');return;}
  }
  c.parent=newParent;
  save();closeBack();render();toast('Categoria movida');
}

function openSettle(from,to,v){

function doSettle(){

/* ----- export/import ----- */
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),800);}
/* ===== Sincronização com a Dropbox (OAuth PKCE, código manual — sem servidor) ===== */
const DBX_FILE='/CASA-dados.json';
let _dbxTok=null,_dbxTokExp=0,_syncTimer=null,_syncing=false,_lastSync=null,_syncErr=null;
function dbxCfg(){try{return JSON.parse(localStorage.getItem('casa-dropbox')||'null');}catch(e){return null;}}
function dbxSet(c){localStorage.setItem('casa-dropbox',JSON.stringify(c));}
function dbxOn(){const c=dbxCfg();return !!(c&&c.refresh);}
function _b64url(buf){let s=btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));return s.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return _b64url(a.buffer);}
async function _pkce(){const verifier=_rand(48);if(crypto.subtle){try{const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier));return{verifier,challenge:_b64url(d),method:'S256'};}catch(e){}}return{verifier,challenge:verifier,method:'plain'};}
async function dbxStartAuth(){
  const key=(val('dbxKey')||'').trim(); if(!key){toast('Cola a App key da Dropbox');return;}
  const p=await _pkce(); dbxSet({key,verifier:p.verifier,pending:true});
  const url='https://www.dropbox.com/oauth2/authorize?client_id='+encodeURIComponent(key)+'&response_type=code&token_access_type=offline&code_challenge='+p.challenge+'&code_challenge_method='+p.method;
  window.open(url,'_blank'); render();
}
async function dbxFinishAuth(){
  const c=dbxCfg(); const code=(val('dbxCode')||'').trim();
  if(!c||!c.verifier){toast('Recomeça a ligação');return;} if(!code){toast('Cola o código');return;}
  try{
    const body=new URLSearchParams({code,grant_type:'authorization_code',client_id:c.key,code_verifier:c.verifier});
    const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    if(!r.ok)throw new Error('token '+r.status);
    const j=await r.json(); dbxSet({key:c.key,refresh:j.refresh_token});
    _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000;
    toast('Dropbox ligada ✓'); await syncOpen(); render();
  }catch(e){toast('Falha a ligar: '+e.message); _syncErr=e.message; render();}
}
function dbxDisconnect(){localStorage.removeItem('casa-dropbox');_dbxTok=null;_lastSync=null;_syncErr=null;toast('Dropbox desligada');render();}
async function dbxToken(){
  const c=dbxCfg(); if(!c||!c.refresh)return null;
  if(_dbxTok&&Date.now()<_dbxTokExp)return _dbxTok;
  const body=new URLSearchParams({grant_type:'refresh_token',refresh_token:c.refresh,client_id:c.key});
  const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok)throw new Error('refresh '+r.status); const j=await r.json();
  _dbxTok=j.access_token; _dbxTokExp=Date.now()+((j.expires_in||14400)-60)*1000; return _dbxTok;
}
async function dbxUpload(text){
  const tok=await dbxToken(); if(!tok)throw new Error('sem ligação');
  const r=await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path:DBX_FILE,mode:'overwrite',mute:true})},body:text});
  if(!r.ok)throw new Error('upload '+r.status);
}
async function dbxDownload(){
  const tok=await dbxToken(); if(!tok)throw new Error('sem ligação');
  const r=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',headers:{'Authorization':'Bearer '+tok,'Dropbox-API-Arg':JSON.stringify({path:DBX_FILE})}});
  if(r.status===409)return null; if(!r.ok)throw new Error('download '+r.status); return r.text();
}
function syncSchedule(){ if(!dbxOn())return; clearTimeout(_syncTimer); _syncTimer=setTimeout(()=>syncPush(),2500); }
function _syncUI(){ if(tab==='defs')render(); }
async function syncPush(){
  if(!dbxOn()||!_dirty||_syncing)return; _syncing=true;_syncErr=null;_syncUI();
  try{ await dbxUpload(JSON.stringify(state)); _dirty=false; _lastSync=Date.now(); }
  catch(e){ _syncErr=e.message; } finally{ _syncing=false;_syncUI(); }
}
async function syncPullNow(){
  if(!dbxOn())return; _syncing=true;_syncErr=null;_syncUI();
  try{ const txt=await dbxDownload(); if(txt){ const remote=JSON.parse(txt); state=remote; persist(); load(); _lastSync=Date.now(); toast('Recebido da Dropbox'); } else { toast('Ainda não há cópia na Dropbox'); } }
  catch(e){ _syncErr=e.message; toast('Falha: '+e.message); } finally{ _syncing=false; render(); }
}
async function syncOpen(){ /* ao abrir: adota o remoto se for mais recente; senão envia o local */
  if(!dbxOn())return; _syncing=true;_syncUI();
  try{
    const txt=await dbxDownload();
    if(txt){ const remote=JSON.parse(txt);
      if((remote._updated||0)>(state._updated||0)){ state=remote; persist(); load(); _lastSync=Date.now(); _syncErr=null; _syncing=false; render(); toast('Sincronizado da Dropbox'); return; }
    }
    _dirty=true; _syncing=false; await syncPush(); // remoto inexistente/antigo → envia o local
  }catch(e){ _syncErr=e.message; } finally{ _syncing=false; _syncUI(); }
}

function expJSON(){dl(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),'CASA-'+isoToday()+'.json');}
function expCSV(){
  const rows=[['Data','Tipo','Categoria','Valor','Pagou','Split DV','Split DA','Nota']];
  state.movimentos.slice().sort((a,b)=>a.data.localeCompare(b.data)).forEach(m=>rows.push([m.data,m.tipo,(cat(m.categoriaId)||{}).nome||'',String(m.valor).replace('.',','),m.pagador==='shared'?'Conjunto':pname(m.pagador),m.split.DV,m.split.DA,m.nota||'']));
  const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'CASA-movimentos.csv');
}
function impJSON(file){const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.categorias||!d.movimentos)throw 0;localStorage.setItem(KEY,JSON.stringify(d));load();tab='grelha';render();toast('Dados importados');}catch(e){toast('Ficheiro inválido');}};r.readAsText(file);}

/* ----- boot ----- */
/* atualizar: desliga o service worker, limpa caches e recarrega da rede (resolve "ficou na versão antiga") */
async function hardRefresh(){
  const b=document.getElementById('refreshBtn'); if(b)b.classList.add('spin');
  try{ if('serviceWorker' in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()));} }catch(e){}
  try{ if(window.caches){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)));} }catch(e){}
  toast('A atualizar…'); setTimeout(()=>location.reload(),300);
}

/* ===== Biometria (WebAuthn / passkey local) — por dispositivo, não sincroniza ===== */
function bioCfg(){try{return JSON.parse(localStorage.getItem('casa-bio')||'null');}catch(e){return null;}}
function bioSupported(){return !!(window.PublicKeyCredential && navigator.credentials && location.protocol==='https:');}
function _b64urlBuf(s){s=String(s).replace(/-/g,'+').replace(/_/g,'/');const pad=s.length%4?'='.repeat(4-s.length%4):'';const b=atob(s+pad);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a.buffer;}
async function bioRegister(){
  if(!bioSupported()){toast('Biometria indisponível (precisa de https e suporte do dispositivo)');return;}
  try{
    const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:'CASA', id:location.hostname},
      user:{id:crypto.getRandomValues(new Uint8Array(16)),name:'casa',displayName:'CASA'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'required',requireResidentKey:true},
      timeout:60000, attestation:'none'
    }});
    localStorage.setItem('casa-bio',JSON.stringify({enabled:true,id:_b64url(cred.rawId)}));
    toast('Biometria ativada neste dispositivo'); render();
  }catch(e){ toast('Não ativou: '+(e.name||e.message)); }
}
function bioRemove(){ localStorage.removeItem('casa-bio'); toast('Biometria removida'); render(); }
async function bioUnlock(silent){
  const c=bioCfg(); if(!c)return false;
  try{
    const pk={ challenge:crypto.getRandomValues(new Uint8Array(32)), rpId:location.hostname, userVerification:'required', timeout:60000 };
    if(c.id) pk.allowCredentials=[{type:'public-key',id:_b64urlBuf(c.id)}]; // ajuda o telemóvel a encontrar a passkey
    await navigator.credentials.get({publicKey:pk});
    sessionStorage.setItem('casa-unlock','1'); const e=document.getElementById('lock'); if(e)e.remove(); return true;
  }catch(e){ if(!silent){ const m=document.getElementById('lockMsg'); if(m)m.textContent='Biometria: '+(e.name||'cancelada')+' — usa o código'; } return false; }
}

/* ===== Bloqueio de acesso (código simples) ===== */
function isUnlocked(){ return !state.settings.codigo || sessionStorage.getItem('casa-unlock')==='1'; }
function showLock(){
  const ex=document.getElementById('lock');
  if(isUnlocked()){ if(ex)ex.remove(); return; }
  if(ex)return;
  const d=document.createElement('div'); d.id='lock';
  d.style.cssText='position:fixed;inset:0;z-index:9999;background:var(--bg,#0f141b);display:flex;align-items:center;justify-content:center;padding:20px';
  const hasBio=!!bioCfg();
  d.innerHTML=`<div style="text-align:center;max-width:260px;width:100%">
    <div style="width:64px;height:64px;border-radius:17px;background:linear-gradient(135deg,#22c55e,#16a34a);display:grid;place-items:center;color:#fff;font-size:34px;font-weight:800;margin:0 auto 22px">€</div>
    <input id="lockInput" type="password" inputmode="numeric" autocomplete="off" placeholder="• • • • • •" style="width:100%;text-align:center;font-size:24px;letter-spacing:8px;padding:13px;border-radius:12px;border:1px solid #2a3441;background:#1a212b;color:#e8edf4;outline:none">
    <div id="lockMsg" style="color:#f87171;font-size:12px;height:15px;margin-top:8px"></div>
    ${hasBio?`<button id="lockBio" style="margin-top:10px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:none;border:1px solid #2a3441;color:#8d9bad;padding:11px;border-radius:12px;cursor:pointer;font-size:14px">${svg(I.finger)} Entrar com biometria</button>`:''}
  </div>`;
  document.body.appendChild(d);
  const i=document.getElementById('lockInput');
  i.addEventListener('input',()=>{ if((i.value||'').length>=String(state.settings.codigo).length) tryUnlock(); });
  if(hasBio){ const bb=document.getElementById('lockBio'); if(bb)bb.addEventListener('click',()=>bioUnlock(false)); setTimeout(()=>bioUnlock(true),250); }
  else setTimeout(()=>i.focus(),60);
}
function tryUnlock(){
  const i=document.getElementById('lockInput'); if(!i)return;
  if((i.value||'').trim()===String(state.settings.codigo)){ sessionStorage.setItem('casa-unlock','1'); const e=document.getElementById('lock'); if(e)e.remove(); }
  else { i.style.borderColor='#f87171'; i.value=''; setTimeout(()=>{i.style.borderColor='#2a3441';i.focus();},350); }
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('lockInput'))tryUnlock(); });

load();render();showLock();
if(dbxOn()) syncOpen();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
